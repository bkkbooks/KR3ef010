body:
  text: 卷第十八大半夏湯六十四治痰飲及脾胃不和半夏不拘多少如法湯洗了薄切干焙每遇膈間有寒痰用半夏白茯苓生薑各一分細切水二盞半煎至一盞濾去滓臨睡溫呷如有熱痰加炙甘草一分如脾胃不和去甘草入陳橘皮一分同煎越婢湯六十五治風痹腳弱石膏四兩附子一兩炮去皮臍白朮二兩甘草一兩炙微赤麻黃三兩去節湯泡焙乾上件銼如麻豆大每服四錢以水一盞半生薑三片棗子一枚煎至八分去滓溫服脾約丸六十六治老人津液少大便澀及腳氣有風大便結燥者大黃二兩酒浸焙乾厚朴刮去皮用薑汁炙枳殼麩炒去穰白芍藥以上各半兩麻子仁一兩半微炒杏仁去皮尖麩炒三分上為細末煉蜜和杵千下丸如梧桐子大每服二十丸溫水下不拘時候未知加五丸十丸止下利服糜粥將理黑神丸六十七治溫疫時氣有積食者巴豆新好者一兩輕捶去殼以急流水約二碗浸一宿然後更煮三五十沸後冷漉出去心膜以帛子拭去水然後研如膏用厚紙十數層裹以重物壓去油五靈脂二分黑色者為上杏仁半兩燒過後研入藥再研大戟半兩生用去皮裡面如粉白者為妙荊三稜半兩生用豆豉二兩須要新軟者為妙不得令曬乾與巴豆等同研勻細上三味為極細末方始入巴豆豆豉研勻後入杏仁更研令勻細別入飛羅面半匙以井花水調如糊漸次拌藥搜和得所入臼中搗三二千下丸如緑豆大曬乾入瓷合內頻曬或微火焙亦得如遇傷寒有食積者脈沉結身體不熱即下之量患人臟腑虛實加減丸數服用煎薑棗湯吞下取微利為度不可太過溏泄身熱下之則為痞氣結胸若病在上可吐者同生薑干嚼三五丸神功丸六十八治三焦氣壅心腹痞悶六腑風熱大便不通津液內枯大腸乾澀裡急後重或下鮮血痰唾稠黏風氣下流腰疼腳重臍下脹痛溺赤如金大黃三兩人參半兩麻子仁五兩另研訶子皮炮取二兩上杵研為細末煉蜜為丸如梧桐子大每服二十丸溫水下日三服以通利為度産後大便祕者每服十丸米飲下五柔丸六十九治老人虛人腳氣亡津液虛祕大便結調補三焦大黃四兩前胡一兩半夏洗七次蓯蓉酒浸芍藥茯苓去皮細辛當歸葶藶炒各半兩上搗羅為細末煉蜜為丸如梧桐子大溫水下二十丸以通利為度大三脘散七十治三焦氣逆胸膈虛痞兩脅氣痛面手浮腫大便祕澀兼治腳氣獨活一兩白朮三分甘草三分微炙乾木瓜切焙乾稱一兩紫蘇一兩大腹皮一兩炙黃用陳橘皮三分沉香一兩木香三分川芎三分檳榔三分上十一味同一處杵為粗散每劑稱一分水二盞同煎至一盞去滓分二服帶溫服取便利為效如能臨晚常進半劑依法煎服即腑臟調和風氣人多祕滯數宜服之未通利者依法煎服此藥極不虛人氣經驗多矣腳氣心腹氣悶大便祕滯者良檳榔散七十一治腳腫橘葉一大握沙木一握小便小盞酒半盞同以上藥煎上煎數沸調檳榔末二錢食後服薏苡仁酒法七十二治腳痹薏苡仁牛膝各二兩海桐皮五加皮獨活防風杜仲薑汁炙以上各一兩白朮半兩枳殼一兩炒生乾地黃二兩半上銼為粗末以生絹袋內無灰酒五升浸春夏秋冬二七日夏月盛熱分作數劑逐旋浸酒每日空心溫服一盞或半盞日三四服常令酒氣醺醺不絶久服覺皮膚下如數百條蟲行即風濕氣也木瓜散七十三治腳氣大腹皮一枚紫蘇一分乾木瓜一分甘草一分炙木香一分羌活一分上細銼為散分作三服每服用白水一盞煎至半盞去滓通口服蔥豉湯七十四治傷寒一二日頭項腰背痛惡寒脈緊無汗者此湯主之豆豉二大合蔥白十五莖麻黃四分去節乾葛八分上件以水二升先煎麻黃六七沸掠去白沫乾葛煎二十餘沸下豉煎取八大合去滓分二次溫服如人行五六里服訖良久煮蔥豉湯熱吃即取汗連須蔥白湯七十五治傷寒已發汗或未汗頭疼如破生薑二兩連須蔥白寸切半升上以水二升煮一升去滓分作二三服服此湯不瘥者服葛根蔥白湯葛根蔥白湯七十六治頭疼不止葛根芍藥知母各半兩蔥白一把川芎一兩生薑一兩上銼如麻豆大水三升煎一升半去滓每服一湯盞雄鼠屎湯七十七治勞復梔子十四枚劈枳殼三枚炒雄鼠屎二七枚即兩頭尖上為粗末每服四錢水一盞半入蔥白二寸香豉三十粒同煎一盞分作二服勿令病人知鼠屎黃芩芍藥湯七十八治鼻衄黃芩三分芍藥甘草炙各半兩上為粗末每服三錢水一盞煎至六分去滓溫服酒蒸黃連丸七十九治暑毒伏深纍取不瘥無藥可治伏暑發渴者此方尤妙黃連四兩以無灰好酒浸面上約一寸以重湯熬干上搗羅為細末糊為丸如梧桐子大滾水下三五十丸胸膈涼不渴為驗茅花湯八十治鼻衄不止茅花一大把水三盞煎濃汁一盞分作二服即瘥如無花以根代之枳實理中丸八十一治傷寒結胸欲絶心膈高起手不得近者宜此治之茯苓二兩人參二兩枳實十六片麩炒白朮二兩乾薑二兩炮甘草二兩炒上搗羅為細末煉蜜為丸如雞子黃大每服一丸熱湯化下連進二三服胸中豁然渴者加栝蔞根二兩下利者加牡蠣二兩煆之小半夏加茯苓湯八十二治諸嘔噦心下堅痞膈間有水痰眩悸者半夏五兩湯浸洗七遍白茯苓三兩去皮上銼如麻豆大每服半兩水三盞煎至一盞稱生薑四錢取自然汁投藥中更煎兩沸熱服不拘時候桔梗枳殼湯八十三治傷寒痞氣胸滿欲絶桔梗枳殼麩炒去穰各一兩上銼如麻豆大以水二盞煎至一盞去滓分二服赤茯苓湯八十四治傷寒嘔噦心下滿胸膈間宿有停水頭眩心悸赤茯苓一兩芎藭半兩半夏半兩湯洗七遍去滑人參一兩去蘆頭白朮半兩陳橘皮一兩湯浸去白穰焙上件藥搗羅為粗末每服四錢水一盞半生薑五片煎至七分去渣溫服不拘時候香薷散八十五治陰陽不順清濁相干氣射中焦名為霍亂此皆由飽食腥膾復啖乳酪海陸百品無所不餐多飲寒漿眠臥冷席風冷之氣傷於脾胃諸食結而不消陰陽二氣壅而不反陽氣欲降陰氣欲升陰陽交錯變成吐利不已百脈昏亂營衛俱虛冷搏於筋則轉筋宜服此方厚朴去皮二兩香薷穗一兩半黃連二兩二味入生薑四兩同杵炒令紫色用一方有白扁豆尤良上搗為粗末每服三錢水一盞酒半盞同煎至七分去滓用新汲水頻頻浸換令極冷頓服之藥冷則效速也仍煎服時不得犯鐵器慢火煎之兼治非時吐利霍亂腹中撮痛大渴煩躁四肢逆冷冷汗自出兩腳轉筋疼痛不可忍者須井中沉令極冷頓服之乃有神效犀角地黃湯八十六治傷寒及溫病應發汗而不發汗內有瘀血鼻衄吐血面黃大便黑此方主消化瘀血兼治瘡疹出得太盛以此解之芍藥三分生地黃半斤牡丹皮去心一兩犀角一兩為屑如無以升麻代之升麻犀角性屬兩途上銼如麻豆大每服五錢匕水一盞半煎取一盞有熱如狂者加黃芩二兩其人脈大來遲腹不滿自言滿者為無熱更不用黃芩也黃連解毒湯八十七治時疾三日已汗解或因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得臥黃連三分黃柏半兩黃芩一兩梔子四枚劈上銼如麻豆大每服五錢水一盞半煎取一湯盞去滓服未知再服進粥以此漸瘥外臺云凡大熱盛煩嘔呻吟錯語不得眠皆傳此方諸人用之亦效此直解熱毒除酷熱不必飲酒劇者酸棗湯八十八治傷寒吐下後心煩乏氣晝夜不眠酸棗仁四升甘草一兩炙知母二兩茯苓三兩去皮川芎三兩乾薑三兩麥門冬一升去心上為粗末每服四錢水一盞煎至七分去滓溫服梔子烏梅湯八十九治傷寒後虛煩不得眠心中懊憹梔子半兩黃芩半兩甘草半兩炙微赤柴胡一兩烏梅肉十四枚微炒用上為粗末每服四錢水一盞半生薑三片竹葉十四片豉五十粒煎至七分去滓溫服橘皮乾薑湯九十治噦橘皮通草乾薑炮桂心各二兩人參一兩甘草炙二兩上銼如麻豆大每服四錢水一盞煎至六分去滓溫服日進三服羌活附子散九十一治咳逆羌活附子炮茴香微炒各半兩木香乾薑炮各大棗許大上為細末每服二錢水一盞鹽一捻同煎一二十沸帶熱服一服即止半夏生薑湯九十二治噦欲死生薑二兩切半夏洗一兩一分上以水二盞煎至八分去滓分溫二服黑膏九十三療溫毒發斑好豉一升生地黃半斤切上二味以豬膏二斤合露之煎令三分減一絞去滓用雄黃麝香如大豆者內中攪和盡服之毒便從皮中出則愈忌蕪荑葛根橘皮湯九十四療冬溫未即病至春被積寒所折不得發至夏得熱其寒解冬溫始發肌中斑爛癮疹如錦紋而咳心悶但嘔吐青汁服此湯即靜葛根橘皮杏仁去皮尖研炒知母黃芩麻黃去節湯泡甘草炙各半兩上銼如麻豆大每服五錢以水一大盞半煎至一中盞去滓溫服玄參升麻湯九十五治傷寒發汗吐下後毒氣不散表虛里實熱發於外故身斑如錦文甚則煩躁譫語兼治喉閉腫痛玄參升麻甘草炙各半兩上銼如麻豆大每服抄五錢匕以水一盞半煎至七分去滓服大青四物湯九十六治傷寒熱病十日以上發汗及吐利後熱不除身上斑出者大青四兩豆豉八合阿膠一兩炙甘草一兩炙上銼如麻豆大每服抄五錢匕以水一盞半煎至一盞旋入膠再煎合煬知母桂心湯九十七治傷寒後不瘥朝夕有熱如瘧狀知母一兩麻黃一兩去節甘草一兩炙芍藥一兩黃芩一兩桂心一兩上銼如麻豆大每服四錢水一盞半生薑四片煎一盞去滓取八分清汁溫熱服日三溫覆令微汗若心煩不眠其人欲飲水當稍與之令胃中和則愈三黃丸九十八治吐血黃疸黃連三兩大黃一兩黃芩二兩上搗羅為細末煉蜜為丸如梧桐子大每服十五丸滾白湯送下桔梗半夏湯九十九治傷寒冷熱不和心腹痞滿時發疼痛順陰陽消痞滿桔梗一兩微炒細切半夏一兩薑汁製枳實半兩麩炒赤用陳橘皮湯浸去穰焙乾以上各一兩為末每服四錢水一鍾薑三片煎七分去滓熱服三黃熟艾湯一百治傷寒四五日而大下熱利時作白通湯諸藥多不得止宜服此湯除熱止利黃芩黃連黃柏三分熟艾半雞子大上銼如麻豆大以水二大盞煎至七分去滓溫服薤白湯一百一傷寒下利如爛肉汁赤滯下伏氣腹痛諸熱毒悉皆治之豉半斤綿裹薤白一把梔子七枚大者破之上銼如麻豆大以水二升半先煎梔子十沸下薤白煎至二升許下豉煎取一升二合去滓每服一湯盞赤石脂丸一百二傷寒熱利黃連當歸各二兩赤石脂乾薑炮各一兩上搗羅為末煉蜜為丸如梧桐子大每服三十丸米飲吞下日三服進之地榆散一百三治傷寒熱毒不解日晚即壯熱腹痛便痢膿血並宜治之地榆一兩切犀角屑一兩黃連一兩去須微炒茜根一兩黃芩一兩梔子仁半兩上件藥搗為粗末每服四錢以水一盞入薤白五寸煎至六分去滓不計時候溫服黃連阿膠湯一百四治傷寒熱毒入胃下利膿血梔子仁半兩黃柏一兩微炙切黃連二兩去須微炒阿膠一兩切碎炒令黃上件藥搗為粗末每服四錢用水一盞煎至七分去滓不拘時候溫服桃仁湯一百五治𧈟女力切蟲食病槐子碎一兩艾葉一兩大棗十五枚去核桃仁一兩去皮尖雙仁炒上以水二大盞半煎至一盞半去滓分三服黃連犀角湯一百六治傷寒及諸病之後內有瘡出下部者黃連半兩烏梅七個木香一分犀角一兩如無以升麻代用之上以水二大盞半煎至一盞半去滓分三服雄黃鋭散一百七治下部𧈟瘡雄黃研青葙子苦參黃連各二分桃仁去皮尖研一分上為散以生艾搗汁和如棗子核大綿裹納下部扁竹汁更佳冬間無艾只用散綿裹納下部亦得百合知母湯一百八治百合病發汗後者百合七枚知母三兩切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母每取一升去滓後合和煎取一升五合分溫再服滑石代赭湯一百九治百合病下之後者百合七枚劈滑石三分碎綿裹代赭如彈丸大一枚斫碎綿裹上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服雞子湯一百十治百合病吐之後百合七枚劈雙子黃一枚上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓納雞子黃攪令勻煎五分溫服百合洗方一百十一治百合病一月不解變成渴者上以百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也百合地黃湯一百十二治百合病不經吐下發汗病形如初百合七枚劈生地黃汁一升上以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓納地黃汁煎取一升五合分溫再服中病勿更服大便當如漆栝蔞牡蠣散一百十三治百合病渴不瘥栝蔞根牡蠣熬等分上搗羅為散飲服方寸匕日進三服滑石散一百十四治百合病變發寒熱百合一兩炙滑石三兩上杵羅為散飲服方寸匕日進三服當微利者止勿服之寒熱即除治中湯一百十五治脾胃傷冷物胸膈不快腹疼氣不和人參乾薑炮白朮甘草炙陳橘皮湯洗青橘皮上各等分為細末每服三錢水一中盞煎數沸熱服尋常入鹽點之陽旦湯一百十六治中風傷寒脈浮發熱往來汗出惡風項強鼻鳴乾嘔桂心芍藥以上各三兩甘草黃芩各二兩上銼如麻豆大每服五錢水一盞半棗子一枚生薑三片煎至一盞取八分清汁溫服自汗者去桂心加附子一枚炮渴者去桂心加栝蔞三兩利者去芍藥桂加乾薑三兩心下悸者去芍藥加茯苓四兩虛勞裡急者正陽旦湯主之煎時入膠飴為佳若脈浮緊無汗發熱者不可與也白虎加蒼朮湯一百十七治濕溫多汗知母六兩甘草炙二兩石膏一斤蒼朮三兩粳米三兩上銼如麻豆大每服五錢水一盞半煎至八九分去滓取六分清汁溫服七味蔥白湯一百十八許仁則治傷寒或因起動勞復或因吃食稍多皆成此候若復甚者一如傷寒初有此症宜服此湯乾葛切三合新豉半合綿裹蔥白連須者切半升生薑切一合麥門冬去心三兩乾地黃三兩勞水四升以勺揚之一千過名曰勞水上七味用勞水煎之三分減去滓分二服漸漸服取汗增損四順湯一百十九治少陰下利手足冷無熱候者甘草二兩炙人參二兩龍骨二兩黃連乾薑炙一兩附子一枚炮去皮臍為細末每服三錢水一盞煎七分日三服不瘥復作甚良若下利腹痛加當歸二兩嘔者加橘皮一兩化斑湯一百二十治斑毒人參半兩石膏半兩葳蕤知母甘草各一分上銼如麻豆大每服抄五錢匕水一盞半入糯米一合煎至八分取米熟為度去滓溫服官局桔梗湯一百二十一治乾嘔桔梗半夏陳橘皮各一兩枳實半兩為粗末每服三錢水一盞生薑五片煎七分服之麻黃加朮湯一百二十二治中濕麻黃一兩半去節湯泡甘草半兩炙桂枝一兩去皮蒼朮半兩杏仁三十五枚去皮尖上銼麻豆大每服五錢水一盞半煎八分溫服竹皮大丸一百二十三治虛煩生竹茹二分石膏三分桂心一分甘草三分炙白薇一分上為細末棗肉丸彈子大米飲服一丸日三夜一有熱者倍白薇煩喘者加枳實一分古今録驗橘皮湯一百二十四療春冬傷寒秋夏冷濕咳嗽喉中鳴聲上氣不得下頭痛方陳橘皮紫菀麻黃去節湯泡杏仁去皮尖當歸桂心甘草炙黃芩各半兩上銼如麻豆大每服抄五錢匕用水一盞半煎至一盞去滓服黃連橘皮湯一百二十五治溫毒發斑黃連四兩去毛陳橘皮去白杏仁去皮尖枳實炙麻黃去節湯泡葛根各二兩厚朴薑汁製甘草各一兩炙上銼如麻豆大每服抄五錢匕用水一小盞半煎至一盞去滓服下利當先止麥門冬湯一百二十六治勞氣欲絶麥門冬一兩去心甘草炙二兩上銼如麻豆大先用水二小盞入粳米半合煎令米熟去米約得水一小盞半入藥五錢棗二枚竹葉十五片同煎至一盞去滓溫服不能服者綿滴口中
