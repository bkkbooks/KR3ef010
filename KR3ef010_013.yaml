body:
  text: 卷第十三大柴胡湯三十太陽病過十餘日發汗吐下之後四五日柴胡證仍在者先與小柴胡嘔不止一云嘔止小安心下急鬱郁微煩者為未解也與大柴胡湯下之則愈傷寒十餘日熱結在裡往來寒熱者與服傷寒發熱汗出不解心中痞硬嘔吐而下利者此主之以上屬太陽陽明病汗多者急下之宜服少陰病下利清水心下痛口乾者可下之宜大柴胡大承氣湯病腹中滿痛此為實當下之宜大承氣大柴胡湯腹滿不減減不足言當下之宜大柴胡大承氣湯傷寒後脈沉者內實也下之解宜服傷寒六七日目中不了了睛不和無表裡證大便難身微熱者實也急下之宜大承氣大柴胡湯太陽病未解脈陰陽俱停必先振栗汗出而解但陰脈微者下之而解宜服病人無表裡證發熱七八日雖脈浮數者可下之大柴胡湯主之病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明脈實者可下之大柴胡大承氣湯主之屬可下病脈證柴胡四兩黃芩芍藥各一兩半半夏一兩一分洗枳實二枚去穰炒千金云枳實去穰一分准二枚上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服以利為度未利再服本方無大黃欲下者加大黃一兩柴胡桂枝湯三十一傷寒六七日發熱微惡寒肢節煩頭疼微嘔心下支結外證未去者此主之屬太陽發汗多亡陽譫語者不可下與此藥和其營衛以通津液後自愈屬發汗後病脈證柴胡一兩三錢桂枝去皮黃芩人參芍藥各半兩半夏四錢一字洗甘草三錢一字炙上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服柴胡桂枝幹薑湯三十二傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也宜服之屬太陽柴胡四兩桂枝去皮黃芩各一兩半牡蠣熬甘草炙乾薑各一兩栝蔞根二兩上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服食頃再服柴胡加龍骨牡蠣湯三十三傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者此主之屬太陽柴胡黃芩龍骨各一兩鉛丹人參桂枝半夏半合湯洗牡蠣一分半煅上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服又見辨誤柴胡加芒硝湯三十四傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡下之以不得利今反利者知醫以丸藥下之此非其治也潮熱者實也先宜服小柴胡湯以解外後以柴胡加芒硝主之屬太陽黃芩人參各半兩柴胡一兩三錢三字芒硝一兩甘草炙半兩半夏四錢一字湯洗上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓內芒硝更微沸溫服大青龍湯三十五太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者此藥主之若脈微弱汗出惡風者不可服之服之則厥逆筋惕肉瞤此為逆也傷寒脈浮緩身不疼但重乍有輕時無少陰證者此主之屬太陽桂枝去皮一兩甘草一兩炙石膏如半個雞子大碎杏仁二十枚去皮尖麻黃三兩去節湯泡去黃汁焙乾稱上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服取汗為度若汗周身潤止後服未周身潤可停待相次服盡不欲汗多恐亡陽故也若汗多不止用溫粉撲之溫粉方白朮藁本川芎白芷各等分上搗羅為細末每末一兩入米粉三兩和之粉撲周身止汗無藁本亦得若汗已出後盡劑服汗多亡陽遂逆惡風煩躁不得眠也小青龍湯三十六傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也此主之傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利小腹滿或喘者此主之芍藥桂枝去皮乾薑炮甘草炙細辛各一兩半五味子一兩別本或加一分半夏一兩半湯洗若渴者去半夏加栝蔞根一兩半麻黃一兩半微利者去麻黃加蕘花如一彈子熬令赤色若噎者去麻黃加附子半個炮若小便不利小腹滿者去麻黃加茯苓二兩若喘者去麻黃加杏仁一兩半去皮尖麻黃湯泡上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服杏仁半夏二味或各作一兩一分小建中湯三十七傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者小柴胡湯主之傷寒二三日心中悸而煩者宜服芍藥三兩甘草一兩炙桂枝一兩半去皮膠飴半升舊有微溏或嘔者去膠飴局方加黃耆一兩半為黃耆建中湯上銼如麻豆大每服抄五錢匕水一盞半生薑四片大棗子一枚煮至八分去滓下膠飴兩匙許再煎化溫服日三服夜二服尺脈尚遲再作一劑加黃耆末一錢煎造膠飴法糯米一升揀淘淨大麥柏末六兩上米一如炊飯甑上至氣溜取下傾入一盆子入柏末一合並湯一盞來許拌和再上甑至飯熟卻入盆子內都以柏末拌和入一瓷罐子可容五升許冬月罐子熱春秋夏溫冬月用湯二升許入罐子內約內面飯上湯三指許即得布並紙三五重蓋定更以綿或絮抱定近火春秋夏即溫和至一宿見米浮在水面上即以布絞裂取清汁銀石器內煎至面上有膜即以木篦不住手攪至稀糊以瓷器收夏月置井中庶不酸大陷胸湯三十八太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者宜服傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為小結在胸脅也但頭微汗出者此主之太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至小腹硬滿而痛不可近者此主之傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也此主之以上屬太陽大黃一兩半去皮錦文者為末甘遂一字赤連珠者細羅為末芒硝五分上以水二盞先煮大黃至一盞去滓下硝一沸下甘遂末溫服得快利止後服又大陷胸湯方桂枝一兩甘遂一兩或作半兩大棗一兩或作三枚人參一兩栝蔞實一枚去皮只用四分之一上銼如麻豆大每服五錢匕水一盞或作二盞煮至八分去滓溫服胸中無堅物勿服之大陷胸丸三十九又見辨誤病發於陽而反下之熱入因作結胸病發於陰而反下之一作汗出因作痞也所以成結胸者以下之太早故也結胸者項亦強如柔痓狀下之則和宜此藥主之屬太陽大黃二兩或作四兩芒硝三分杏仁三分去皮尖熬黑苦葶藶子三錢熬上搗羅二味納杏仁芒硝合研如脂丸如彈子大每服一丸抄甘遂末半錢匕白蜜一合水二盞煮取一盞頓服一宿乃下如不下再服甘遂性猛宜斟量虛實服之小陷胸湯四十又見辨誤小結胸病正在心按之則痛脈浮滑者此主之屬太陽半夏湯洗稱一兩半黃連一兩栝蔞一枚去皮或作半枚上銼如麻豆大水二盞先煮栝蔞至一盞半下諸藥煎至八分去滓溫服未知再服微利黃涎便安大承氣湯四十一陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也此藥主之若汗多微發熱惡寒者外未解也一法與桂枝湯其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病潮熱大便微硬者可與此藥不硬者不可與之傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者此主之若一服利則止後服陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜服陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈汗出譫語者以為有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛里實故也下之愈宜服二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜服陽明病下之心下懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜服病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣發汗宜桂枝湯大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜服傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜服陽明病發熱汗多者急下之宜服得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣一升若不大便更六七日小便少者雖不大便但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬此主之發汗不解腹滿痛者急下之宜服腹滿不減減不足言當下之宜服病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜服陽明少陽合病必下利其脈不負者為順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜服以上屬陽明少陰病二三日口燥咽乾者急下之宜服少陰病自利清水色純青心下必痛口乾燥者可下之宜服少陰病六七日腹脹不大便者急下之宜服以上屬少陰下利三部脈皆平按之心下硬者急下之宜服下利脈遲而滑者內實也利未欲止當下之宜服寸口脈浮而大按之反澀尺中微而澀故知有宿食當下之宜服下利不欲食者以有宿食故也當下之宜服下利瘥至其年月日時復發者以病不盡故也當下之此主之下利脈反滑當下所去下乃愈此主之脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之宜服病腹中滿痛者此為實也當下之宜服此主之以上屬可下病脈證大黃二兩錦文者去皮生用酒洗過枳實四枚或作三枚去穰炒淨稱用半兩厚朴四兩去皮薑汁炙芒硝二兩或作一合半朴硝有蘆頭者亦得上銼如麻豆大每服抄五錢匕水二盞先煮厚朴枳實至一盞余下大黃煮取六分去滓入芒硝煎一二沸放溫服以利為度未利再與一服小承氣湯四十二陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者不可攻也陽明病脈遲雖汗出不惡寒其氣必重短氣腹滿而喘有潮熱者此為外欲解可攻裡也手足濈然汗出者此大便硬大承氣湯主之若腹大滿不通者與小承氣湯微和胃氣勿令大泄下陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語此藥主之若一服譫語止者更莫後服陽明病譫語潮熱脈滑而疾者此藥主之因與承氣湯一升腹中轉氣者更服一升若不轉氣者勿更與之明日又不大便脈反微澀者裡虛也為難治不可更與承氣湯太陽病若吐若下若發汗後微煩小便數大便硬者與小承氣湯和之愈得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安下利譫語者有燥屎也此主之屬厥陰大黃四兩去皮厚朴二兩去皮薑汁炙枳實四枚或作三枚去穰炒淨稱半兩也上銼如麻豆大每服抄五錢匕以水一大盞半煎至八分去滓溫服以利為度初服湯更衣者止後服不爾者再服之調胃承氣湯四十三發汗後惡寒虛故也不惡寒但熱者實也當和胃氣此主之太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗之而解但陰脈微者下之而解若欲下之宜服傷寒脈浮自汗出小便數心煩微惡寒腳攣急與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯傷寒十三日過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也此主之太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與服之若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也陽明病不吐不下心煩者可與服太陽病三日發汗不解蒸蒸熱者屬胃也此主之傷寒吐後腹脹滿者與服以上屬陽明甘草一兩大黃二兩去皮芒硝一兩三分或作一兩一分上銼如麻豆大每服五錢以水一大盞煎至七分去滓下硝更上火二三沸溫頓服之桃核承氣湯四十四太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但小腹結者乃可攻之宜用此藥屬太陽大黃四兩桂枝去皮二兩甘草二兩炙芒硝二兩桃仁去皮尖雙仁者五十個捶碎上銼如麻豆大每服五錢匕以水二大盞煎至八分去滓下硝煎化溫服以微利為度未利移時再服梔子豉湯四十五發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹此主之發汗若下之而煩熱胸中窒者此主之仲景云凡用梔子湯病人舊微溏者不可與服之傷寒五六日大下之後身熱不去心中結痛者未欲解也此主之以上屬太陽陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反譫語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者此主之陽明病下之外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者此主之下利後更煩按之心下濡者為虛煩也此主之屬厥陰香豉二兩肥梔子十六個擘碎或作十四個上銼如麻豆大每服五錢水二盞先煮梔子至一盞入豉煎至七分去滓溫服得快吐止後服梔子甘草豉湯四十六發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者此主之屬太陽梔子七枚甘草豉各一兩上分二服以水二盞先煎梔子甘草至一盞內豉同煎取七分去滓溫服得快吐止後服梔子生薑豉湯四十七發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若嘔者當主之屬太陽梔子七枚生薑二兩半豉一兩上分二服以水二盞先煮梔子生薑至一盞內豉同煎至七分去滓溫服得快吐止後服
