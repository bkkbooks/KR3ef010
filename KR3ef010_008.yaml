body:
  text: 卷第八此一卷論發熱大抵傷寒寒多易治熱多難愈傷寒發熱者以其寒極則生熱治法多用冷藥故令熱不去仲景熱多寒少用桂枝二越婢一湯不渴外有微熱者用小柴胡加桂湯皆溫表之義也近時多行小柴胡湯不問陰陽表裡凡傷寒家皆令服之此藥差寒不可輕用雖不若大柴胡湯小承氣湯之緊然藥病不相主其為害一也往往因服小柴胡湯而成陰證者甚多仲景雖云傷寒中風有柴胡證但見一證便是不必悉具此為是少陽證當服小柴胡不必少陽證悉具耳況本方又有加減隨證增損古人方治審諦如此後人妄投良可怪也五十五問發熱發熱而惡寒者屬太陽也太陽病必發熱而惡寒蓋太陽主氣以溫皮膚分肉寒氣留於外皮膚緻密則寒慄而發熱宜發其汗麻黃湯正方二十大青龍湯正方三十五主之若發熱微惡寒者柴胡桂枝湯正方三十一桂枝二越婢一湯正方四主之若吐利而發熱惡寒者霍亂也太陽病發熱而渴不惡寒為溫病若發汗已身體灼熱者為風溫也身熱汗出濈濈然者屬陽明也陽明病脈浮者宜桂枝正方一微汗之脈實者調胃承氣湯下之正方四三大便不秘者白虎湯和解方六十四若陽明病發汗多者宜大承氣湯急下之正四十一蓋汗多發熱者胃汁干故也仲景云太陽證汗後不惡寒但熱者實也當和其胃氣宜調胃承氣湯正四三太陽病三日發汗不解蒸蒸發熱者屬於胃也宜下之脈細頭疼嘔而發熱者屬少陽也少陽發熱小柴胡湯主之正二十九不可發汗發汗即譫語病人不渴外有微熱者小柴胡加桂也雜三十九小柴胡加桂主表熱最良此法不特傷寒也仲景表有熱者小柴胡加桂也里有熱者白虎加人參也正六五大抵身熱不飲水者為表熱也口燥煩渴者為裡熱也二藥均治發熱然分表裡不可不知也發汗已身灼熱者名風溫素問云汗出而身熱者風熱也其人素傷於風因復傷於熱風熱相搏即身熱常自汗出此名風溫在第六卷第四十五問也病人無表裡證發熱七八日脈雖浮數宜大柴胡湯下之正方三十大便秘者加大黃假令已下脈數不解今熱則消穀善飢至六七日不大便者有瘀血也抵當湯主之正九十一若傷寒瘥後更發熱者小柴胡湯正二十九主之脈浮者以汗解脈實者可下之又問陰證有發熱者乎太陰厥陰皆不發熱只少陰發熱有二證仲景謂之反發熱也少陰病初得之發熱脈沉者麻黃細辛附子湯正廿三主之少陰病脈沉發汗則動經此大略之言耳脈應里而發熱在表亦當以小辛之藥泄汗而溫散也仲景云傷寒之病從風寒得之表中風寒入里則不消須用溫藥少汗而解少陰病下利清穀裡寒外熱手足厥逆脈不出者通脈四逆湯主之正八十一大抵陰證發熱終是不同脈須沉或下利手足厥也五十六問熱多寒少太陽熱多寒少有三證有熱多寒少而不嘔清便自可者有熱多寒少而脈微弱者有熱多寒少而尺脈遲者其用藥皆不同也太陽病八九日如瘧狀熱多寒少不嘔清便自可宜桂枝麻黃各半湯正方二熱多寒少而脈都大微弱者無陽也不可發汗宜桂枝二越婢一湯正方四主之若脈浮雖熱多寒少亦自可發汗也熱多寒少而尺中遲者血少也先以小建中加黃耆正三十七以養其血尺尚遲再作一劑然後晬時用小柴胡湯正二十九桂枝二越婢一湯正方四輩小劑隨證治之五十七問潮熱潮熱者大率當下仲景云潮熱者實也大承氣湯證云其熱不潮未可與也則知潮熱當下無疑矣雖然更看脈與外證脈若弦若浮及外證惡寒猶有表證且與小柴胡湯以解之正二十九若腹大滿不通者可與小承氣正四十二微和其胃氣勿令大泄也仲景云日晡發熱者屬陽明也脈實者大承氣正四二大柴胡也正三十脈虛者桂枝也正方一縱使潮熱當行大承氣亦須先少與小承氣若不轉失氣不可攻之後發熱復硬者大柴胡下之正三十若胸脅滿而嘔日晡發潮熱者小柴胡加芒硝正三十四主之又有日晡發潮熱已而微利者又有微發潮熱而大便溏者或潮熱而咳逆者皆當用小柴胡也正二十九傷寒十三日不解胸脅滿而嘔日晡發潮熱已而微利潮熱者實也先服小柴胡以解外後以柴胡加芒硝湯下之陽明潮熱大便溏胸滿不去者小柴胡湯主之冬陽明潮熱當行黃芩湯冬陽明病脈浮而緊必發潮熱發作有時但脈浮者必盜汗黃芩湯主之正八十五以上潮熱並屬陽明也太陽有潮熱乎仲景大陷胸湯一證正三十八結胸有潮熱者為大結胸屬太陽也五十八問往來寒熱者陰陽相勝也陽不足則先寒後熱陰不足則先熱後寒往來寒熱有三證小柴胡湯大柴胡湯柴胡桂枝幹薑湯有表證而往來寒熱者用小柴胡也正二十九有里證而往來寒熱者大柴胡也正三十已表或已下而往來寒熱者皆可用柴胡桂枝幹薑湯也正三十二仲景云血弱氣盡腠理開邪氣因入與正氣分爭往來寒熱休作有時小柴胡主之又云傷寒五六日中風往來寒熱胸脅苦滿默默不欲食心煩喜嘔或胸煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡主之傷寒十餘日熱結在裡往來寒熱者大柴胡主之傷寒五六日已發汗復下之胸脅滿小便不利渴而不嘔頭汗出往來寒熱心煩柴胡桂枝幹薑湯也五十九問傷寒瘧狀形證似瘧有太陽證有陽明證有婦人熱入血室證太陽證服桂枝湯正方一大汗出脈洪大者與桂枝湯如前法若形似瘧一日再發者汗出必解宜桂枝二麻黃一湯正三傷寒八九日如瘧狀熱多寒少其人不嘔清便欲自可日一二發者麻黃桂枝各半湯太陽證形似瘧寒熱等者與桂枝二麻黃一湯熱多寒少者麻黃桂枝各半湯正方二有陽明證病人煩熱汗出如瘧狀日晡發熱而脈浮虛者與桂枝湯脈實者宜承氣湯正四二婦人熱入血室其血必結故使如瘧狀小柴胡湯主之正二十九六十問汗之而寒熱者太陰證發汗後依前寒熱者須看脈如何若脈浮數或洪大則表證猶在當再表也如桂枝湯正方一或桂枝二麻黃一正方三之類醫人為見已汗或已下而發寒熱不敢再表誤矣蓋脈浮為在表表之必愈也或得汗而解復如瘧狀日晡而發者此屬陽明也若脈實者可下之宜大柴胡正三十大承氣正方四一也若發汗後只惡寒者虛也發汗後只發熱者實也只惡寒屬芍藥甘草附子湯正七二只發熱屬調胃承氣湯正方四三若厥陰證大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之正七五六十一問汗之而仍發熱者素問云溫病汗出輒復熱而脈躁疾不為汗衰狂言不能食謂之陰陽交交者死也又云熱病已得汗而脈躁盛者死今不與汗相應是不勝其病也其死明矣大抵病人得汗而脈靜者生今汗之而仍發熱者若脈浮數則表證猶在汗之必愈也仲景云發汗解半日許復熱煩脈浮數者可更發汗宜桂枝湯正一發汗後不敢再表者為脈沉實耳脈若浮者須再汗也發汗後不惡寒只發熱脈沉實或狂語此為胃實陽盛即不可再汗也須當下之設令下後又不解表裡邪亦衰矣仲景云太陽病三日發汗不解蒸蒸發熱者宜調胃承氣湯正四十三和其胃氣也太醫云若傷寒得汗後熱不退發昏及狂言者便可用承氣湯正四十二下之立愈未瘥再服若汗後熱不解但心下痞嘔逆又自利大柴胡去大黃主之正方三十又有太陽證合行桂枝卻用麻黃之類發汗多亡陽仍發熱者真武湯正方一百五主之更有風溫一證初得病發熱而渴不惡寒雖發汗已身灼熱者為風溫屬葳蕤湯雜四十五岐伯所謂汗出而身熱者風熱也若傷寒得汗後病解虛羸微熱不去可行竹葉石膏湯正方九五隨其虛實而治之六十二問下之而熱不退者勞復食復附仲景云病人脈微而澀為醫所病大發其汗使陽氣微又大下之使陰氣弱其人亡血病當惡寒後乃發熱無休止時蓋陽微則惡寒陰弱則發熱陽微惡寒四逆湯主之正七十五陰弱發熱為內熱葶藶苦酒湯主之雜方十六大抵傷寒八日以上大發熱者此為難治仲景云脈陰陽俱虛熱不止者死又有醫人多用丸子藥下之身熱不去微煩者梔子乾薑湯主之正方四九傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之正方四十五又問傷寒瘥後發熱者何也此名勞食復也病新瘥血氣尚虛津液未復因勞動生熱熱氣既還復入經絡名曰勞復仲景云傷寒瘥以後更發熱小柴胡湯主之正二十九脈浮者以汗解宜柴胡桂枝湯正三十一脈實者以下解宜大柴胡湯正方三十又大病瘥後勞復者枳實梔子湯主之正方九十六麥門冬湯雜一百二十六雄鼠屎湯雜七十七七味蔥白湯雜一百十八皆可選用又食復者大病新瘥脾胃尚弱穀氣未復強食過多停積不化因爾發熱名曰食復大抵新病瘥多因傷食便作痞乾噫食臭腹中雷鳴下利等證可與生薑瀉心湯正方六十三仲景於枳實梔子湯證云若有宿食內大黃如薄棋子五六枚服之愈黃帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食故有所遺也若此者皆病已衰而熱有所藏因其穀食相搏兩熱相合故有所遺也帝曰善治遺奈河岐伯曰視其虛實調其逆從可使必已食肉則復多食則遺此其禁也
