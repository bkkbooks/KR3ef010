body:
  text: 卷第二十此一卷論小兒傷寒小兒大人治法一般但小分劑藥性差涼耳尋常風壅發熱鼻涕痰嗽煩渴惺惺散主之咽喉不利痰實咳嗽鼠黏子湯主之頭額身體溫熱大便黃赤腹中有熱四順散連翹飲三黃丸主之頭額身體溫熱大便白而酸臭者胃中有食積雙丸主之小兒無異疾唯飲食過度不能自節心腹脹滿身熱頭痛此雙丸悉治之小兒身體潮熱頭目碎痛心神煩躁小便赤大便秘此熱劇也洗心散調胃承氣湯主之頭疼發熱而偎人惡寒者此傷寒證也升麻湯主之無汗者麻黃黃芩湯有汗者升麻黃芩湯皆要藥也小兒尋常不可過當服涼藥胃冷蟲動其證與驚相類醫人不能辨往往復進驚藥如腦射之類遂發吐胃虛而成慢驚者多矣小兒須有熱證方可疏轉仍慎用丸子藥利之當以大黃川芎等㕮咀作湯液以盪滌蘊熱蓋丸子巴豆乃攻食積耳洗心散治遍身壯熱頭目碎痛背膊拘急大熱衝上口苦唇焦夜臥舌乾咽喉腫痛涕唾稠黏痰壅吃食不進心神躁熱眼澀睛疼傷寒鼻塞四肢沉重語聲不出百骨節痛大小便不利麩豆瘡時行溫疫狂語多渴及小兒天吊風夜驚並宜服之當歸四兩炒芍藥四兩生用甘草四兩炙荊芥四兩白朮一兩炒麻黃四兩去節炒大黃四兩以米泔水浸一炊間漉出令乾慢炒取熟上搗羅為細末每服抄二錢水一盞生薑一片薄荷二葉同煎至八分放溫和滓服了仰臥仍去枕少時如五臟壅實煎四五錢匕若要溏轉則熱服惺惺散治小兒風熱及傷寒時氣或瘡疹發熱桔梗細辛人參白朮栝蔞根甘草炙白茯苓川芎各等分上搗羅為末每服二錢用水一盞生薑二片薄荷二葉同煎七分服三歲以下作四五服五歲以上分二服凡小兒發熱不問傷風風熱先與此散數服往往輒愈四順散解大人小兒膈熱退壅盛涼心經大黃熬甘草炙當歸洗芍藥上各等分為細末每服二錢以水一盞薄荷二葉煎至七分溫服小兒量歲數與之麻黃黃芩湯小兒傷寒無汗頭疼發熱惡寒麻黃去節一兩黃芩赤芍藥各半兩甘草炙桂枝去皮各一分上搗羅為細末每服二錢滾水調下日三服兼治天行熱氣生豌豆瘡不快益煩躁昏憒或出尚身疼熱者升麻黃芩湯治小兒傷風有汗頭疼發熱惡寒升麻葛根黃芩芍藥各三錢甘草一錢半炙上銼如麻豆大每服二錢以水一中盞煎至六分去滓溫服若時行瘡豆出不快煩躁不眠者加木香一錢五分甘露飲子治胃中客熱口臭不思飲食或飢煩不欲食齒齦腫疼膿血舌口咽中有瘡赤眼目瞼重不欲開瘡疹已發未發並宜服熟乾地黃生乾地黃天門冬麥門冬並去心焙枇杷葉去毛枳殼麩炒去穰黃芩石斛去苗山茵陳甘草炙各等分上為細末每服二錢水一盞煎至六分去滓溫服食後臨臥雙丸治小兒身熱頭痛飲食不消腹脹滿或心腹疼痛大小便不利或下重數起未瘥可再服小兒蒸候哺食減少氣息不快夜啼不眠是腹內不調並宜用此丸下之甘遂半兩硃砂一錢另研麥門冬二兩半去心蕤核去仁另研四兩半牡蠣二兩煅甘草一兩一分炙巴豆六十枚去皮心膜研新布絞去油日中曬之白如霜者上麥門冬甘草甘遂牡蠣四味為細末入巴豆硃砂蕤仁合和搗二千杵更入少蜜搗和極熟旋丸半歲兒服如荏子大一雙一歲兒服如半麻子大分為一雙服二歲兒服如麻子大一枚分一雙三四歲者服如麻子大二丸五六歲者服如大麻子大二丸七八歲者如小豆大二丸十歲者微大於小豆二丸常以雞鳴時服如至日出時不下者熱粥飲服數合投之即下藥丸皆雙出也下利甚者濃煎冷粥飲之便止石膏麻桂湯治小兒傷寒未發熱咳嗽頭面熱麻黃一兩去節湯泡甘草半兩炙石膏半兩芍藥半兩桂心一分黃芩一兩杏仁十枚去皮尖上七味為散每服二錢水一中盞入生薑二片煎半盞去滓服兒若甚小以意增減之連翹飲治小兒一切熱連翹防風甘草炙山梔子各等分上件搗羅為末每服二錢水一中盞煎七分去滓溫服麥門冬湯治嬰兒未滿百日傷寒鼻衄身熱嘔逆麥門冬三分去心石膏寒水石甘草各半兩炙桂心三錢半上銼如麻豆大每服三錢水一盞煎七分去滓溫服十物升麻湯治小兒傷寒變熱毒病身熱面赤口燥心腹堅急大小便不利或口瘡或因壯熱便四肢攣掣驚仍作癎疾時發時醒醒後身熱如火者升麻白薇麻黃去根節葳蕤柴胡甘草各半兩炙黃芩一兩朴硝大黃鉤藤各一分上銼如麻豆大每服三錢水一盞煎至七分去滓下硝再煎化溫服六物黃芩湯治嬰兒腹大短氣熱有進退食不安谷為之不化黃芩大青甘草炙麥門冬石膏各半兩桂心三錢上銼如麻豆大每服三錢水一盞煎七分溫服五物人參飲治小兒天行壯熱咳嗽心腹脹滿人參甘草各半兩炙麥門冬一兩去心生地黃一兩半如無只用生乾地黃半兩上銼如麻豆大每服三錢水一盞入茅根半握煎至七分去滓溫服八物麥門冬飲治小兒天行壯熱咳嗽心煩麥門冬三兩去心甘草炙人參各一分紫菀升麻各二兩貝母一分半上銼如麻豆大每服三錢水一盞入茅根半握煎至七分去滓再入竹瀝少許重煎服棗葉飲治小兒天行壯熱五日以後熱不歇者棗葉半握麻黃半兩去根節豉一合蔥白切一合上件共童子小便二盞煎至一盞去滓分二服
