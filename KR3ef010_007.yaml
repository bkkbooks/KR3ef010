body:
  text: 卷第七此一卷論痰證食積虛煩腳氣與傷寒相似實非傷寒也所謂朱紫相陵玉石不分醫者處病滅裂見其發熱惡寒往往作傷寒治之發汗吐下因茲夭橫者多矣今特立一門別而論之庶幾覽者知其非傷寒也五十一問憎寒發熱惡風自汗寸口脈浮胸膈痞滿氣上衝咽喉不得息而頭不疼項不強此為有痰也中脘有痰亦令人憎寒發熱胸膈痞滿有類傷寒但頭不疼項不強為異宜服柴胡半夏湯雜六二金沸草散雜六三大半夏湯雜六四若氣上衝咽喉不得息者用瓜蒂散吐之古法服瓜蒂散正百十一凡服一錢匕藥下使臥欲吐且忍之良久不吐取三錢匕湯二合和服以手指擲之便吐矣不吐復稍增之以吐為度若吐少病不除明日如前法再服之可至再三不可令人虛也藥力過時不吐者啜熱湯一升以助藥力吐訖便可食無復餘毒若服藥過多者飲水解之五十二問頭疼脈數發熱惡寒而身不痛左手脈平和此名食積也傷食亦令人頭痛脈數發熱但驗左手人迎脈平和身不疼痛者是也甲乙經云人迎緊盛傷於寒氣口緊盛傷於食左手關前一分者人迎之位也右手關前一分者氣口之位也蓋人迎主外氣口主中以此別之傷食之證由脾胃伏熱因食不消發熱似傷寒卻身不疼痛此為異耳若膈實嘔吐者食在上脘宜吐之若心腹滿痛者宜下之治中湯雜百十五五積散雜草一黑神丸雜六七可選而用也五十三問不惡寒身不痛頭不疼脈不緊但煩熱者此名虛煩也諸虛煩熱與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裡實也不可下如此者內外皆不可攻攻之必遂損竭多死也此虛煩但當與竹葉湯正九五若嘔者與橘皮湯雜三十七一劑不愈再與之孫真人云此法數用甚有效傷寒虛煩亦宜服之王叔和云有熱不可大攻之熱去則寒起正宜服竹葉湯五十四問傷寒頭疼身熱支節痛大便祕或嘔逆而腳屈弱者此名腳氣也傷寒只傳足經不傳手經地之寒暑風濕皆作蒸氣足常履之遂成腳氣所以病證與傷寒相近其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者汗而愈濕者溫而愈熱者下而愈寒者尉而愈腳氣之病始得不覺因他病乃知毒氣入心則小腹頑痹不仁令人嘔吐死在朝夕矣然終是與傷寒不同者孫真人云卒起腳屈弱不能轉動有此為異耳要之有腳氣之人先從腳起或先緩弱疼痹寒氣勝者為痛痹有寒故痛也或行起忽倒或兩脛腫痛亦有不腫者或腳膝枯細或心中忪悸或小腹不仁病久入深營衛之行澀皮膚不茱故為不仁不仁者皮頑不知有無也或舉體轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠痛皆腳氣候也黃帝所謂緩風濕痹是也頑弱名緩風疼痛為濕痹痹者閉也閉而不仁故曰痹也寒中三陽所患必冷越婢湯雜六五小續命湯雜五七主之小續命煎湯成旋入生薑自然汁最快暑中三陰所患必熱小續命湯去附子減桂一半大煩躁者紫雪最良大便祕者脾約丸雜六十六神功丸雜六八五柔丸雜六九大三脘散雜七十木瓜散雜七三主之腳氣之疾皆由氣實而始終無一人以服藥致虛而殂者頭痛身熱肢節痛而腳屈弱者是其人素有腳氣此時發動也腳腫者檳榔散主之雜七十一腳氣方論千金外臺最詳此不復敘大抵越婢湯小續命湯薏苡仁酒法雜七二脾約神功丸皆要藥也仍針灸為佳服補藥與用湯淋洗者皆醫之大禁也
