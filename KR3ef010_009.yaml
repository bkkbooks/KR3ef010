body:
  text: 卷第九此一卷首論惡寒大抵太陽病必發熱而惡寒惡寒家慎不可過當覆衣被及近火氣寒熱相搏脈道沉伏愈令病人寒不可遏但去被撤火兼飲以和表之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚針藥所不能治矣六十三問惡寒惡寒有二證發熱而惡寒者發於陽也無熱而惡寒者發於陰也發於陽者宜解表脈必浮數屬桂枝湯正方一桂枝二越婢一湯正四麻黃湯正方二十青龍湯正方三十六證也發於陰者宜溫里脈必沉細屬理中湯正方七十四四逆湯正方七十五證也少陰病下利已惡寒而蜷手足溫者可治宜建中湯正方三十七若少陰病惡寒而蜷時時自煩不欲厚衣用大柴胡湯下之正方三十若發熱微惡寒者屬柴胡桂枝湯也正方三十一發汗後反惡寒者虛故也屬芍藥甘草附子湯正七十二脈微而惡寒者此陰陽俱虛也不可更吐下也發汗面色赤有熱者為欲解宜桂枝麻黃各半湯正方二傷寒大下後復發其汗心下痞惡寒者表未解也不可攻其痞當先解表表解乃可攻痞解表宜桂枝湯正方一攻痞大黃黃連瀉心湯正方五十九雖然太陽陽明少陰皆有惡寒要之太陽病或已發熱或未發熱必惡寒也陽明證俱宜下唯惡寒中寒為病在經與太陽合病屬表發其汗耳若吐若下後七八日不解熱結在裡表裡俱熱時時惡寒者白虎證也正方六十四又問有汗出惡寒者有汗出多而微惡寒者有頭汗出而微惡寒者何也仲景云太陽病其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也心下痞而復惡寒汗出者附子瀉心湯主之正方六十陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯也正方一頭汗出而微惡寒者屬少陽宜小柴胡湯也正方二十九又問背惡寒者何也背惡寒有兩證三陽合病背惡寒者口中不仁口燥舌乾也少陰病背惡寒者口中和也以此別之口中不仁口燥舌乾而背惡寒者白虎加人參湯主之正六十五口中和而背惡寒者附子湯主之正方六八仍灸之仲景云少陰病得之一二日口中和其背惡寒者當灸之附子湯主之六十四問惡風惡風者衛中四時之虛風所以惡風也其人當汗出而脈緩也數與桂枝湯正方一桂枝加葛根湯正方十八使遍體微潤連日當自解矣又有太陽病發汗多亡陽遂漏不止衛虛而惡風者當溫其經也其人惡風小便難四肢微急難以屈伸者桂枝加附子也正方六若傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯也正方二十九風濕相搏骨節疼煩掣痛不得屈伸汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之正方二十二六十五問傷寒不得汗甲乙經云熱病脈常躁盛而不得汗者此陽脈之極也死脈盛躁而得汗者生大抵傷寒營衛俱病則無汗麻黃湯正方二十葛根湯正方二十六大青龍湯正方三十五蔥豉湯雜方七十四可選而用之若傷寒連服湯劑而汗不出者死如中風法蒸之溫熱之氣於外迎之無不得汗也薪火燒地良久掃除去火可以水灑之取蠶沙柏葉桃葉粳麩皆可用相和鋪燒地上可側手厚上鋪席令病人當上臥溫覆之夏月熱只布單覆之汗移時立至俟周身至腳心皆汗漐漐乃用溫粉撲止汗移上床最得力者蠶沙桃柏葉也無蠶沙亦得單桃葉亦得蒴藿亦可用麩粳乃助添令多爾不用亦得傷寒亦有氣虛不能作汗者仲景云脈浮而遲遲為無陽不能作汗其身必癢宜桂枝麻黃各半湯主之正方二陽明病法多汗反無汗如蟲行皮中狀者此久虛故也宜朮附湯正方七十黃耆建中湯正方三十七六十六問自汗傷寒無汗者七證自汗者九證太陽傷寒剛痓病太陰病少陰病厥陰病陰易病冬陽明病皆無汗凡少陰證無汗類麻黃湯之證然類麻黃證脈陰陽俱緊少陰脈微細為異也又汗出為陽微故仲景云陰不得有汗脈陰陽俱緊而反汗出為亡陽屬少陰經也汗出者九證衛不和自汗病人臟無他病時發熱自汗出而不愈者衛不和也先其時發汗則愈屬桂枝也正方一太陽病發熱汗出者此為營弱衛強故汗出欲救風邪者宜桂枝湯又云病常自汗出者此為營氣和營氣和者外不諧也以衛氣不共營氣諧故爾以營行脈中衛行脈外復發其汗營衛和則愈傷風自汗太陽病發熱汗出惡風脈緩為中風屬桂枝湯正方一又云太陽病項背強几几反汗出惡風桂枝加葛根湯正方十八主之汗出而渴者五苓散正方六十六不渴者茯苓甘草湯正五十三雖然仲景云傷風自汗用桂枝然桂枝湯難用須是仔細消息之假令傷風自汗若脈浮而弱設當行桂枝湯服後無桂枝脈息證候而煩者即不可再服也若傷風自汗出而小便數者切不可與桂枝也仲景云太陽病自汗四肢拘急難以屈伸若小便難者可桂枝湯內加附子服之正方六若小便數者慎不可與桂枝附子湯宜服芍藥甘草湯正方五七若誤行桂枝附子攻表便咽乾煩燥厥逆嘔吐作甘草乾薑湯正五十五與之以復其陽若厥愈足溫更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者與調胃承氣湯正四十三微溏則止其譫語緣芍藥甘草湯主脈浮自汗小便數者寸口脈浮為風大為溫風則生微熱虛則兩脛攣小便數仍汗出為津液少不可誤用桂枝宜服芍藥甘草補虛退風熱通治誤服桂枝湯後病證仍存者風溫自汗太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難屬葳蕤湯雜四十五中濕自汗難經云何以知傷濕得之然當喜汗出不可止何以言之腎主濕故知腎入心為汗出不可止也中暑自汗太陽中熱者暍是也其人汗出惡寒身熱而渴屬白虎湯正六十四陽明病自汗不惡寒反惡熱濈濈然汗自出者屬陽明也若陽明病汗出多而渴者不可與五苓散以汗多胃中燥豬苓復利其小便故也故仲景云陽明病發熱汗多者急下之陽明病其人汗多以津液外出胃中燥大便必硬譫語者屬調胃承氣湯正四十三雖然陽明汗多急下若小便自利者此為津液內竭雖爾不可攻之須自大便導之宜用蜜煎導法正一百十二陽明病汗出而脈遲微惡寒者表未解也宜桂枝湯正方一陽明法多汗則脈浮無汗而喘者發汗則愈宜麻黃湯正方二十亡陽自汗太陽病發汗多遂漏不止其人惡風當溫其經宜桂枝加附子湯正方六傷寒尺寸脈俱緊而汗出者亡陽也此屬少陰法當咽痛而復吐利其人熱不去內拘急四肢疼厥逆而惡寒者四逆湯正七十五主之汗多不止者可用溫粉撲之若汗多不止必惡風煩躁不得臥者先服防風白朮牡蠣湯雜二次服小建中湯正三十七柔痓自汗太陽病發熱脈沉細搖頭口噤背反張汗出而不惡寒者名柔痓小續命湯主之也雜五十七霍亂自汗吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之正七十五雖然少陰不得有汗而少陰亦有反自汗出之證陰證四肢逆冷額上及手背冷汗濈濈者亡陽也陽明病法多汗而陽明亦有反無汗之證不可不察也六十七問頭汗出病人表實裡虛玄府不開則陽氣上出汗見於頭凡頭汗出者五內乾枯胞中空虛津液少也慎不可下下之者謂之重虛然頭汗出者有數證傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦有里也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也小柴胡湯主之正二十九傷寒五六日已汗下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此表未解也柴胡桂枝幹薑湯主之正方三十二病人但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃五苓散正六十六茵陳湯正方九十三陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之正四十五心下緊滿無大熱頭汗出者茯苓湯主之雜八十四仲景云傷寒心下緊滿無大熱但頭汗出者此名為水結在胸脅以頭汗出別水結證小半夏加茯苓湯雜方八十二陽明病下血譫語者為熱入血室但頭汗出者刺期門隨其實而瀉之汗出則愈汗出譫語者有燥屎也過經乃可下也下之早語言必亂以表實裡虛故也六十八問頭疼頭疼者陽證也太陽證頭疼必發熱惡寒無汗者麻黃湯正方二十有汗者桂枝湯若已發汗或未發汗頭痛如破者連須蔥白湯雜七十五服湯不止者葛根蔥白湯主之雜七十六脈弦細頭痛發熱者屬少陽也少陽不可發汗小柴胡主之正二十九陽明證頭疼不惡寒反惡熱胃實故也陽明氣實故攻頭也調胃承氣湯正四十三主之仲景云傷寒不大便六七日頭疼有熱者與承氣湯其小便清者知不在裡續在表也當鬚髮汗若頭疼者必衄屬桂枝湯正方一太陰少陰經從足至胸俱不至頭唯厥陰經挾胃屬肝絡膽循喉嚨上頏顙連目出額故太陰少陰並無頭疼之證仲景只有厥陰一證吳茱萸湯正方一百治乾嘔吐涎沫頭疼而已大抵屬三陽者頭疼為多也孫真人云陽傷寒者體熱頭疼是也陰傷寒者不壯熱不頭痛是也若非次頭疼胸中滿及發寒熱脈緊而不大者即是膈上有涎宜用瓜蒂末一錢暖水調下吐涎立愈又問病人頭疼鼻塞而煩者何證也此屬濕家頭中寒濕故鼻塞而頭疼也內瓜蒂末鼻中則愈法在發黃門中六十九問身體痛身癢附太陽少陰厥陰皆有身體痛當以外證與脈別之太陽證表未解脈浮緊法當身體痛宜麻黃湯正方二十以汗之脈浮緊當身體疼痛宜以汗解假令尺脈遲者不可發汗何以知其然營氣不足血少故也尺脈遲者先以小建中湯以養之正三十七脈浮者麻黃湯主之太陽中濕一身盡痛發熱身黃小便不利病人中濕因而傷風風濕相搏一身痛重是名風濕當於風濕中求之麻黃加朮湯主之雜方一百二十二若脈沉自利而身體痛者陰證也急當救里宜四逆湯正七十五附子湯正六十八真武湯一百五之類以溫之大抵大便利而身體疼者當救里大便如常而身體痛者急當救表此不可不知也或身重背強腹中絞痛咽喉不利身如被杖者當作陰毒治之又問發汗後身疼痛脈沉而遲當用何藥仲景有桂枝加芍藥生薑人參新加湯正方十一蓋為此證也小建中湯正三十七兼治汗後身疼脈沉而遲者若霍亂吐瀉止而身疼痛不休者少與桂枝湯正方一即愈金匱要略云瘡家雖身體痛不可發汗汗出則痓又問身癢者何也脈浮而遲遲為無陽不能作汗其身必癢太陽病七八日脈微而惡寒以陰陽俱虛不可更發汗更下更吐也小柴胡湯主之正二十九若重反發汗則氣虛必兩耳聾無聞素無熱人可芍藥甘草附子湯正七十二素有熱人可黃耆建中湯正三十七面赤有熱者未欲解也以其不能得小汗出身必當癢宜桂枝麻黃各半湯正方二七十問筋惕肉瞤頭眩身搖太陽病發汗不解發熱心悸頭眩身瞤動欲劈地者屬真武湯正一百五大凡發汗過多即身瞤動振搖虛羸之人微發汗便有此證俱宜服真武湯羸甚者去芍藥或少用之有熱證惡熱藥者去附子余依本方加減法詳之傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振搖者茯苓桂枝白朮甘草湯主之正方五十二傷寒應發汗而動氣在左不可發汗發汗則頭眩汗出筋惕肉瞤此為逆難治且先服防風白朮牡蠣散雜方二次服建中湯正三十七七十一問喘傷寒喘只有太陽陽明二證太陽病頭疼發熱身疼惡風無汗而喘者宜汗屬麻黃湯正方二十桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯也正二十八太陽病下之微喘者表未解故也桂枝加厚朴杏子湯也正方十九發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏子甘草石膏湯也正方三十一陽明病汗出不惡寒腹滿而喘有潮熱者宜下屬承氣湯正四十二然陽明病脈浮無汗而喘發汗則愈宜麻黃湯正方二十太陽與陽明合病喘而胸滿者不可下宜麻黃湯又發汗後飲水多咳而微喘者水停心下腎氣乘心故也小青龍去麻黃加杏仁正三十六小腹滿者去麻黃加茯苓也正二十六又問麻黃主喘何故去之此治心下有水而喘不留汗也小便不利小腹滿故去麻黃加茯苓也七十二問渴脈浮而渴屬太陽傷寒表不解心下有水氣而渴者小青龍去半夏加栝蔞根正三十六太陽病服桂枝大汗出後大煩渴者白虎加人參正六十五脈浮小便不利微熱消渴者五苓散正六十六傷寒四五日身熱惡風脅下滿手足溫而渴者小柴胡去半夏加人參栝蔞根主之正二十九太陽證身體灼熱而渴者為風溫栝蔞根湯主之雜方四十七有汗而渴屬陽明白虎加人參湯主之虛人老人及春秋月可與竹葉石膏湯正九十三陽明病但頭汗出小便不利渴引水漿身必發黃宜茵陳湯正九十五小柴胡去半夏加人參栝蔞根正二十九傷風寒熱或發熱惡風而渴屬少陽少陽脅下硬不大便而嘔舌上白苔而渴小柴胡去半夏加人參栝蔞湯正二十九自利而渴屬少陰傷寒熱入於臟流於少陰之經少陰主腎腎惡燥故渴而引飲少陰下利咳而嘔渴豬苓湯主之正六十七下利欲飲水者以有熱也白頭翁湯主之正方一百八切戒太陽證無汗而渴者不可與白虎湯仲景云渴欲飲水無表證者白虎加人參湯脈浮發熱無汗是表未解也不可與白虎湯薏苡小青龍去半夏加栝蔞也正方三十六傷寒四五日身熱惡風脅下滿手足溫而渴者小柴胡去半夏加人參栝蔞也正二十九陽明證汗多而渴者不可與五苓散汗多胃中燥豬苓復利其小便故也薏苡竹葉湯可與之仲景云陽明病發作有時汗出多者急下也太陽病渴終不可與白虎耶太陽證得汗後脈洪大而渴者方可與之也陽明病渴終不可與五苓耶陰明證小便不利汗少脈浮而渴者方可與之此皆仲景之妙法也仲景豬苓湯證亦云脈浮發熱渴欲飲水小便不利者豬苓湯主之正六十七凡病非大渴不可與水若小渴咽乾者只小呷滋潤之令胃中和若大渴煩躁甚能飲一斗者與五升飲之若全不與則乾燥無由作汗發喘而死常人見因渴飲水得汗小渴遂劇飲之致停飲心下滿結喘死者甚衆當以五苓散正六十六或陷胸丸正三十九與之金匱要略云得時氣至五六日而渴欲飲水不能多不當與也何者以腹中熱尚少不能消之便更為人作病矣至七八日大渴欲飲水猶當依證與之常令不足勿極意也凡人但見仲景云得病反能飲水此為欲愈遂小渴者乃強飲之因成其禍不可勝數大抵傷寒水氣皆因飲水過多所致水停心下氣上乘心則為悸為喘結於胸脅則為水結胸胃中虛冷則為嘔為噦冷氣相搏則為噎上迫於肺則為咳漬入腸中則為利邪熱所薄蓄於下焦則為小便不利小腹滿或裡急溢於皮膚則為腫若陽毒倍常躁盛大渴者黑奴丸主之雜方二十中暑伏熱深纍取不瘥其人發渴不已酒蒸黃連丸雜七十九主之雜七十九七十三問鼻衄傷寒太陽證衄血者乃解蓋陽氣重故也仲景所謂陽盛則衄若脈浮緊無汗服麻黃湯正方二十不中病其人發煩目瞑劇者必衄小衄而脈尚浮緊者宜再與麻黃湯也衄後脈已微者不可行麻黃湯也若脈浮自汗服桂枝湯正七不中病桂枝證尚在必頭疼甚而致衄小衄而脈尚浮者宜再與桂枝也衄後脈已微者不可行桂枝湯也大抵傷寒衄血不可發汗者為脈微故也治法衄家不可發汗汗出額上陷脈緊急直視不能瞬不得眠然而無汗而衄脈尚浮緊者須再與麻黃湯有汗而衄脈尚浮緩者須再與桂枝湯脈已微者黃芩芍藥湯雜七十八犀角地黃湯雜八十六衄血不止者茅花湯雜方八十若衄而渴心煩飲則吐水先服五苓散正方六六次服竹葉湯正九十五又問陰證有衄血者乎陰證自無熱何緣有衄若少陰病但厥無汗強發之必動血未知從何道出或從口鼻或從耳目是謂下厥上竭為難治七十四問腹滿身重難以轉側口中不仁面垢譫語遺尿此三陽經合病也白虎湯主之正六十四不可發汗汗之則譫語下之則額上生汗手足逆冷若自汗者白虎加人參也正六十五又第二問論合病
