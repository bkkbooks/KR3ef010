body:
  text: 卷第四此一卷論陰陽治傷寒須識陰陽二證手足各有三陰三陽合為十二經在手背者為陽屬表為腑在手掌里者為陰屬裡為臟足經仿此傷寒只傳足經不傳手經素問熱論亦只說足三陰三陽受病巢氏言一曰太陽屬小腸誤矣足之陽者陰中之少陽足之陰者陰中之太陰足之三陽從頭走足足之三陰從足走腹陽務於上陰務於下陽行也速陰行也緩陽之體輕陰之體重陰家脈重陽家脈輕陽候多語陰證無聲陽病則旦靜陰病則夜寧陽虛則暮亂陰虛則夜爭陰陽消息證狀各異然而物極則反寒暑之變重陽必陰重陰必陽陰證似陽陽證似陰陰盛隔陽似是而非若同而異明當消息以法治之十八問陰證太陰少陰厥陰皆屬陰證也太陰者脾也少陰者腎也厥陰者肝也何謂太陰證太陰脾之經主胸膈䐜脹甲乙經云邪生於陽者得之風雨寒暑邪中於陰者得之飲食居處陰陽喜怒又曰賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入腑陰受之則入臟入六腑則身熱不時上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼何謂少陰證少陰腎之經主脈微細心煩但欲寐或自利而渴又問經云一二日少陰病者何也謂初中病時腠理寒便入陰經不經三陽也傷寒雖是三陰三陽大抵發於陽則太陽也發於陰則少陰也此二經為表裡其受病最為多陽明太陰受病頗稀至於少陽厥陰肝膽之經又加少焉凡病一日至十二三日太陽證不罷者但治太陽有初得病便見去聲少陰證者直攻少陰亦不必先自太陽次傳而至蓋寒氣入太陽即發熱而惡寒入少陰經只惡寒而不發熱也三陰中寒微則理中湯正七十四稍厥或中寒下利即乾薑甘草湯正五十五手足指頭微寒冷謂之清音去聲此未消吃四逆蓋疾輕故也只可服理中乾薑之類大段重者用四逆湯正七十五無脈者用通脈四逆湯也正八一何謂厥陰證厥陰肝之經主消渴氣上衝心中疼熱飢不欲食食則吐蛔下之利不止也若陰氣獨盛陽氣暴絶則為陰毒其證四肢逆冷臍腹築痛身如被杖脈沉疾或吐或利當急灸臍下服以辛熱之藥令陽氣復而大汗解矣古人云辛甘發散為陽謂桂枝甘草乾姜附子之類能復其陽氣也微用辛甘甚則用辛苦陰極發躁陰證似陽學者當以脈別之十九問陽證太陽陽明少陽皆屬陽證也太陽者膀胱也發熱惡寒頭疼腰痛而脈浮也陽明者胃也不惡寒反惡熱濈濈汗出大便祕潮熱而脈長也少陽者膽也口苦咽乾脅下滿發熱而嘔或往來寒熱而脈弦也麻黃湯正二十大青龍湯正三十五桂枝湯治太陽經傷風寒也大柴胡湯正三十調胃承氣湯正四十三小承氣湯正四十二大承氣湯正四一治陽明傷寒也小柴胡湯正二十九治少陽傷寒也其他藥皆發汗吐下後證也若陽氣獨盛陰氣暴絶即為陽毒必發躁狂走妄言面赤咽痛身斑斑如錦紋或下利赤黃脈洪實或滑促當以酸苦之藥令陰氣復而大汗解矣古人云酸苦湧泄為陰謂苦參大青葶藶苦酒之類雜十六能復其陰氣也微用苦甚則兼用酸苦折熱復陰若熱極發厥陽證似陰學者當以脈別之二十問手足逆冷臍腹築痛咽喉疼嘔吐下利身體如被杖或冷汗煩渴脈細欲絶此名陰毒也陰毒之為病初得病手足冷背強咽痛糜粥不下毒氣攻心心腹痛短氣四肢厥逆嘔吐下利體如被杖宜服陰毒甘草湯雜七白朮散雜八附子散雜九正陽散雜十肉桂散雜十一回陽丹雜十二返陰丹雜十三天雄散正元散退陰散並雜十四之類可選用之大抵陰毒本因腎氣虛寒或因冷物傷脾外感風寒內既伏陰外又感寒或先感外寒而內伏陰內外皆陰則陽氣不守遂發頭疼腰重腹痛眼睛疼身體倦怠四肢逆冷額上手背冷汗不止或多煩渴精神恍惚如有所失三二日間或可起行不甚覺重診之則六脈俱沉細而疾尺部短小寸口脈或大六脈俱浮大或沉取之大而不甚疾者非陰證也大抵陽毒傷寒其脈多弦而洪數陰毒傷寒其脈沉細而弦疾不可不知也若誤服涼藥則渴轉甚躁轉急有此病證者便須急服辛熱之藥一日或二日便安若陰毒漸深其候沉重四肢逆冷腹痛轉甚或咽喉不利心下脹滿結硬躁渴虛汗不止陽盛則身熱而無汗陰盛則身冷而有汗岐伯云陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱陰勝則身寒汗出身常清數栗而寒寒則厥或時鄭聲指甲面色青黑六脈沉細而疾一息七至已來有此證者速於氣海或關元二穴灸三二百壯以手足和暖為效仍兼服正陽散肉桂散回陽丹返陰丹天雄散白朮散內外通逐令陽氣復而大汗解矣陰獨盛而陽氣暴絶則為陰毒若陽獨盛而陰氣暴絶則為陽毒大凡陰陽離絶非大汗不能復其正氣也若陰毒已深疾勢困重六脈附骨取之方有按之即無一息八至以上或不可數至此則藥耳難為攻矣但於臍中用蔥尉法雜十五或灼艾三五百以來手足不溫者不可治也如得手足溫更服前熱藥以助之若陰氣散陽氣來即漸減熱藥而調治之陽氣乍復往往卻煩躁慎不可投涼藥煩躁甚者再與返陰丹即定常須識此勿令誤也二十一問發躁狂走妄言面赤咽痛身斑斑若錦文或下利赤黃而脈洪實此名陽毒也傷寒病若陽氣獨盛陰氣暴絶必發躁狂走妄言面赤咽痛身斑斑若錦文或下利赤黃脈洪實或滑促宜用酸苦之藥令陰氣復而大汗解矣葶藶苦酒湯雜十六陽毒升麻湯雜十七大黃散雜十八梔子仁湯雜十九黑奴丸雜二十可選而用之近人治傷寒脈洪大內外結熱舌卷焦黑鼻中如煙煤則宜以水漬布薄之疊布數重新水漬之稍捩去水搭於胸上須臾蒸熱又漬令冷如前薄之仍數換新水日數十易熱甚者置病人於水中熱勢才退則已亦良法也二十二問病人潮熱獨語如見鬼狀發則不識人尋衣撮空直視微喘仲景云傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視但發熱譫語者大承氣湯主之正四一若一服利則止後服脈弦者生澀者死弦者陽也澀者陰也陽證見陰脈者死病人有陽證而脈澀者慎不可下二十三問胸膈不快䐜滿閉塞唇青手足冷脈沉細少情緒或腹痛此名太陰也近人多不識陰證才見胸膈不快便投食藥非其治也大抵陰證者由冷物傷脾胃陰經受之也主胸膈䐜滿面色及唇皆無色澤手足冷脈沉細少情緒亦不因嗜欲但內傷冷物或損動胃氣遂成陰證復投巴豆之類胸膈愈不快或吐而利經一二日遂致不救蓋不知寒中太陰也太陰者脾之經也又問萬一飲食不節胸膈不快寒中陰經何法以治之答云急作理中湯加青橘陳橘銼如麻豆大服一二劑胸膈即快枳實理中丸雜八一五積散雜二十一尤良二十四問脈微細欲吐不吐心煩但欲寐五六日自利而渴此名少陰也少陰之為病欲吐不吐心煩但欲寐五六日自利而渴者虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也四逆湯主之正七五少陰病若口燥舌乾而渴者須急下之不可緩也大承氣湯主之正四一若脈沉而遲者須溫之四逆湯主之蓋以口燥而渴者知其熱脈沉而遲者別其寒也少陰屬腎古人謂之腎傷寒也腎傷寒口燥舌乾而渴固當急下大抵腎傷寒亦多表里無熱但苦煩憒默默而極不欲見光明有時腹痛其脈沉細舊用四順湯古人恨其熱不堪用云腎病而體猶有熱者可服仲景四逆散正七六若已十餘日下利不止手足徹冷乃無熱候可增損四順湯雜百十九少陰病若惡寒而踡時時自煩不欲厚衣者用去大黃大柴胡湯正三十少陰病始得之反發熱脈沉者麻黃細辛附子湯正二十三微汗之少陰病得之二三日常見少陰無陽證者亦須微發汗宜麻黃附子甘草湯正二十二此學者不可不知也二十五問身微熱煩躁面赤脈沉而微此名陰證似陽也陰發躁熱發厥物極則反也大率以脈為主諸數為熱諸遲為寒無如此最驗也假令身體微熱煩躁面赤其脈沉而微者皆陰證也身微熱者裡寒故也煩躁者陰盛故也面戴陽者下虛故也若醫者不看脈以虛陽上膈躁誤以為實熱反與涼藥則氣消成大病矣外臺祕要云陰盛發躁名曰陰躁欲坐井中宜以熱藥治之仲景少陰證面赤者四逆加蔥白主之二十六問手足逆冷而大便祕小便赤或大便黑色脈沉而滑此名陽證似陰也重陽必陰重陰必陽寒暑之變也假令手足逆冷而大便祕小便赤或大便黑色其脈沉而滑者皆陽證也輕者白虎湯正六四甚者承氣湯正四二傷寒失下血氣不通令四肢逆冷此是伏熱深故厥亦深速用大承氣正四一加分劑下之汗出立瘥仲景所謂厥應下之者此也兼熱厥與陰厥自不同熱厥者微厥即發熱若陰厥即不發熱四肢逆冷惡寒脈沉而細大小便滑泄矣二十七問身冷脈細沉疾煩躁而不飲水此名陰盛隔陽也傷寒陰盛隔陽者病人身冷脈細沉疾煩躁而不飲水者是也若欲引飲者非也不欲飲水者宜服霹靂散雜二十二須臾躁止得睡汗出即瘥此藥通散寒氣然後熱氣上行汗出乃愈火焰散雜二十二丹砂丸雜二十四並主之二十八問手足逆冷此名厥也厥者逆也陰陽不相順接手足逆冷也陽氣衰陰氣盛陰勝於陽故陽脈為之逆不通於手足所以逆冷也傷寒熱多厥少者其病當愈厥多熱少者其病為進然有冷厥有熱厥當仔細辨認冷厥者初得病日便四肢逆冷脈沉微而不數足多攣臥而惡寒或自引衣覆蓋不飲水或下利清穀或清便自調清便自調即是大便如常或小便數外證多惺惺而靜脈雖沉實按之遲而弱者知其冷厥也四逆湯正七五理中湯正七四通脈四逆湯正八一當歸四逆湯正七八當歸四逆加茱萸生薑湯正八十白通加豬膽湯正九八皆可選用也熱厥者初中病必身熱頭痛外別有陽證至二三日乃至四五日方發厥兼熱厥者厥至半日卻身熱蓋熱氣深則方能發厥須在二三日後也若微厥即發熱者熱微故也其脈雖沉伏按之而滑為里有熱其人或畏熱或飲水或揚手擲足煩躁不得眠大便祕小便赤外證多昏憒者知其熱厥也白虎湯正六四承氣湯正四二隨證用之仲景云傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤熱厥當下故云厥應下之者若反發汗必口傷爛赤也又有下證悉具而見四逆者是失下後血氣不通四肢便厥醫人不識卻疑是陰厥復進熱藥禍如反掌大抵熱厥須脈沉伏而滑頭上有汗其手雖冷時復指爪溫須便用承氣湯下之不可拘忌也諸手足逆冷皆屬厥陰不可下不可汗然有須下有須汗證者謂手足雖逆冷時有溫時手足掌心必暖非正厥逆也當消息之若病人寒熱而厥面色不澤冒昧而兩手忽無脈或一手無脈者必是有正汗也多用綿衣包手足令溫暖急服五味子湯雜二十五或兼與麻黃細辛甘草湯之類服之晬時必大汗而解矣或傷寒厥逆而心下怔忪者宜先治水當服茯苓甘草湯正五三卻治厥不爾水漬入胃必下利也又有病人手足厥冷脈乍結者邪氣結在胸也心下滿而煩飢不能食者病在胸中當吐之宜瓜蒂散正百十一蓋病在胸中亦能令人手足厥但認脈乍結者是也陰虛則結脈來緩時一止復來曰結主胸滿煩躁若傷寒發厥至七八日膚冷而躁無時暫安者為臟厥此為難治又問仲景少陰四逆湯又有四逆散何也答曰大抵少陰病不可便用熱藥且如少陰病亦有表熱者仲景謂之晚發熱用麻黃細辛之類以發汗終不成少陰證便不得發汗耶今少陰病四肢冷亦有內熱者仲景用四逆散正七六是也四逆湯用附子乾薑而四逆散主四逆而其人或咳或悸或小便不利或腹中痛或泄利下重以上病皆熱證耳二十九問吐長蟲此名蛔厥也蛔厥者臟寒蛔上入膈其人吐蛔也此是厥陰證或病人有寒復發其汗胃中冷及因發汗後身熱重發其汗胃中虛冷故長蟲逆上先服理中丸正七四次用烏梅丸正百六三十問身體重少氣陰腫入里腹內絞痛熱上衝胸頭重不欲舉眼中生花婦人則裡急腰胯連腹內痛此名陰陽易也傷寒病新瘥陰陽氣未和因合房室則令人陰腫入腹絞痛婦人則裡急腰胯連腹內痛名為陰陽易也其男子病新瘥未平復而婦人與之交接得病名曰陽易其婦人病新瘥未平復男子與之交接得病名曰陰易所以呼為易者陰陽相感動其毒疫著於人如換易然其病狀身體重熱上衝胸頭重不能舉眼中生花四肢拘急小腹絞痛手足拳則皆死其亦有不即死者病苦小腹裡急熱上衝胸頭重不欲舉百節解離經脈緩弱血氣虛骨髓枯竭便恍恍翕翕氣力轉小著床而不能搖動起止仰人或引歲月方死燒裩散正百十三豭音加鼠糞湯雜二十六竹皮湯乾薑湯青竹茹湯當歸白朮湯並雜二十七可選用之
