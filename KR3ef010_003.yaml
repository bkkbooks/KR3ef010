body:
  text: 卷第三此一卷論表裡治傷寒須辨表裡表裡不分汗下差誤古人所以云桂枝下咽陽盛即斃承氣入胃陰盛以亡傷寒有表證有里證有半在表半在裡有表裡兩證俱見有無表裡證在表宜汗在裡宜下半在裡半在表宜和解表裡俱見隨證滲泄無表裡證用大柴胡湯下之正方三十又四逆湯正七十五證有先溫里乃發表桂枝湯正方一證有先解表乃攻裡仲景云下利清穀身體疼痛急當救里身體疼痛清便自調急當救表如響應桴間不容櫛非特此也均是發熱身熱不渴為表有熱小柴胡加桂主之正二十九厥而脈滑為里有熱白虎加人參主之正六十五黃帝所謂發表不遠熱攻裡不遠寒也均是水氣乾嘔微利發熱而咳為表有水小青龍加蕘花主之正三十六身體涼表證罷咳而脅下痛為里有水十棗湯主之正八十九均是惡寒發熱而惡寒者發於陽也麻黃桂枝小柴胡主之無麻黃桂枝小柴胡湯只有柴胡桂枝湯見正方三十一無熱而惡寒者發於陰也附子四逆湯主之正七十五均是身體痛脈浮發熱頭疼身體痛者為表未解麻黃湯主之正二十脈沉自利身體痛者為里不和四逆湯主之正七十五以此觀之仲景之於表裡亦詳矣學者宜深究之雖然傷寒六七日目中不了了無表裡證脈雖浮亦有下之者少陰病二三日無陽證亦有發汗者非表裡之所能拘又不可不知也十三問表證發熱惡寒身體痛而脈浮者表證也浮表陽也其脈按之不足舉之有餘素問云寸口脈浮而盛曰病在外寸口脈沉而緊曰病在中仲景云脈浮者病在表可發汗又曰表有病者脈當浮又曰結胸證脈浮者不可下則知脈浮者表證也表證者惡寒是也惡寒者表之虛此屬太陽宜汗之然傷寒發表須當隨病輕重而汗之故仲景有發汗者有和解之者兼四時發汗亦自不同春不可大發汗以陽氣尚弱不可亟奪使陰氣勝於時天寒初解營衛腠理緩可用小柴胡湯正二十九之類冬不可汗者以陽氣伏藏不可妄擾不問傷寒中風以輕藥解利之傷寒無汗者只與桂枝麻黃各半湯正方二傷風有汗只與柴胡桂枝湯正三十一或得少汗而解或無汗自解病勢甚者不拘此夏月天氣大熱玄府開脈洪大宜正發汗但不可用麻黃桂枝熱性藥須是桂枝麻黃湯加黃芩石膏知母升麻也加減法在第十二卷藥方中夏月有桂枝麻黃證不加黃芩輩服之轉助熱氣便發黃斑出也白虎湯雖可用然治中暑與汗後一解表藥耳一白虎未能驅逐表邪況夏月陰氣在內或患熱病而氣虛人妄投白虎往往有成結胸者以白虎性寒非治傷寒藥也凡發汗欲令手足俱周濈濈然一時許為佳不欲如水淋漓服湯中病即止不必盡劑然發汗須如常覆腰以上厚衣覆腰以下蓋腰以上流漓而腰以下至足心微潤病終不解凡發汗病證仍在者三日內可二三汗之令腰腳周遍為度又問三陰有可汗者乎陰病不當發汗發汗即動經然太陰脈浮少陰發熱亦須微微取汗但不正發汗耳大抵風寒中人與營衛俱薄而發熱又未曾行諸汗藥雖無陽證須少汗解逐之王叔和云表中風寒入里則不消故知初病脈沉細數雖里不消本表中風寒須宜溫覆少汗而解仲景太陰證脈浮可汗宜桂枝湯正方一少陰病發熱脈沉宜麻黃細辛附子湯正二十三少陰二三日常見少陰證無陽證者宜麻黃附子甘草湯正二十二微發汗皆陰證表藥也要知脈沉細數病在裡不可發汗此大略之言耳脈應里而發熱在表宜以小辛之藥取微汗而溫散也大抵傷寒太陽證發熱惡寒宜發其汗然熱多寒少其脈微弱或尺脈遲者不可表也太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯正方四尺脈遲者血少也先以小建中加黃耆湯正三十七以養其血晬時用小柴胡桂枝二越婢一湯小分劑以和解之其人當汗而衄血下血者不可表也太陽病脈浮而緊發熱身無汗自衄者愈不可汗汗出必額上陷脈緊急直視不得瞬又云太陽病不解熱結膀胱其人如狂血自下下者愈不愈宜桂枝湯正方一壞病者不可表也太陽病三日已發汗若吐若下若溫針仍不解者為壞病桂枝不中與也當犯何逆隨證治之又云太陽病不解傳入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯正二十九若已吐下發汗柴胡證罷此為壞病知犯何逆以法治之婦人經水適來者不可表也婦人病經水適下而發其汗則鬱冒不知人此病為表裡俱虛故令鬱冒也風溫者不可表也脈尺寸俱浮頭疼身熱常自汗體重其息必喘其形不仁默默但欲眠者風溫證也復發其汗者死宜葳蕤湯雜四十五濕溫者不可表也兩脛逆冷胸腹滿頭目痛苦妄言必多汗者濕溫證也不可發汗發汗者名曰重暍如此死者醫殺之耳宜桂附湯正十七白虎加蒼朮湯雜一百十七虛煩者不可表也諸虛煩熱與傷寒相似然不惡寒身不疼故知非傷寒也不可發汗頭不痛脈不緊故知非裡實也不可下宜服竹葉湯正九十五病人腹間左右上下有築觸動氣者不可表也動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤此為逆難治先服防風白朮牡蠣湯雜方二汗止次當服建中湯正三十七動氣在右不可發汗發汗則衄而渴心苦煩飲則吐水先服五苓散一二服正六十六次服竹葉湯動氣在下不可發汗發汗則氣上衝正在心端宜服李根湯雜方三動氣在下不可發汗發汗則無汗心中大煩雜方四骨節疼煩目暈惡寒食即反吐谷不得化先服大橘皮湯雜方四吐止後服小建中湯正三十七以此見古人慎用表藥如此十四問里證不惡寒反惡熱手掌心並腋下濈濈汗出胃中乾涸燥糞結聚潮熱大便硬小便如常腹滿而喘或譫語脈沉而滑者里證也仲景云手足濈然汗出者此大便已硬也傷寒欲下而小便少手足心並腋下不滋潤者不可攻也里證者內熱是也內熱者里之弱此屬陽明也宜下之傷寒始發熱惡寒今汗後不惡寒但倍發熱而躁始脈浮大今脈洪實或沉細數始惺靜今狂語此為胃實陽盛再汗即死須下之即愈亦有始得病便變陽盛之證須便下之不可拘以日數更有心胸連臍腹大段疰悶腹中疼坐臥不安冒悶喘急極者亦不候他證便下之凡大便祕妨悶恐尚有表證者亦須少少飲小承氣湯正四十二微解之不可過多令大泄也失下則氣血不通四肢便厥醫人不知反疑是陰厥復進熱藥禍如反掌不可不察也又問三陰有可下者乎三陰大約可溫然須有積證方可也何謂積證太陰腹滿時痛桂枝加芍藥湯正十二痛甚者桂枝加大黃湯正十三少陰口燥咽乾或腹滿不大便或下利清水心下痛皆積證也仲景云少陰病得之二三日口燥咽乾者急下之宜大承氣湯正四十一少陰病自利清水心下痛口乾者宜大承氣湯少陰病六七日腹滿不大便者宜大承氣湯也下證悉具服湯已更衣者止後服不爾盡劑服之更衣謂病人服承氣湯後得下利故勿與也下後慎不中服補藥孫真人云服大承氣湯得利瘥慎不中服補藥也熱氣得補覆成更復下之是重困也宜消息安養之大抵傷寒最慎於下若表證未罷不可亂投湯劑虛其胃氣仲景云表解而內不消非大滿猶生寒熱則病不除也表已解而內不消大滿大實堅有燥屎乃可下之雖四五日不能為禍若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣古人所以傷寒有承氣之戒脈浮者不可下仲景云脈浮者病在表可發其汗應汗而下為懊憹為痞為結胸脈虛細者不可下王叔和云脈微不可吐虛細不可下惡寒者不可下惡寒者表之虛雖是陽明證尚惡寒即與太陽合病屬表可發其汗少陰惡寒當溫之嘔吐者不可下仲景云嘔多雖有陽明證不可下陽明病脅下硬滿不大便而嘔舌上白苔者宜與小柴胡湯正二十九上焦得通津液得下胃氣因和身濈然汗出得屎而解不轉失氣者不可下轉失氣今人所謂下泄也傷寒論云陽明病不大便六七日恐有燥屎欲知之法少與小承氣湯腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但頭硬後必溏不可攻之攻之必脹滿不能食也又云陽明病譫語發潮熱脈滑而疾者小承氣湯主之正四十二因與小承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之仲景無治法今詳宜與小柴胡湯正二十九明日又不大便脈反微澀者裡虛也為難治仲景亦無治法宜與黃耆建中湯大便堅小便數不可用承氣湯攻之趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻子仁丸主之正九十二千金云脾約者大便堅小便利宜枳實丸太陽陽明者脾約乃是也小便清者不可下仲景云傷寒不大便六七日頭疼有熱與承氣湯小便清者知不在裡大便硬小便少者未可攻恐津液還入胃必先硬後溏也小便自如乃可攻之當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也陽明病自汗出若發汗小便自利者不可下此為津液內竭雖硬不可攻之當須自大便蜜導之若土瓜根大豬膽汁皆可導之正一百十一以此知古人慎用轉藥如此十五問表裡兩證俱見傷寒表證當汗里證當下不易之法也發表攻裡本自不同甘遂神丹不可以合飲桂枝承氣安可以並進然而假令病人脈浮而大是表證當汗其人發熱煩渴小便赤卻當下此是表裡證俱見五苓散主之正六十六仲景云中風發熱六七日不解而煩有表裡證渴欲飲水者水入則吐名曰水逆五苓散主之假令傷寒不大便六七日頭痛有熱者是里證當下其人小便清者知不在裡仍在表當鬚髮汗此是兩證俱見即未可下宜與桂枝湯正方一假令病人心下滿口不欲食大便硬脈沉細是里證當下其人頭汗出微惡寒手足冷卻當汗此兩證俱見者仲景所謂半在裡半在表也小柴胡湯主之正二十九假令太陽病表證未除而醫數下之遂協熱而利利不止心下痞硬仲景謂之表裡不解桂枝人參湯主之正十六本太陽病醫反下之因爾腹痛是有表復有里仲景用桂枝加芍藥湯正十二痛甚者桂枝加大黃湯正十三此皆仲景治傷寒有表復有里之法學者當以意推之也十六問無表裡證傷寒四五日後以至過經十三日為過經無表證又於裡證未可下者但非汗證亦非下證者皆可用小柴胡正二十九隨證加減用之加減法在第十二卷藥方中也以至十餘日者亦可用十餘日外用小柴胡湯不愈者若大便硬看證可下則用大柴胡下之正三十以過經其人氣稍虛當下者用大柴胡湯則穩蓋恐承氣湯太緊病人不禁也仲景云六七日目中不了了睛不和無表裡證大便難身微熱此為實也當下之宜大承氣湯正四十一又云病人無表裡證發熱七八日脈雖浮數可大柴胡下之正三十假令已下脈數不解至六七日不大便者有瘀血也屬抵當湯正九十一十七問病人有身大熱反欲得衣有身大寒反不欲近衣者此名表熱裡寒表寒裡熱也病人身大熱反欲得衣熱在皮膚寒在骨髓也仲景無治法宜先與陰旦湯雜方六寒已次以小柴胡加桂雜三十九以溫其表病人身大寒反不欲近衣寒在皮膚熱在骨髓也仲景亦無治法宜先與白虎加人參湯正六十五熱除次以桂枝麻黃各半湯正方二以解其外大抵病有標本治有先後表熱裡寒者脈須沉而遲手或微厥下利清穀也所以陰證亦有發熱者四逆湯正七十五通脈四逆湯主之正八十一表寒裡熱者脈必滑而厥口燥舌乾也所以少陰惡寒而踡時時自煩不欲厚衣用大柴胡下之正三十而愈此皆仲景之餘議也
