body:
  text: 卷第十此一卷首論結胸與痞蓋病發於陽下之早即為結胸發於陰下之早即為痞然結胸與痞相似但以痛不痛為異耳心下滿而硬痛者為結胸但按之滿不痛者為痞醫家不審一有差互立致危殆結胸屬陷胸證痞屬瀉心證其詳各於逐問備論之矣七十五問心下緊滿按之石硬而痛此名結胸也傷寒本無結胸應身熱下之早熱氣乘虛而入痞結不散便成結胸若已誤轉了初未成結胸者急頻與理中湯服正七十四自然解了更不作結胸蓋理中治中焦故也此古人亦説不到後人因消息得之若大段轉損有厥證者兼與四逆湯正七十五便安胃中雖和傷寒未退者即候日數足可下卻以承氣再下之正四十二蓋前來下得未是故也其證心下緊滿按之石硬而痛項強如柔痓狀發熱汗出不惡寒名曰柔痓其脈寸口浮關尺皆沉或沉緊名曰結胸也治結胸大率當下仲景云下之則和然脈浮與大皆不可下下之則死尚宜發汗也仲景云結胸脈浮者不可下只可用小陷胸湯正方四十大抵脈浮是尚有表證兼以小柴胡湯正二十九等先發表表證罷方用下結胸藥便安西晉崔行功云傷寒結胸欲絶心膈高起手不得近用大陷胸湯正三十八皆不瘥者此是下後虛逆氣已不理而毒復上攻氣毒相搏結於胸中當用枳實理中丸雜八十一先理其氣次療諸疾古今用之如神應手而愈然結胸有三種有大結胸不按而痛胸連臍腹堅硬為大結胸大陷胸丸主之正三十九有小結胸按之心下痛為小結胸小陷胸湯主之正四十有水結在胸脅間亦名結胸頭微汗出但結胸無大熱此水結在胸脅證小半夏加茯苓湯雜八十二小柴胡去棗加牡蠣主之正二十九又有寒熱二證有熱實結胸胸中煩躁心內懊憹舌上燥渴脈沉滑者皆熱證也大陷胸湯主之正三十八有寒實結胸寒實結胸無熱證者三物白散正八十八枳實理中丸主之雜方八十一近世治結胸多行金針丸用硫黃陽起石者若寒實結胸行之或有瘥者若熱實結胸行之必死也又問大陷胸湯與大陷胸丸如何大陷胸用甘遂太峻不可輕用須量虛實輕重不得已即大陷胸丸最穩又問聖餅子灸臍中如何此尤不可用也又云臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也二者病人脅下舊有痞連在臍旁痛引小腹入陰筋者亦名臟結死不治又問臟結者何也臟結者死仲景無治法大抵臟結其證如結胸狀飲食如故時時下利陽脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治也七十六問心下滿而不痛此名痞也傷寒本無痞應身冷醫反下之遂成痞枳實理中丸雜八十一最良仲景治痞氣諸湯中有生薑瀉心湯正六十三半夏瀉心湯正六十一此二方平和宜常用之仲景云滿而不痛者為痞柴胡不中與也半夏瀉心湯主之此湯藥味蓋本理中人參黃芩湯方也審知是痞先用桔梗枳殼湯尤妙雜八十三緣桔梗枳殼行氣下膈先用之無不驗也結胸與痞關脈須皆沉若關脈浮者大黃黃連黃芩瀉心湯正方五九主之關浮則結熱三黃以瀉肝若復惡寒汗出者附子瀉心湯正方六十主之病人心下痞與瀉心湯痞不解發渴口燥煩小便不利者五苓散正六十六主之汗出表解而胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之正六十三下利日數十行穀不化腹中雷鳴心下痞硬而滿此以醫下之也若復下之其痞益甚甘草瀉心湯主之正六十二蓋此非結熱以胃中虛客氣上逆故使硬也下利而心下痞服生薑瀉心湯甘草瀉心湯利不止者當治其下焦赤石脂禹餘糧湯主之正一百九蓋生薑瀉心甘草瀉心皆治中焦此利在下焦若只治中焦則利益甚耳服赤石脂禹餘糧湯利復不止當利其小便五苓散主之凡痞服瀉心湯不愈然後可用陷胸丸正三十九下之不可用陷胸湯蓋太猛只用陷胸丸大抵結胸與痞皆應下然表未解者不可攻也仲景云當先解表表解乃可攻痞解表宜桂枝湯正方一攻痞宜大黃黃連瀉心湯正五十九外證未解心下妨悶者非痞也謂之支結柴胡桂枝湯主之正三十一胸脅滿微結小柴胡湯加乾薑牡蠣湯主之正二十九若太陽證未除而數下之遂協熱而利利不止心下痞硬表裡不解者桂枝人參湯主之正方十六十棗湯正八十九大柴胡湯正三十皆治心下痞此方尤難用須是表證罷不惡寒身涼其人漐漐汗出發作有時頭疼心下痞硬滿引脅下疼乾嘔短氣者乃可行十棗湯表未解者慎不可用也大柴胡湯治傷寒發熱汗出不解心下痞硬嘔吐而下利者非大柴胡湯不可也正方三十若發汗吐下後心下痞硬噫氣不除者旋覆代赭湯主之正方一百十有旋覆代赭湯證其人或咳逆氣虛者先服四逆湯正七十五胃寒者先服理中丸正七十四次服旋覆代赭湯為良旋覆花代赭湯是解後心下痞硬證七十七問嘔者乾嘔附無陽則厥無陰則嘔嘔者足陽明胃之經足陽明之氣下行今厥而上行故為氣逆氣逆則嘔仲景云嘔多雖不大便不可下可與小柴胡湯正二十九上焦得通津液得下胃氣因和浹然汗出而解大抵嘔證不一各有治法要之小柴胡湯尤相主當耳與小柴胡湯胸脅滿而嘔日晡發潮熱者可小柴胡湯加芒硝也正方三十四若嘔不止心下急鬱郁微煩者與大柴胡湯也正方三十大便祕者方加大黃大柴胡治嘔最妙為內有枳實故也枳實去穢壓虛氣須是去大黃仲景云嘔多雖有陽明證慎不可下官局桔梗湯最良亦用枳實耳方具第十七卷中古人治嘔多用半夏生薑孫真人云生薑是嘔家聖藥仲景治嘔皆用之太陽與陽明合病必下利若不利但嘔者葛根加半夏生薑湯正二十七主之胸中有熱胃中有邪氣腹痛欲嘔者黃連湯主之正八十三太陽與少陽合病而自利若嘔者黃芩加半夏生薑湯主之正八十六金匱諸嘔吐谷不得下者小半夏湯小半夏加茯苓湯雜八十二小半夏加橘皮湯皆可選用也嘔而發熱者小柴胡湯主之正二十九嘔而發渴者豬苓湯主之正六十七先嘔卻渴者此為欲解急與之水先渴卻嘔者為水停心下此屬飲家仲景云本渴飲水而嘔者柴胡不中與也宜治膈間有水赤茯苓湯主之雜八十四若少陰證而嘔者真武湯去附子加生薑也正一百五若汗若吐若下後虛煩不得眠若嘔者梔子生薑湯主之正四十七傷寒瘥後嘔者有餘熱在胃脘竹葉湯加生薑主之正九十五又問有乾嘔者何也大凡嘔者飲食不下乾嘔者今人所謂啘也或因汗出或因有水或因下利脾胃有熱故使乾嘔官局中桔梗湯最佳雜方一百二十一仲景治法汗自出乾嘔者桂枝證也正方一表不解心下有水氣乾嘔發熱者小青龍也正三十六身涼汗出兩脅痛或乾嘔者十棗湯也正八十九少陰下利脈微與白通湯正方九十八利不止厥逆無脈乾嘔煩者白通加豬膽汁湯也正九十八少陰下利裡寒外熱脈干欲絶或乾嘔者通脈四逆湯也正八十一乾嘔吐涎沫頭痛者吳茱萸湯也正方一百傷寒論云食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也仲景無治法大抵吳茱萸湯治少陰證也谷入胃而嘔屬陽明宜與小柴胡湯正二十九若病人直患嘔吐而復腳弱或疼乃是腳氣當作腳氣治之法在第七卷五十四問七十八問吐吐有冷熱二證寸口脈數手心熱煩渴而吐以有熱在胃脘五苓散主之正六十六傷寒有表證渴欲飲水也水入口即吐者名曰水逆由心經受熱而小腸不利故也宜服五苓散發汗後水藥不得入口為逆若更發汗必吐下不止小半夏加茯苓湯大半夏加橘皮湯主之曾經汗下關脈遲胃中虛冷而吐乾薑黃芩黃連人參湯主之正方一百七寒多不飲水而吐者理中湯去朮加生薑主之正七十四少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯正方七五吐利手足逆冷煩躁甚者吳茱萸湯主之正方一百若傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之正方九十五七十九問嘔吐而利嘔吐而下利有兩證仲景云傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯下之正方三十又有霍亂證霍亂嘔吐而利熱多而渴者五苓散正方六十六寒多不飲水者理中丸正七十四或有寒腹滿痛或四肢拘急下利腳轉筋理中湯加附子一枚生用並粗末作湯服之正方七十四吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之正七十五少陰病吐利手足逆冷煩躁欲死吳茱萸湯主之正方一百吐利止而身體痛不休者當消息和解其外宜桂枝湯正方一仲景大柴胡一證云傷寒發熱汗出不解心中痞嘔吐而下利者大柴胡主之即非霍亂也吐利已汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽湯正八十二若夏月中暑霍亂上吐下利心腹撮痛大渴煩躁四肢逆冷冷汗自出兩腳轉筋宜服香薷散雜八十五須井中沉令極冷頓服之乃效香薷散夏月預宜合下以備此證其他藥不能救仍須極冷並服之八十問咳嗽傷寒咳嗽有兩證有太陽證咳嗽小青龍正三十六小柴胡也正二十九有少陰證咳嗽真武湯正一百五四逆散正七十六豬苓湯也正六十七大抵熱在上焦其人必飲水水停心下則肺為之浮肺主於咳水氣乘之故咳而微喘仲景云傷寒表不解心下有水乾嘔發熱而咳小青龍湯主之小便不利小腹滿者去麻黃加茯苓往來寒熱胸脅滿痛或咳者小柴胡湯主之小柴胡去人參大棗加五味子乾薑若少陰證咳嗽四肢沉重疼痛小便不利自下利而咳真武湯主之真武湯加五味子乾薑大抵傷寒水氣皆因飲水過多古人治水氣而咳者病在陽則小青龍湯主之病在陰則真武湯主之四肢厥逆腹中痛或泄利而咳四逆散主之四逆散加五味子乾薑下利六七日咳而嘔渴心煩不得眠豬苓湯主之正六十七古今録驗橘皮湯治嗽佳雜方一百二十四八十一問咽喉痛咽喉痛有陰陽二證脈浮數面赤斑斑如錦文咽喉痛唾膿血者此陽毒也在第四卷中二十一問脈沉遲手足厥冷或吐利而咽中痛此少陰證也病源云此為下部脈都不至陰陽隔絶邪客於足少陰之絡毒氣上衝故咽喉不利或痛而生瘡也傷寒脈陰陽俱緊及汗出者亡陽也此屬少陰法當咽痛而復吐利此候汗下熏尉俱不可汗出者藁本粉敷之咽喉痛者甘草湯正五十四桔梗湯正方一百二豬膚湯正方一百一半夏散正方一百三通脈四逆去芍藥加桔梗湯正方八十一麻黃升麻湯正二十五可選而用之又有伏氣之病謂非時有暴寒中人伏氣於少陰經始不覺病旬月乃發脈微弱法先咽痛似傷寒非喉痹之病次必下利始用半夏桂甘草湯雜五十三次四逆散主之正七十六此病只一二日便瘥古方謂之腎傷寒也八十二問口燥咽乾脾臟有熱則津液枯少故令口燥而舌乾仲景云傷寒無大熱口燥渴而煩背微寒者白虎湯加人參也正六十五又云陽明病渴欲飲水口乾舌燥者白虎加人參湯主之若咽乾者慎不可發汗發汗則重亡津液少陽證口苦咽乾者小柴胡主之正二十九少陰證口燥咽乾者急下之病人默默欲眠目不能開起居不安其聲嘎或咽乾者當作狐惑治之狐惑證在第十一卷九十九問八十三問病人但漱水不欲咽陽明證頭疼身熱口燥但漱水不欲入咽者必衄也若病人無表證不發寒熱胸腹滿唇燥但欲漱水不欲咽者此為有瘀血必發狂也輕者犀角地黃湯雜八六甚者抵當湯正九十一八十四問不欲眠太陽證發汗大汗出胃中干煩燥不得眠欲飲水者當少少與之胃中和即愈若脈浮小便不利發渴者五苓散正六十六主之下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之正七十三若發汗若吐若下後虛煩不得眠劇則反復顛倒心中懊憹者宜梔子豉湯正四十五吐之梔子豉湯一盞半為一劑分再服一服得吐止後服傷寒大熱乾嘔呻吟錯語不得眠黃連解毒湯主之雜八十七傷寒吐下後心煩乏氣晝夜不得眠酸棗湯主之雜八十八少陰病得之二三日以上心中煩不得眠黃連阿膠湯主之雜一百四若少陰病下利而渴不得眠豬苓湯主之正六十七又問傷寒瘥後不得眠何也蓋熱氣與諸陽相併陰氣未復所以病後仍不得睡也梔子烏梅湯主之雜八十九八十五問多眠多眠有四證有風溫證有小柴胡證有少陰證有狐惑證病人尺寸脈俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠者風溫證也風溫不可發汗宜葳蕤湯雜四十五在第六卷中第四十五問病人脈浮頭項強痛而惡寒者太陽證也十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯正二十九脈但浮者麻黃湯主之正二十病人尺寸脈俱沉細但欲寐者少陰證也急作四逆湯正七十五復其陽不可緩也若狀如傷寒四肢沉重忽忽喜眠須看上下唇上唇有瘡蟲蝕五臟下唇有瘡蟲蝕下部當作狐惑治之在第十一卷中第九十九問八十六問身涼汗出兩脅疼痛或乾嘔此十棗湯證也仲景云太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心中痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之正八十九大抵脅下痛者此為有飲須分表裡乾嘔微利發熱而咳為表有水小青龍湯加蕘花主之正三十六身體涼表證罷乾嘔而脅下痛為里有水十棗湯主之十棗湯非小青龍湯之比須量人虛實不可妄投
