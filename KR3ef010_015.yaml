body:
  text: 卷第十五通脈四逆湯八十一少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之屬少陰下利清穀裡寒外熱汗出而厥者通脈四逆湯屬厥陰甘草二兩炙乾薑三兩炮附子大者一枚去皮破八片生用上銼如麻豆大每服抄五錢匕水一盞半煎至八分去滓溫服未瘥急更作一劑其脈續續出者愈面赤者加連須蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩通脈四逆加豬膽湯八十二吐已下斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽湯主之屬霍亂甘草二兩炙乾薑三兩附子大者一枚生去皮豬膽汁半合上三味銼如麻豆大每服抄五錢匕以水一盞半煎至八分去滓內豬膽汁溫服其脈即來黃連湯八十三傷寒胸中有熱胃中有邪氣腹中痛欲嘔者黃連湯主之屬太陽甘草三兩炙黃連三兩乾薑三兩炮人參二兩半夏二兩半桂枝三兩上銼如麻豆大每服抄五錢匕棗二枚以水三盞煎取一盞半去滓分二服黃連阿膠湯八十四少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之黃連一兩阿膠三分黃芩一分芍藥半兩雞子黃半個上銼如麻豆大每半劑以水二盞煎取一盞去滓內膠消盡納雞子黃攪令勻溫服日二服黃芩湯八十五太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死屬厥陰黃芩一兩芍藥一兩甘草一兩炙上銼如麻豆大每服五錢棗子一枚以水一盞半煎至八分去滓溫服黃芩加半夏生薑湯八十六太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之屬太陽黃芩三分半夏二分半芍藥二分甘草二分上銼如麻豆大每服五錢生薑四片大棗子一枚以水二盞煎至八分去滓溫服文蛤散八十七病在陽應以汗解之反以冷水噀之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱症者與三物白散龐安常云小陷胸湯非也文蛤一兩上一味為散沸湯和服方寸匕三物白散八十八寒實結胸無熱證者與三物白散屬太陽貝母三分桔梗三分去蘆巴豆去心皮熬黑研如脂一分上為散納巴豆研勻以白飲和服強人半錢匕羸人可減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆若以水噀之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法十棗湯八十九太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也以十棗湯主之屬太陽芫花炒赤熬甘遂大戟各等分上各等分異篩秤末合和之入臼中再杵治三百下先以水一升半煎肥棗子一十枚煎取八合去滓納藥末強人一錢匕羸人可半錢再單飲棗湯送下平旦服若下少病不除者明日更服加半錢利後糜粥自養合下不下令人脹滿通身浮腫而死抵當丸九十傷寒有熱小腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸屬太陽水蛭五個熬去子杵碎水蛭再生化為害尤甚須銼斷用石灰炒過再熬桃仁四個去皮尖大黃三分去皮淨虻蟲五個去翅足熬上搗篩只為一丸以水一大白盞煎至七分頓服晬時當下血不下更作之抵當湯九十一太陽病六七日表症仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之太陽病身黃脈沉結小腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之傷寒有熱小腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當湯以上屬太陽陽明症其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑者宜抵當湯下之病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀喜飢至六七日不大便者有瘀血宜抵當湯主之以上屬陽明水蛭十枚熬去子杵碎水蛭入腹再生化為害尤甚須銼斷用石灰炒過再熬大黃一兩去皮酒洗虻蟲十枚去翅足熬桃仁七枚去皮尖捶碎用上銼如麻豆出作二服以水二盞煎至七分去滓溫服之麻仁丸九十二趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻子仁丸主之屬陽明麻仁五兩芍藥四兩厚朴五寸半去皮薑汁炙枳實四兩炙杏仁二兩半去皮尖大黃八兩去皮淨上為散蜜和為丸如桐子大飲下十丸未知益之日進三服茵陳蒿湯九十三陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之傷寒七八日身黃如橘子色小便不利腹微滿者以茵陳蒿湯主之屬陽明茵陳蒿嫩者一兩大黃三錢半去皮梔子大者三枚上銼如麻豆大以水二大白盞先煎茵陳減半盞次內二味煎八分去滓溫服日三服小便當利尿如皂莢汁狀色正赤一宿腹減黃從小便中去也牡蠣澤瀉散九十四大病瘥後從腰以下有水氣者牡蠣澤瀉散主之陰陽易瘥後勞復病脈證牡蠣熬澤瀉蜀漆洗去腥商陸熬葶藶熬海藻洗去咸栝蔞根各等分上為散飲服方寸匕小便利止後服竹葉石膏湯九十五傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之陰陽易瘥後勞復病脈證淡竹葉半把半夏六錢一字湯泡洗石膏四兩杵碎人參半兩甘草半兩炙麥門冬一兩一分去心嘔者加生薑一兩半上銼如麻豆大每服抄五錢匕水一盞半入生薑四片粳米百餘粒煎取八分米熟湯成去滓溫服枳實梔子湯九十六大病瘥後勞復者枳實梔子湯主之枳實一枚去穰麩炒梔子三枚半肥者豉一兩五錢綿裹上以清漿水二盞半空煮退八分內枳實梔子煎取九分下豉再煎五六沸去滓溫服覆令汗出若有宿食納大黃如博棋子五六枚同煎白通湯九十七少陰病下利脈微白通湯主之屬少陰附子一枚生用乾薑一兩炮上銼如麻豆大每服抄五錢匕水一盞半入蔥白四寸煮至七分去滓溫服白通加豬膽汁湯九十八少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生豬膽半合乾薑半兩炮蔥白四莖溺二合半附子半個生去皮上以水一盞煎五分去滓納尿膽汁和相得分溫再服桃花湯九十九少陰病下利便膿血者桃花湯主之少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之屬少陰赤石脂四兩一半碎一半篩末用乾薑一分炮上銼如麻豆大每服四錢入糯米一撮水一盞半煎至一盞去滓再入赤石脂末一方寸匕服日進三服若一服愈勿再服吳茱萸湯一百食谷欲嘔屬陽明也吳茱萸湯主之得湯反劇者屬上焦也屬陽明少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之屬少陰人參一兩去蘆吳茱萸一兩六錢五分湯洗三遍上銼如麻豆大每服四錢生薑四片棗子一枚以水二盞半煎至八分去滓分二服豬膚湯一百一少陰下利咽痛胸滿心煩豬膚湯屬少陰豬膚二兩六錢半上一味以水二大白盞半煮取一盞許去滓加白蜜一合半白粉一合相和溫服桔梗湯一百二少陰病二三日咽痛與甘草湯不瘥與桔梗湯屬少陰桔梗一兩甘草二兩炙上銼如麻豆大每服抄五錢匕水一盞半煎至八分去滓溫分再服半夏散及湯一百三少陰病咽中痛半夏散及湯屬少陰半夏湯洗桂枝去皮甘草炙上等分各別搗篩已令和治之每服三錢水一大盞煎至八分令冷少少咽之苦酒湯一百四少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之屬少陰半夏洗碎如棗核十四枚雞子一枚去黃納苦酒著雞子殼中上二味內半夏著苦酒中以雞子殼置刀環中安火上令二三沸去滓少少含咽之不瘥再服真武湯一百五太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之屬太陽少陰病二三日不已至四五日腹滿小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之屬少陰茯苓三分小便利者去茯苓白朮二分芍藥三分下利者去芍藥加乾薑二分附子一枚炮去皮破八片用二片嘔者去附子加入生薑三兩若咳者加五味子三分細辛一分乾薑一分上銼如麻豆大每服抄五錢匕生薑四片水一盞半煎至八分去滓溫服日進三服烏梅丸一百六傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩者此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人常自吐蛔蛔厥者以烏梅丸主之屬厥陰烏梅七十五枚細辛一兩半乾薑二兩半黃連四兩當歸一兩附子一兩半炮去皮蜀椒出汗一兩人參一兩半桂枝一兩半去皮黃柏一兩半上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟杵成泥和藥令相得納臼中與蜜杵二千下桐子大先食飲服十丸日進三服稍加至二十丸禁生冷滑物等乾薑黃芩黃連人參湯一百七傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃芩黃連人參湯主之屬厥陰乾薑三分炮黃芩三分黃連三分人參三分上銼如麻豆大每服抄五錢水一盞半煎至八分去滓溫服白頭翁湯一百八熱利下重者白頭翁湯主之下利慾飲水者以有熱也白頭翁湯以上屬厥陰白頭翁一兩黃柏一兩半秦皮一兩半黃連一兩半上銼如麻豆大分五服以水二大盞煎至八分去滓溫服不瘥再服赤石脂禹餘糧湯一百九傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中治中焦此利在下焦赤石脂禹餘糧湯主之復不止者當利其小便屬太陽赤石脂四兩禹餘糧四兩上銼碎每服抄五錢匕水一盞半煎至八分去滓溫服旋覆代赭湯一百十傷寒發熱若吐若下解後心下痞硬噫氣不除者旋覆代赭湯主之屬太陽旋覆花三分人參半兩代赭石一分甘草三分炙半夏三分湯洗上銼如麻豆大每服抄五錢匕生薑四片棗子一枚煎至八分去滓溫服瓜蒂散一百十一病如桂枝症頭不痛項不強寸脈微浮胸中痞硬氣上衝喉咽不得息者此為胸有寒也當吐之宜瓜蒂散主之屬太陽瓜蒂熬黃赤小豆各半兩上各搗篩已合治之取一錢匕豉一合湯七合先漬之須臾煮作稀糜去滓取汁和散溫頓服不吐少少加得快吐乃止諸亡血虛家不可與之蜜煎導湯一百十二陽明病自汗出若發汗小便自利者此為津液內竭屎雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導屬陽明蜜四兩上一味納銅器中微火煎之稍凝如飴狀攪之勿令焦看欲可丸捻作挺如指許長二寸當熱時急作令頭銳納穀道中以手急抱欲大便時乃去之豬膽汁方用大豬膽一枚瀉汁和法醋少許以灌穀道中如有一食頃當大便燒裩散一百十三傷寒陰易之為病其人身體重少氣小腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之婦人裩襠燒灰上一味以水和服方寸匕小便利陰頭腫即愈
