body:
  text: 卷第二十一此一卷論小兒瘡疹瘡疹與傷寒相類頭疼身熱足冷脈數疑似之間只與升麻湯緣升麻湯解肌兼治瘡子已發未發皆可服但不可疏轉此為大戒傷寒身熱固不可下瘡疹發熱在表尤不可轉世人不學乃云初覺以藥利之宣其毒也誤矣又云瘡豆已出不可疏轉出得已定或膿血大盛卻用疏利亦非也大抵瘡疹首尾皆不可下小兒身熱耳冷尻冷咳嗽輒用利藥即毒氣入里殺人但與化毒湯紫草木通湯鼠黏子湯出得大盛即用犀角地黃湯解之若瘡豆出不快煩躁不得眠者水解散麻黃黃芩湯升麻黃芩湯活血散主之黑瘡倒靨豬尾膏無比散龍腦膏子無不驗也若熱毒攻咽喉痛如聖湯瘡豆入眼決明散撥雲散蜜蒙花散通聖散蛤粉散主之治瘡疹法無出此矣升麻湯治傷寒中風頭痛憎寒壯熱支體痛發熱畏寒鼻乾不得睡兼治小兒大人瘡疹已發未發皆可服兼治寒暄不時人多疾疫乍暖脫著及暴熱之次忽變陰寒身體疼痛頭重如石本方四味見雜方第十六卷中犀角地黃湯治傷寒及溫病應發汗而不發汗內有瘀血者及鼻衄吐血不盡內有餘瘀血面黃大便黑者此方主消化瘀血兼治瘡疹出得太盛以此方解之本方四味方在雜方第十八卷中麻黃黃芩湯治小兒天行熱氣生豌豆瘡不快益煩躁昏憒或出尚身疼熱者本方五味在小兒方第二十卷中升麻黃芩湯治小兒時行瘡豆出不快煩躁不眠加木香一錢五分本方五味在小兒方第二十卷中化毒湯治小兒瘡豆已出未出並皆服之紫草嫩者升麻甘草炙各半兩上銼如麻豆大以水二盞糯米五十粒煎至一盞去滓溫服紫草木通湯治小兒瘡疹紫草去蘆木通人參茯苓去皮糯米各等分甘草半之上銼如麻豆大每服四錢匕以水一盞半煎至一盞去滓溫服鼠黏子湯治疹豆欲出未能得透皮膚熱氣攻咽喉眼赤心煩者鼠黏子四兩炒香甘草一兩炙防風半兩荊芥穗二兩上搗羅為末每服二錢沸湯點服食後臨臥逐日三服大利咽膈化痰涎止嗽若春冬間常服免生瘡癤老幼皆宜服水解散治天行頭痛壯熱一二日兼治疱瘡未出煩躁或出尚身體發熱大黃黃芩桂心甘草炙芍藥各二兩麻黃四兩去節湯泡焙稱上搗羅為末患者以生熟湯浴訖以暖水調下二錢相次二服得汗利便瘥強實人服二方寸匕此調風實之人三伏中宜用若去大黃即春夏通用活血散治瘡子或出不快用白芍藥末一錢酒調如欲止痛用溫熟水調下豬尾膏治瘡子倒厭用小豬兒尾尖刺血一兩點入生腦子少許同研新水調下立效無比散治瘡疹惡候不快及黑瘡子應一切惡候牛黃麝香龍腦膩粉各一分研細硃砂一兩先研如粉上為極細如有患者小兒一字大人半錢水銀少許同小豶豬尾上血三兩滴新汲水少許同調服先寧穩得睡然後取轉下如爛魚腸蒲桃穗之類涎臭惡物便安小兒用奶汁滴尤妙龍腦膏子治時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見鬼神或已發而陷伏皆宜速治不爾毒入臟必死生龍腦一錢上細研旋滴豬心血和丸雞頭肉大每服一丸心煩狂躁者用紫草湯化下若瘡子陷伏者用溫酒化下少時心神便定得睡瘡疹發透依常將息也如聖湯治小兒瘡疹毒攻咽喉腫痛桔梗一兩牛蒡子炒一兩甘草生一兩麥門冬去心半兩上為細末每服二錢沸湯點細細呷服入竹葉煎服尤妙決明散治疹痘瘡入眼決明子一分栝蔞根半分赤芍藥一分甘草一分炙上搗羅為末每服半錢蜜水調下日進三服撥雲散治疹痘瘡入眼及生翳桑螵蛸真者一兩炙令焦細研上搗羅為細末入麝香少許令勻每服二錢生米泔調下臨臥服之蜜蒙花散治疹痘瘡並諸毒氣入眼蜜蒙花一錢半淨青葙子決明子車前子各半錢上為細末用羊肝一片破開作三片摻藥令勻卻合作一片以濕紙七重裹煻灰火中煨熟空心食通聖散治疹痘瘡入眼及生翳白菊花一兩如無則甘菊花代之然不如白菊緑豆皮穀精草去根各一兩上搗羅為末每服用一大錢乾柿一個生粟米泔一盞共一處煎候米泔盡只將乾柿去核吃之不拘時候一日可吃三枚日淺者五七日可效遠者半月餘矣蛤粉散治小兒瘡子入眼穀精草蛤粉各等分上為末每服一錢匕豬肝二兩許批開摻藥捲了青竹葉裹麻縷纏定水一碗煮令熟入收口瓷瓶內熏眼候溫取食日作不過十日退
