body:
  text: 卷第六此一卷論傷寒傷風熱病中暑溫病溫瘧風溫溫疫中濕濕溫痓病溫毒之名天下之事名定而實辨言順則事成又況傷寒之名種種不同若識其名縱有差失功有淺深效有遲速耳不得其名妄加治療往往中暑乃作熱病治之反用溫藥濕溫乃作風溫治之復加發汗名實混淆是非紛亂性命之寄危於風燭今於逐問下詳載疾狀而名之曰某病庶幾因名識病因病識證如暗得明胸中曉然而處病不瘥矣三十八問脈浮而緊澀頭疼身體拘急惡寒無汗寒多熱少面色慘而不舒腰脊疼痛手足指末微厥不煩躁此名傷寒也傷寒之候發熱惡寒頭疼腰脊痛脈緊無汗宜發汗而解麻黃湯主之正二十輕者只與桂枝麻黃各半湯正二又人參順氣散雜三十蔥豉湯雜七四蒼朮散雜三一麻黃葛根湯雜三十二可選而用之然太陽病亦有熱多寒少者須仔細看脈與證也熱多寒少不嘔清便自可宜桂枝麻黃各半湯若脈浮者雖熱多寒少自可發汗若脈弱者無陽也桂枝二越婢一湯主之正四熱多寒少而尺脈遲者營氣不足血少故也先以小建中湯正三十七加黃耆最良尺脈尚遲再作一劑或太陽證宜汗而其人適失血及下利則頻頻與少桂枝湯正乙使體潤漐漐連日當自解假如淋家衄血家法不可汗亦可用小柴胡正二十九之類和解之三十九問脈浮而緩寸大而尺弱自汗體熱頭疼惡風熱多寒少其面光而不慘煩躁手足不冷此名傷風也傷風之候頭疼發熱脈緩汗出惡風當須解肌宜桂枝湯主之正一輕者只與柴胡桂枝湯正三十一敗毒散雜三十三獨活散雜三十四可選用之治太陽中風有汗用桂枝湯凡脈緊必無汗唯濡而緊卻自汗勿誤用小建中湯也正三十七須是脈浮而緩者方可用桂枝也項背強者桂枝湯加葛根也正十八本草葛根主傷風有濕開竅解肌蓋桂枝加葛根者謂中風有濕當加之去其風濕取微汗者風濕去也裡寒者桂枝去芍藥加附子湯也正八不飲水者是也凡發汗後汗不止為漏風桂枝加附子湯主之正六腹滿者太陰證脈浮者可服桂枝湯微發汗腹痛者桂枝加芍藥湯正十二痛甚者桂枝加大黃湯也正十三雖然桂枝湯自西北二方居人四時行之無不應驗自江淮間唯冬及春初可行自春末及夏至以前桂枝證可加黃芩半兩陽旦湯是也雜百十六夏至後有桂枝證可加知母一兩石膏二兩或加升麻半兩若病人素虛寒者正用古方不在加減也岐伯所謂同病異治者此也大抵用溫藥當避春用熱藥當避夏素問所謂用溫遠溫用熱遠熱者也又問傷寒與傷風何以別之傷寒者脈緊而澀傷風者脈浮而緩傷寒者無汗脈澀故也傷風者有汗傷寒者畏寒不畏風傷風者畏風不畏寒大抵太陽病者必脈浮發熱惡風惡寒也惡寒者不當風而自增寒惡風者當風而增寒也六經皆有傷寒傷風其證各異太陽脈浮有汗為中風脈緊無汗為傷寒陽明善飢為中風不食為傷寒少陽兩耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒若三陰傷風無變異形證但四肢煩疼餘證同三陽四十問有發熱惡寒煩躁手足溫而脈反浮緊者有寒多熱少不煩躁手足微冷而脈反浮緩者此名傷風見寒脈傷寒見風脈也蓋發熱惡風煩躁手足溫為中風候脈浮緊為傷寒脈是中風見寒脈也寒多熱少不煩躁手足微厥為傷寒候脈浮緩為中風脈是傷寒見風脈也中風見寒脈傷寒見風脈宜服大青龍湯正三十五蓋大青龍證脈似桂枝反無汗病似麻黃反煩躁是也脈弱有汗為桂枝證脈緊不煩躁為麻黃證大青龍湯治病與麻黃湯證相似但病尤重而又加煩躁者用大青龍湯也以其中風並傷寒俱盛故青龍湯添麻黃作六兩又似合桂枝湯藥味在內添石膏所以為緊此治營衛俱病若證不審誤用大青龍湯則發汗多傷人以其有煩躁一證故可用大青龍湯大抵感外風者為傷風感寒冷者為傷寒故風則傷衛寒則傷營桂枝主傷衛麻黃主傷營大青龍主營衛俱傷故也風傷衛者病在皮膚之間也以衛行脈外為陽主外皮膚之間衛氣之道路故也其病淺寒傷營者寒氣中於肌肉也以營行脈中為陰主內肌肉之間營氣之道路故也其病深所以桂枝與麻黃所施各異戒勿誤用以有淺深之別風寒之殊大醫當宜審諦大青龍尤宜慎用仲景云脈微弱汗出惡風者不可服青龍服之則厥逆筋惕肉瞤此為逆也類纂云凡發汗過多筋惕肉瞤振搖動人或虛羸之人微汗出便有此證俱宜服真武湯正百五以救之羸甚者芍藥或量多少與之惡熱藥者去附子余依加減法仲景制真武湯乃為合用桂枝卻用麻黃之類發汗多亡陽有此證故用真武湯若調理順者無此證也四十一問夏月發熱惡寒頭疼身體支節痛重其脈洪盛者此名熱病也冬傷於寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯正一無汗宜麻黃湯正二十加煩躁者宜大青龍湯正三十五然夏月藥性須帶涼不可太溫桂枝麻黃大青龍鬚用加減法夏至前桂枝加黃芩半兩夏至後桂枝麻黃大青龍加知母一兩石膏二兩或加升麻半兩也蓋桂枝麻黃湯性熱地暖之處非西北之比夏月服之必有發黃斑出之失熱病三日外與湯不瘥脈勢仍數邪氣猶在經絡未入臟腑者桂枝石膏湯主之雜三十五此方夏至後代桂枝證用若加麻黃半兩可代麻黃青龍湯用也古方三月至夏為晚發傷寒梔子升麻湯雜三十六亦可選用之又問夏至後皆可行白虎湯液耶白虎湯治中暑與汗後一解表藥耳今之醫者見六月中病多雲中暑不辨熱病用藥大涼又況夏月陰氣在內最難調治白虎湯尤宜戒之四十二問夏月自汗惡寒身熱而渴其脈微弱者此名中暑也大抵中暑與熱病外證相似但熱病者脈盛中暑者脈虛以此別之甲乙經云脈盛身寒得之傷寒脈虛身熱得之傷暑蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛傷寒即身體支節痛重其脈洪盛按之有力此是冬月感寒深至夏發耳中暑即背寒面垢其面如塗油類纂云面垢者陽證也一名面塵若塵埃之著面手足微冷煩渴口燥但覺倦怠四肢卻不痛重其脈微弱按之無力白虎湯主之正六四痰逆惡寒者橘皮湯主之雜四不惡寒者竹葉湯主之正九五頭疼噁心煩躁心下不快者五苓散正六六最妙又問中暑何故灑然毛聳惡寒答曰經云四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開開則灑然寒閉則熱而悶近人多不明中暑或作熱病法治之復用溫熱藥必致發黃斑出更為蓄血尤宜戒之四十三問夏至以前發熱惡寒頭疼身體痛其脈浮緊此名溫病也春月傷寒謂之溫病冬傷於寒輕者夏至以前發為溫病蓋因春溫暖之氣而發也又非溫疫也治溫病與冬月傷寒夏月熱病不同蓋熱輕故也春初秋末陽氣在裡其病稍輕縱不用藥治之五六日亦自安升麻湯雜一解肌湯雜三八柴胡桂枝湯正三一最良熱多者小柴胡湯主之正二九不渴外有微熱者小柴胡加桂枝也嗽者小柴胡加五味子也或煩渴發熱不惡寒與虛煩者並竹葉石膏湯正九五次第服之麻黃桂枝大青龍唯西北二方四時行之無有不驗若江淮間地偏暖處唯冬月及正初乃可用正方自春末至夏至以前桂枝麻黃大青龍內宜加減也加減法在熱病門四十四問病人先熱後寒尺寸脈俱盛此名溫瘧也先熱後寒名曰溫瘧病人尺寸俱盛重感於寒變成溫瘧小柴胡湯主之正二九瘧疾寒熱相等及先熱後寒者俱宜與小柴胡湯先寒後熱者小柴胡加桂湯雜三九有多熱但熱者白虎加桂湯雜四十有多寒但寒者柴胡桂薑湯雜四一有汗多煩渴小便赤澀素有瘴氣及不服水土嘔吐甚者可服五苓散正六六脈小緊寒熱嘔吐間日頻日發作無時大便祕者可服大柴胡湯下之正三十脈浮大寒熱往來者可服祛邪丸吐之雜四三久不愈者服瘧母煎丸雜四二當自愈治瘧之法無以過也大抵瘧脈自弦弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可溫之弦緊者可發汗浮者可吐之夏傷於暑秋必病瘧此非傷寒之謂以其壞傷寒有溫瘧一證故因而及之四十五問脈尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠此名風溫也其人素傷於風因復傷於熱風熱相搏即發風溫主四肢不收左傳曰風淫末疾頭疼身熱常自汗出不解治在少陰厥陰少陰火厥陰風不可發汗發汗即譫言獨語內煩躁擾不得臥若驚癇目亂無精療之者復發其汗如此死者醫殺之也風溫不可發汗宜葳蕤湯雜四五風溫身灼熱者知母乾葛湯雜四六風溫加渴甚者栝蔞根湯雜四七風溫脈浮身重汗出漢防己湯雜四八四十六問一歲之中長幼疾狀多相似此名溫疫也四時皆有不正之氣春夏亦有寒清時秋冬或有暄暑時人感疫厲之氣故一歲之中病無長少率相似者此則時行之氣俗謂之天行是也老君神明散雜四九務成子螢火丸聖散子並雜五十敗毒散雜三十三冬氣溫春氣寒夏氣冷秋氣熱為時氣時氣與傷寒同而治有異者蓋因四時不正之氣而變更不拘以日數淺深汗吐下隨證施行所以聖散子不問表裡陰陽者此也唯聖散子性差熱用者宜詳之若春應暖而清氣折之則責邪在肝三四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕升麻散雜一解肌湯主之雜三十八夏應暑而寒氣折之則責邪在心五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微調中湯雜五一射干湯雜五二半夏桂枝甘草湯雜五三可選而用之秋應涼而反大熱抑之則責邪在肺濕熱相搏民多病疸疸者黃也宜白虎加蒼朮湯雜百十七煎茵陳汁調五苓散正六十六冬應寒而反大溫抑之則責邪在腎其冬有非節之暖者名為冬溫此屬春時陽氣發於冬時則伏寒變為溫病宜葳蕤湯雜四五仲景云冬溫之毒與傷寒大異蓋傷寒者傷寒氣而作冬溫者感溫氣而作寒疫者暴寒折人非觸冒之過其治法不同所施寒熱溫涼之劑亦異不可拘以日數發汗吐下隨證施行要之治熱以寒溫而行之治溫以清冷而行之治寒以熱涼而行之治清以溫熱而行之以平為期不可以過此為大法四十七問一身盡痛發熱身黃小便不利大便反快者此名中濕也風雨襲虛山澤蒸氣人多中濕濕流關節須身體煩痛其脈沉緩為中濕脈細者非也主一身盡痛發熱身黃小便自利者朮附湯正七十若小便不利大便反快當利其小便宜甘草附子湯正七一五苓散正六六主之至真要論云治濕之法不利小便非其治也金匱要略云濕家身煩痛可與麻黃湯加白朮四分發其汗慎不可以火攻之濕家雖身體痛不可太發汗汗出則作痓大抵中濕者水濕之蒸氣及汗出當風取冷過度或中霧露與風寒氣合者曰痹皆由中於濕而後挾以異氣其寒多者為痛為浮腫非附子桂術不能去也其風多者為煩熱為流走為拘急非麻黃薏苡烏頭輩不能散也其中氣者為堅滿為癃閉非甘遂葶藶枳朮不能泄也四十八問支體痛重不可轉側額上微汗不欲去被或身微腫此名風濕也脈浮為風濕是風氣與濕氣相搏肢體痛重不可轉側額上微汗不欲去被或身微腫欲發汗但漐漐身潤則風濕俱去若大發其汗則風氣去濕氣在矣麻黃杏子薏苡甘草湯雜五四防己黃耆湯雜五五桂枝附子湯正六九桂枝加白朮湯甘草附子湯正七一朮附湯正七十杏仁湯雜五六敗毒散雜三十三可選而用之身腫者甘草附子湯加防風四十九問兩脛逆冷胸腹滿多汗頭目痛苦妄言此名濕溫也其人嘗傷於濕因而中暑濕熱相搏則發濕溫病苦兩脛逆冷腹滿又胸多汗頭目痛苦妄言其脈陽濡而弱陰小而急治在太陰脾屬土主濕不可發汗汗出必不能言耳聾不知痛所在身青面色變名曰重如此死者醫殺之耳白虎加蒼朮湯雜百十七主之此方出傷寒微旨亦仿金匱白虎加桂湯雜四十五十問發熱惡寒頸項強急腰身反張如中風狀或瘛瘲口噤此名痓也傷風頸項強急身體反張屬太陽經先因傷風又感寒濕而致然也古人謂之痓病痓音幟又作痙巨郢反痓者強直也古人以強直為痓金匱要略云太陽病其身體𠘧𠘧便為痓也外證發熱惡寒與傷寒相似但其脈沉遲弦細而項背反張強硬如發癇之狀此為異耳新産血虛多汗出喜中風亦有此證當察其有汗無汗以分剛痓柔痓無汗惡寒名剛痓有汗不惡寒名柔痓無汗葛根湯主之正草六有汗桂枝加葛根湯正十八主之本草葛根主傷風有濕開竅解肌凡剛柔二痓小續命湯雜五七並可與之有汗者小續命湯去麻黃加葛根也若審知剛痓胸滿口噤其人臥不著席腳攣急咬齒當行大承氣湯正四一外臺云熱而痓者死熱病痙者反折瘛瘲齒噤齘也又問剛柔二痓與陰陽二痙是如何痓亦作痙陽痙屬剛痓陰痙屬柔痓附術散雜五八桂心白朮湯雜五九附子防風散雜六十八物白朮散雜六一桂枝煮散可選而用之活人續集解惑論云合面而臥為陰痙仰目者為陽痙又云或因濕家發汗多則發痓也又五十問初春病人肌肉發斑癮疹如錦紋或咳心悶但嘔清汁此名溫毒也溫毒發斑者冬時觸冒疹毒至春始發病初在表或已發汗吐下而表證未罷毒氣不散故發斑黑膏主之又有冬月溫暖人感乖戾之氣冬未即病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒始發則肌肉斑爛癮疹如錦紋而咳心悶但嘔清汁葛根橘皮湯主之雜九四黃連橘皮湯雜百草五尤佳
