body:
  text: 卷第二十二傷寒十勸一傷寒頭疼又身熱便是陽證不可服熱藥傷寒傳三陰三陽共六經內太陰病頭不疼身不熱少陰病有反發熱無頭疼厥陰病有頭疼而無發熱故知頭疼又身熱即是陽證若投熱藥必不救二傷寒當直攻毒氣不可補益邪氣在經絡中若隨證早攻之只三四日痊安醫者乃妄謂先須正氣卻行補益使毒氣流熾致殺人三傷寒不思飲食不可服溫脾藥傷寒不思飲食自是常事終無飢死之理如理中丸之類亦不可輕服若陽病服之致熱氣增重或致不救四傷寒腹痛亦有熱證不可服溫暖藥難經云痛為實故仲景論腹滿時痛之證有曰痛甚者加大黃夫痛甚而反加大黃意可見也惟身冷厥逆而腹痛者方是陰證須消息之每見醫者多緣腹痛便投熱藥而致殺人也五傷寒自利當看陰陽證不可例服補暖及止瀉藥自利惟身不熱手足溫者屬太陰身冷四逆者屬少陰厥陰外其餘身熱下利皆是陽證當隨證依仲景法治之每見醫者多緣下利便投暖藥及止瀉藥而殺人六傷寒胸脅痛及腹脹滿不可妄用艾灸常見村落間有此證無藥便用艾灸多致毒氣隨火而熾膨脹發喘而死不知胸脅痛自屬少陽腹膨脹自屬太陰也此外惟陰證乃可灸耳七傷寒手足厥冷當看陰陽不可一例作陰證治有陰厥有陽厥醫者少能分辨陽厥而投熱藥殺人速於用刃蓋陽病不至於極熱不能發厥仲景所謂熱深者厥深也熱深而更與熱藥寧復有活之理但看初得病而身熱至三日以後熱氣已深大便祕小便赤或譫語昏憒及別有熱證而反發厥者必是陽證也宜急用承氣湯下之若初得病身不熱大便不祕自引衣蓋身或下利或小便數不見熱證而厥逆者即是陰厥也方可用四逆湯之類二厥所以使人疑者緣脈皆沉然陽厥脈沉而滑陰厥脈沉而弱又陽厥時復指爪卻溫陰厥常冷此為可別也八傷寒已在裡即不可輕用藥發汗傷寒證須看表里如發熱惡寒則是在表正宜發汗如不惡寒反惡熱則是里證若醫者一例發汗則所出之汗不是邪氣皆是真氣邪氣未除而真氣先涸死者多矣又半在表半在裡之證及無表裡之證不惟皆不可下仍亦皆不可汗但當隨證而治之可也九傷寒飲水為欲愈不可令病人恣飲過度病人大渴當與之水以消熱氣故仲景以飲水為欲愈人見此説遂令病人縱飲由是為嘔為噦為咳逆為下利為腫為悸為水結為小便不利者多矣且如病人欲飲一碗只可半碗之水少少與之為善也十傷寒初瘥不可過飽及勞動或食羊肉及行房事與食諸骨汁並飲酒病方愈脾胃尚弱食而過飽不能消化病即再來謂之食復病方愈氣血尚虛勞動太早病亦再來謂之勞復又傷寒食羊肉行房事立死食諸汁飲酒者再病之也豫每念父祖俱死於傷寒乃取仲景所著深繹熟玩八年之後始大通悟陰陽經絡病證藥性俱瞭然於胸中緣比年江淮之民冒寒避寇得此疾者頗衆茲依仲景法隨證而施之藥所活不啻數百人仍知傷寒本無惡證皆是妄投藥劑所致因追悼父祖之命皆為庸醫所殺而又嘆人無間於貧富貴賤於此不能自曉則輕付一命於庸工之手也今輒托其流弊多誤有害於命者略開其説目曰傷寒十勸其言不欲成文冀人易曉而以為深戒云
