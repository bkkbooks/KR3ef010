body:
  text: 卷第十一此一卷首論咳逆傷寒咳逆此證極惡仲景經中不載孫真人云咳逆遍尋方論無此名稱深窮其狀咳逆者噦逆之名蓋古人以咳逆為噦耳大抵咳逆者古人所謂噦是也啘者今人所謂乾嘔是也八十七問咳逆咳逆者仲景所謂噦者是也乙芮切逆氣噦胃寒所生傷寒本虛攻其熱必噦又云傷寒大吐下之極虛復發汗者其人外怫鬱復與之水以發其汗因得噦所以然者胃中寒故也橘皮乾薑湯雜方九十羌活附子散雜九一半夏生薑湯雜九十二退陰散主之雜方十四若服藥不瘥者灸之必愈其法婦人屈乳頭向下盡處骨間灸三壯丈夫及乳小者以一指為率正以男左女右艾炷如小豆許與乳相直間陷中動脈處是然亦有陽證咳逆者小柴胡湯正二十九橘皮竹茹湯雜方五仲景又云傷寒噦而腹滿視其前後知何部不利利之即愈仲景無方前部宜豬苓湯正六十七後部宜調胃承氣湯正四十三扁鵲中藏經治傷寒咳逆丁香散丁香柿蒂各一分甘草良薑各半錢沸湯點作一服乘熱猛吃極效三因第十一卷又有竹茹湯等方亦丁香散方竹茹湯治陽證也本事方第八卷治傷寒候咳逆豆蔻湯治陰證咳逆丁香茴香肉豆蔻等藥若陽證不可用凡咳逆多有先熱而吃生冷或涼藥多相激而成蓋陰陽二氣相搏林人之僕本發大熱以涼藥下之想太甚咳逆四五日竟至於服丁香柿蒂而後卻再以小柴胡之屬解其餘熱遂愈下後蓋有身熱不解治傷寒咳逆後二方出撫州華蓋山周先生惟一備急方救急方香附子橘核各半兩細銼用酒半盞先將藥在石銀器內炒漸漸滴酒炒藥焦黃色研細末每二錢水一小盞煎至八分細細旋呷服一方單用香附子末又方大蒜頭二個煨動研爆入白薑末丸得為度研和如梧桐子大搗薤菜自然汁吞下二十丸病退再服一十五丸八十八問發黃病人寒濕在裡不散熱蓄於脾胃腠理不開瘀熱與宿谷相搏鬱蒸不消化故發黃漢贊南方暑濕近夏疸熱蓋疸者黃也古人以黃為疸濕熱相搏民多病疸甚為跗腫也然發黃與瘀血外證及脈俱相似但小便不利為黃小便自利為瘀血要之發黃之人心脾蘊積發熱引飲脈必浮滑而緊數若瘀血證即如狂大便必黑此為異耳凡病人身體發熱頭面汗出身無汗劑頸而止渴引水漿小便不利如此必發黃茵陳蒿湯正九十三加五苓散正六十六也茵陳蒿湯十分五苓散五分二件拌和每服一錢溫水調下日三服病人服湯得小便利如皂莢汁赤一宿腹減則黃從小便中出也古人云治濕不利小便非其治也大抵發黃者瘀熱在裡由小便不利而致之也梔子柏皮湯正方五十麻黃連翹赤小豆湯正二十四可選而用之又方傷寒欲發黃者急用瓜蒂末口含水搐一字許入鼻中出黃水甚驗即用茵陳蒿湯調五苓散服之最良又問白虎證亦身熱煩渴引飲小便不利何以不發黃答曰白虎與發黃證相近遍身汗出此為熱越白虎證也頭面汗出頸以下都無汗發黃證也又問太陽病一身盡痛發熱身如熏黃者何太陽中濕也仲景云傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之第九卷六十九問又問病人脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時咳嗽者何也少陽中風也小柴胡湯主之正方二十九八十九問發狂發狂有二證陽毒發狂蓄血如狂其外證與脈皆不同病人煩躁狂走妄言面赤咽痛脈實潮熱獨語如見鬼狀此陽毒也治藥方在二十一問病人無表證不發寒熱唇燥但欲漱水不欲入咽其脈微而沉小腹硬滿小便反利大便必黑身黃髮狂此血證諦也病人如熱狀煩滿口燥其脈反無熱此為陰伏其血證審矣仲景云太陽病不解熱結膀胱其人如狂其血自下者愈若外不解者尚未可攻當先解其表且桂枝湯正方一外已解但小腹急結者乃可攻之屬桃仁承氣湯主之正四十四大抵傷寒當汗不汗熱蓄在裡熱化為血其人喜忘而如狂血上逆則喜忘血下蓄則內爭甚者抵當湯正九十一抵當丸正方九十輕者桃仁承氣湯正四十四犀角地黃湯雜八十六須取盡黑物為效夫血熱蓄在膀胱經若用抵當湯更須仔細審其有無表證若有蓄血證而外不解亦未可便用抵當湯先用桂枝湯以解其外緣熱在膀胱太陽經故也又有火邪發驚狂者醫以火於臥床下或周身用火迫劫汗出或尉而成火邪其人亡陽煩躁驚狂臥起不安桂枝去芍藥加蜀漆牡蠣龍骨救逆湯正方十桂枝甘草龍骨牡蠣湯正方十四主之凡灸及燒針後證似火劫者並用劫法治之金匱風引湯尤良柴胡加龍骨牡蠣湯更捷正三十三九十問發斑發斑有兩證溫病發斑熱病發斑溫毒發斑者冬月觸冒寒毒至春始發或已汗下表證未除毒氣未解故發斑黑膏主之雜九十三或冬月溫暖人感乖戾之氣至春初為積寒所折毒氣未得泄逮天氣暄暖溫毒始發肌肉斑爛癮疹如錦文而咳心悶嘔清汁葛根橘皮湯雜九十四屢用之驗黃連橘皮湯亦佳雜一百二十五廣州褚倅子斑如壞梨靨熱病發斑者與時氣發斑同或未汗下或已汗下熱毒不散表虛里實熱毒乘虛出於皮膚遂發斑瘡癮疹如錦紋俗呼瘡麩素問謂之疹發斑者下之太早熱氣乘虛故也下之太遲熱留胃中亦發斑服熱藥過多亦發斑微者赤斑出五死一生劇者黑斑出十死一生大抵發斑不可用表藥表虛里實若發汗開泄更增斑爛也皆當用化斑湯雜百二十玄參升麻湯雜九十五阿膠大青湯雜九十六豬膽梔子湯雜四十四或與紫雪大妙可下者與調胃承氣湯正四十三暑月陽氣重者常宜體候才有赤點如蚊蚤咬卻急治之又有陽毒發斑見十九問二十一問宜參酌之九十一問譫語病人有譫語有鄭聲二證鄭聲為虛當用溫藥白通湯主之正九十七譫語為實當須調胃承氣湯主之正四十三服調胃承氣而譫語止或更衣者停後服不爾再與之仲景云實則譫語虛則鄭聲鄭重也重語也世多不別然譫語鄭聲亦相似難辨須更用外證與脈別之若大小便利手足冷脈微細者必鄭聲也大便祕小便赤手足溫脈洪數者必譫語也以此相參然後用藥萬全矣大抵傷寒不應發汗即譫語仲景云傷寒四五日脈沉而喘滿沉為在裡反發其汗津液越出大便為難表虛里實實則譫語譫語屬胃和中則愈不和則煩而躁宜調胃承氣湯然亦有三陽合病譫語者三陽合病腹滿身重難以轉側口中不仁面垢譫語遺溺其脈必滑實不可汗下宜白虎湯正六十四有胃實譫語者病人身熱汗出大便硬為胃實宜調胃承氣湯正四十三大承氣正四十一外臺承氣湯無芒硝尤穩或發汗多亡陽譫語者仲景云發汗多亡陽譫語者不可下此為津液不和與柴胡桂枝湯正三十一和其營衛以通津液後自愈恐人作燥屎攻之慎不可攻也有下利譫語者下利譫語有燥屎也調胃承氣湯正方四十三小承氣湯主之正四十二有下後譫語者傷寒八九日下之胸滿煩驚小便不利譫語身重不可轉側者柴胡加龍骨牡蠣湯正三十三有婦人熱入血室譫語者婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦速用小柴胡湯主之正二十九若行湯遲熱入胃令津燥中焦上焦不榮成血結胸狀須當針期門也婦人中風發熱惡寒經水適來入血室也當刺期門隨其實而取之已上二焦熱結在期門也若犯胃氣晝夜譫語喜忘小腹滿小便利屬抵當湯證中正九十一又問仲景云無犯胃氣何也答曰熱因經水適來乘虛入室故血室有熱遂令譫語當以小柴胡解之正二十九卻與胃實譫語不同胃實有燥糞故宜調胃承氣湯下之正四十三若血實有熱譫語非胃家實仲景恐人作胃實攻之故曰無犯胃氣也大抵譫語是熱屬陽而反見陰證者逆九十二問吐血傷寒吐血由諸陽受邪熱初在表應發汗而不發汗熱毒入深結於五臟內有瘀積故吐血也瘀血甚者抵當丸正方九十輕者桃仁承氣湯正四十四兼服犀角地黃湯雜八十六三黃丸雜九十八九十三問腹痛腹脹滿附本太陽病醫反下之因爾腹滿時痛是有表復有里仲景所以用桂枝加芍藥湯主之正方十二痛甚者加大黃正方十三桂枝加芍藥即是小建中也太陰脈弱自利設當行大黃芍藥者宜減之其人胃虛陽氣易動故也下利者先煎芍藥十餘沸難經云痛為實大抵痛宜下仲景云發汗不解腹滿痛者急下之宜大承氣湯正四十一又曰腹中滿痛此為實當下之屬大柴胡湯正方三十腹痛有二證有熱痛有冷痛尺脈弦腸鳴泄利而痛者冷痛也小建中湯主之正三十七仲景云陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯小柴胡去黃芩加芍藥正方二十九陰證腹痛即四逆散正七十六通脈四逆加芍藥湯正八十一腹痛小便不利者真武湯正一百五關脈實腹滿大便祕按之而痛者實痛也桂枝加大黃湯正方十三黃連湯正八十三大承氣湯主之正四十一又問腹脹滿者何也陰陽不和也桔梗半夏湯最良雜九十九仲景論太陽證發汗後腹脹滿也厚朴生薑半夏甘草人參湯正五十八下後心煩腹滿臥起不安者梔子厚朴湯正四十八吐後腹脹滿者與調胃承氣湯正四十三少陰病六七日腹脹不大便者急下之宜承氣湯正四十三九十四問煩躁傷寒煩躁太陽與少陰經為多蓋太陽與少陰為表裡陽明經或因不大便中有燥屎故煩躁耳仲景云病人不大便五六日繞臍痛煩躁發作有時者此有燥屎也宜承氣湯大抵得病二三日脈弱無太陽柴胡證煩躁心下硬小便利屎定硬以小承氣湯正四十二少少與微利之然有病已瘥尚微煩必大便硬當問其小便日幾行若小便少津液當還入胃不須攻也大抵陰氣少陽氣勝則熱而煩故太陽經傷風多煩而躁也仲景云太陽傷風服桂枝湯正一煩不解先刺風池風府卻與桂枝湯又云太陽傷風脈浮緊發熱惡寒身疼痛無汗而煩躁者大青龍湯主之正三十五又云傷寒二三日心中悸而煩者小建中湯主之正三十七又云傷風發熱六七日不解而煩有表裡證渴欲飲水水入則吐五苓散主之正六十六又云傷寒得病無熱但狂言煩躁不安精氣不與人相當但與五苓散二大錢服之常與新汲井水飲一升許即以指刺喉去之隨手愈然而太陽證自汗心煩若小便數者又不可用桂枝表也陽虛陰盛亦發煩躁陽氣弱為陰所乘而躁故少陰病亦煩躁少陰病二三日以上心煩不得臥黃連阿膠湯主之正八十四少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之正方一百少陰病下利咽痛胸痛心煩者豬膚湯主之正一百一少陰下利六七日咳而嘔渴煩不得眠豬苓湯主之正六十七少陰病惡寒而蜷時時自煩欲去衣被大柴胡湯下之正方三十學者當以外證與脈別之寸關浮數身熱而煩者屬太陽也尺寸俱沉手足厥逆自利而煩者屬少陰也然有汗之而煩者仲景云太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與之令胃中和則愈若脈浮小便不利微熱稍渴五苓散主之正方六十六有下之而煩者仲景云下之後發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微者乾薑附子湯主之正七十三又云發汗吐下後虛煩不得眠心中懊憹者梔子豉湯主之正四十五發汗若下之病仍未解煩躁者茯苓四逆湯主之正方七十八又有病已解而反微煩者此由病新瘥不勝谷損谷則愈先用小柴胡湯正二十九和其營衛以通津液得屎而解小柴胡不中然後以調胃承氣湯正方四十三九十五問下利者傷寒下利多種須辨識陰陽勿令差互三陽下利則身熱太陰下利手足溫少陰厥陰下利身不熱以此別之大抵下利挾太陽脈證便不得用溫藥俗醫但見下利便作陰證用溫熱藥鮮不發黃生斑而死也太陽陽明合病必下利葛根湯正二十六主之下利而頭疼腰痛肌熱目疼鼻乾其脈浮大而長者是其證也太陽少陽合病自下利黃芩湯主之正八十五若嘔者黃芩湯加半夏生薑也正八六下利而頭疼胸滿或口苦咽乾或往來寒熱而嘔其脈浮大而弦者是其證也陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也下利而身熱胸脅痛滿乾嘔或往來寒熱其脈長大而弦者是其證也蓋陽明者土其脈長大少陽者木其脈弦若合病土被木賊更下利為胃已困若脈不弦者順也為土不負負者死自利不渴屬太陰四逆湯正七十五理中湯主之正七十四自利而渴屬少陰白通湯正九十七白通加豬膽湯正九十八通脈四逆湯正八十二豬苓湯正六十七真武湯正一百五四逆加人參湯正七十七可檢證而用之其餘下利皆因汗下後證也大抵傷寒下利須看脈與外證下利而脈大者虛也脈微弱者為自止下利日十餘行脈反實者逆下利脈數而滑者有宿食也下之愈脈遲而滑者實也其利未得便止更宜下之下利三部脈皆平按其心下硬者急下之協熱利者臍下必熱大便赤黃色及腸間津汁垢膩謂之腸垢寒毒入胃則臍下必寒腹脹滿大便或黃白或青黑或下利清穀濕毒氣盛則下利腹痛大便如膿血或如爛肉汁也下利欲飲水者以有熱也下利譫語者有燥屎也寒毒入胃者四逆湯正七十五理中湯正七十四白通湯加附子正九十七四逆散加薤白正七十六主之協熱利者黃芩湯正八十五白頭翁湯正一百八三黃熟艾湯雜方一百薤白湯雜一百一赤石脂丸雜一百二濕毒下膿血者桃花湯正九十九地榆散雜一百三黃連阿膠散雜一百四雖然自利而渴屬少陰然三陽下利亦有飲水者乃有熱也三陰下利宜溫之然少陰自利清水心下痛口乾燥者卻宜下之此又不可不知也少陰泄利下重不可投熱藥先濃煎薤白湯雜一百內四逆散緣四逆散用枳實芍藥之類又尋常胃中不和腹中腸鳴下利生薑瀉心湯最妙正六十三此二法不特傷寒證也九十六問小便不利小便難傷寒發汗後小出多亡津液胃中極干故小便不利醫見小便不利往往利之誤矣類纂云胃中干則無小便慎不可利故仲景云下之後復發汗小便不利者亡津液耳若傷寒引飲下焦有熱小便不通脈浮者五苓散正六十六脈沉者豬苓湯也正六七表不解心下有水發熱而咳小腹滿小便不利者小青龍湯去麻黃加茯苓也正三十六傷寒無汗翕翕發熱頭項強痛小便不利者桂枝湯去桂加茯苓白朮也正方九嘔而發熱胸脅滿心下怔忪小便不利者小柴胡湯去黃芩加茯苓正二十九少陰病小便不利者四逆散加茯苓也正七十六傷寒有所不利者行之取其滲泄也有渴而飲停者有躁而煩渴者有病氣去而水氣不得行者其表裡得見煩躁口燥欲飲水水入即吐病名水逆及霍亂頭痛發熱身疼痛欲飲水者有發熱汗出復惡寒不嘔但心下痞者並宜五苓散其脈浮發熱渴欲飲水小便不利少陰病下利六七日咳而嘔渴心煩不得眠者宜與豬苓湯其大病瘥後從腰以下有水氣者牡蠣澤瀉散正九十四此利水道滲泄之義也大抵中濕與發黃以利小便為先陽明汗多以利小便為戒又問小便難何也陰虛故也陰虛者陽必湊之為陽所湊也故小便黃者中有熱也宜瞿麥滑石之類瀉之太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之正方六陽明中風脈弦浮大短氣腹滿脅下及心痛鼻乾不得汗嗜臥身黃小便難潮熱而噦者小柴胡加茯苓主之正二十九九十七問小便自利小便數太陽證下焦有熱小腹必滿應小便不利而小便反利者下血證也抵當湯主之正九十一陽明證自汗出應小便少而小便自利者津液內竭也屎雖硬不可攻也當用蜜煎導之正百十二少陰證四逆而小便自利者虛寒證也四逆湯正七十五真武湯去茯苓主之正百五又問小便數者何也腎與膀胱俱虛而有客熱乘之也二經既虛致受於客熱虛則不能制水故令數小便熱則水行澀澀則小便不快故令數起也診其趺陽脈數胃中熱即消穀引飲大便必硬小便即數也太陽病自汗四肢拘急難以屈伸心煩微惡寒腳攣急若小便數者慎不可行桂枝也宜與甘草乾薑湯正五十五芍藥甘草湯也正五十七大抵溲數則大便難仲景云趺陽脈浮而澀浮則胃氣強澀即小便數浮澀相搏大便則硬其脾為約麻子仁丸主之正九十二太陽病若汗若吐若下後微煩小便數大便因硬者與小承氣湯正四十二和之愈又云傷寒脈浮自汗小便數若胃中不和譫語者少與調胃承氣湯正四十三九十八問有數日不大便有大便難有大便硬有燥屎有大便溏傷寒數日不大便大便硬及有燥屎皆知用大柴胡正方三十大承氣正四十一小承氣正四十二攻之然仲景論大便不通亦有數種不可攻者在第三卷十五問中詳言之矣仲景又有陽結陰結之論不可不別也其脈浮而數能食不大便此為實名曰陽結宜用小柴胡湯正二十九所謂和其營衛以通津液縱不了了得屎而解也其脈沉而遲不能食身體重大便反硬名曰陰結宜用金液丹所謂陽盛則促陰盛則結促結同也又問大便溏者何也古人云歲火不及寒乃大行民病騖溏大率病人腸中有寒即大便鴨溏蓋溏者胃中冷水穀不別故也華他云寒即溏熱即垢仲景説初硬後溏有二證小便不利小便少皆水穀不分耳九十九問病人默默欲眠目不能閉起居不安其聲嗄或咽乾嘎所訝切聲破也此名狐惑傷寒也狐惑與濕𧈟皆蟲證初得狀如傷寒或因傷寒變成其疾其候默默欲眠目不能閉起居不安蟲蝕其喉為惑其聲嗄蟲食下部為狐其咽乾狐惑之病並惡飲食面目乍赤乍白乍黑是其證也大抵傷寒病腹內熱入食小腸胃空虛三蟲行作求食蝕人五臟及下部為𧈟病其候齒無色舌上盡白甚者唇黑有瘡四肢沉重忽忽喜眠蟲蝕其肛爛見五臟則死當數看其上下唇上唇有瘡蟲食其臟也下唇有瘡蟲食其肛也殺人甚急多因下利而得治𧈟桃仁湯雜一百五黃連犀角湯雜一百六雄黃鋭散主之雜一百七一百問病人欲食復不能食常默默欲臥復不能臥欲出行復不能行飲食或有美時或有不忺飯時如強健人而臥不能行如有寒如無寒如有熱復無熱口苦小便赤藥入即吐利此名百合傷寒也百脈一宗悉致其病無復經絡也其狀欲食復不能食常默默欲得臥復不能臥欲出行復不能行飲食或有美時或有不忺飯時如強健人而臥不能行如有寒如無寒如有熱復無熱口苦小便赤百合之病諸藥不治藥入即吐利如有神靈此多因傷寒虛勞大病之後不平復變成斯疾也百合知母湯雜一百八滑石代赭湯雜一百九雞子湯雜一百十百合地黃湯雜百十一百合洗方雜百十二栝蔞牡蠣散雜百十三滑石散雜百十四主之
