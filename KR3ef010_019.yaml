body:
  text: 卷第十九此一卷論婦人傷寒古人治病先論其所主男子調其氣婦人調其血血室不蓄則二氣和諧血室凝結水火相刑傷寒氣口緊盛即宜下人迎緊盛即宜汗婦人左關浮緊不可下當發其汗以救其血室營衛得和津液自通浹然汗出而解仲景云婦人傷寒經水適斷晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦無犯胃氣者言不可下也小柴胡湯主之若行湯遲則熱入胃令津燥中焦上焦不榮成血結胸狀須當針期門也五行相剋以生相扶以出平居之日水常養於木水木相生則榮養血室血室不蓄脾無蘊積脾無蘊積則剛燥不生剛燥既生若犯胃氣則晝夜譫語喜忘小腹滿小便利屬抵當湯證也傷寒胃實譫語宜下之婦人熱入血室譫語者不可下耳雖然婦人傷寒與男子治法不同男子先調氣婦人先調血此大略之詞耳要之脈緊無汗名傷寒脈緩有汗為傷風熱病脈洪大中暑脈細弱其證一也假如中暍用白虎胃實用承氣豈必調血而後行湯耶仲景傷寒論所以不分婦人良亦以此學者皆可隨病於男子藥證中以意選用也若孕婦傷寒藥性須涼慎不可行桂枝半夏桃仁等藥小柴胡去半夏名黃龍湯蓋為孕婦而去也大抵産前先安胎産後先補益次服傷寒藥若病稍退則止藥不可盡劑此為大法黃帝問婦人重身毒之何如岐伯曰有故無殞亦無殞也大積大聚其可犯也衰其太半而止過者死婦人傷寒藥方男子婦人傷寒仲景治法別無異議比見民間有婦人傷寒方書稱仲景所撰而王叔和為之序以法考之間有可取疑非古方也特假聖人之名以信其說於天下今取金匱玉函治婦人傷寒與俗方中可採者列為一卷雖不足以盡婦人傷寒之詳並可於百問中參用也婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦宜小柴胡湯方見第十卷中婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀宜以小柴胡湯服之方見第十卷中婦人傷寒發熱惡寒經水適來得七八日熱除脈遲身涼和胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之期門穴見第二卷中婦人傷寒六七日胃中有燥屎大便難煩躁譫語目赤毒氣閉塞不得流通宜瀉心三黃湯蜀大黃鼠尾黃芩雞爪黃連各等分上搗為粗末每服四錢水一盞煎八分去滓服取微利如目赤睛疼加白茯苓嫩竹葉瀉肝余之氣婦人傷寒發熱惡寒四肢拘急口燥舌乾經脈凝滯不得往來宜桂枝紅花湯桂心芍藥甘草炙各三兩紅花一兩上銼如麻豆大每服抄五錢匕以水一盞半生薑四片棗二枚煎至七分去渣服良久再服汗出而解黃芩芍藥湯治婦人傷寒口燥咽乾腹滿不思飲食黃芩白芍藥白朮乾地黃各一兩上銼如麻豆大每服抄五錢匕以水一盞煎至七分去滓溫服寒則加生薑同煎服柴胡當歸湯婦人傷寒喘急煩躁或戰而作寒陰陽俱虛不可下柴胡三兩白朮二兩人參甘草炙當歸赤芍藥各一兩五味子木通各半兩上銼如麻豆大每服抄五錢匕以水一盞半生薑四片棗子二枚煎至七分去滓溫服乾地黃湯婦人傷寒瘥後猶有餘熱不去謂之遺熱乾地黃大黃黃連黃芩各一兩柴胡去蘆白芍藥甘草各一兩半炙上搗為粗末每服抄四錢匕以水一盞半煎至七分去滓溫服取溏利汗出解燒褌散婦人傷寒未平復因交合裡急腰胯連腹內痛名曰陰陽易男子裩襠燒灰上一味以水和服方寸匕男子用婦人裩襠燒灰小便利陰頭腫即愈青竹茹湯婦人病未平復因有所動致熱氣上衝胸手足拘急搐搦如中風狀栝蔞根無黃根者二兩青竹茹刮半升淡竹者上以水二升半煎取一升一合去滓分作二三次服當歸白朮湯婦人未平復因有所動小腹急痛腰胯疼四肢不任舉動無力熱發者白朮一分當歸一分桂枝一分去皮附子一分生去皮破八片生薑半兩甘草一分炙芍藥一分人參一分黃耆一分上銼如麻豆大以水三升煎取一升半去滓通口服一湯盞食頃再服溫覆微汗瘥孕婦傷寒藥方孕婦傷寒仲景無治法用藥宜有避忌不可與尋常婦人一概治之也加減四物湯孕婦産前腹痛及治月事或多或少或前或後胎氣不安産後血塊不散或亡血過多或惡漏不下宜此服之當歸切焙川芎熟乾地黃白芍藥各一兩上搗為粗末每服四錢水一盞半煎至八分取六分清汁帶熱服日二三以知為度若孕婦下血即入艾五七葉阿膠末一錢匕同煎服如前法疾勢甚大散藥不知以四味各半兩細銼以水四盞煎至二盞半去滓分四服熱吃食前服一日之中令盡以和為度平常産乳服至三臘止如虛弱血臟不調至一月止因虛致熱熱與血搏口舌乾渴欲飲水加栝蔞一兩麥門冬三分腹中刺痛惡物不下加當歸芍藥各一分血崩加地黃蒲黃各一兩因熱生風加川芎一分柴胡半兩身熱脈躁頭昏項強加柴胡黃芩各半兩祕澀加大黃半兩桃仁一分炒滑瀉加桂附各一分發寒熱加乾薑牡丹皮芍藥各一分嘔加白朮人參各半兩腹脹加厚朴枳實各一分虛煩不得眠加竹葉人參各一分躁大渴加知母石膏各半兩水停心下微此逆加豬苓茯苓防己各一分虛寒狀類傷寒加人參柴胡防風各三分阿膠散孕婦傷寒安胎阿膠炒桑寄生吳白朮人參白茯苓各等分上為細末煎糯米飲調下二錢匕日進二服愈白朮散孕婦傷寒安胎白朮黃芩各等分新瓦上並同炒香上搗羅為末每服三錢匕水一中盞生薑三片大棗一枚拍破同煎至七分溫服但覺頭疼發熱便可服三二服即瘥唯四肢厥冷陰證見者未可服蔥白湯孕婦傷寒憎寒發熱當發其汗蔥白十莖生薑二兩切上銼如麻豆大以水二盞煎至一盞連服取汗蘇木湯孕婦傷寒或中時行灑淅作寒振栗而悸或加噦者赤芍藥陳橘皮黃芩宣黃連甘草炙蘇木各一兩上為粗末每服抄五錢匕以水一盞半煎至八分去滓溫服汗出瘥若胎不安兼服阿膠散黃龍湯孕婦寒熱頭疼默默不欲飲食脅下痛嘔逆痰氣及産後傷風熱入胞宮寒熱如瘧並經水適來適斷病後勞復餘熱不解柴胡一兩黃芩人參甘草炙各一分半上銼如麻豆大每服五錢水一盞半煎一盞去滓溫服柴胡石膏湯孕婦傷暑頭病惡寒身熱躁悶四肢疼痛背項拘急唇口乾燥柴胡四兩甘草二兩石膏八兩上為粗末每服三錢水一盞生薑五片煎至六分去滓溫服不拘時若氣虛體冷者加人參四兩枳實散孕婦傷寒四日至六日以來加心腹脹上氣渴不止食飲不多腰疼體重者枳實一兩炒微黃麥門冬半兩去心陳橘皮三分湯浸去白穰焙上粗末每服三錢以水一中盞入生薑半分蔥白七寸煎至六分去滓溫服旋覆花湯孕婦傷寒頭目旋疼壯熱心躁旋覆花半兩白朮三分前胡一兩去蘆黃芩三分人參三分去蘆麻黃三分去根節用赤芍藥半兩石膏一兩甘草半兩炙微赤上搗為粗末每服四錢用水一盞半入生薑半分煎至六分去柤服麥門冬湯孕婦傷寒壯熱嘔逆頭疼不思飲食胎氣不安者宜此主之人參一兩石膏一兩前胡三分黃芩三分葛根半兩麥門冬半兩去心上銼如麻豆大每服五錢水一盞半入生薑四片棗子二枚淡竹茹一分煎至八分去滓溫服梔子大青湯孕婦發斑變為黑色升麻梔子仁各二兩大青杏仁去皮尖黃芩各一兩半上銼如麻豆大每服五錢匕以水一盞半細切蔥白三寸煎至一盞去滓溫服蘆根湯千金妊娠頭痛壯熱心煩嘔吐不下食知母四兩青竹茹三兩上銼如麻豆大每服五錢水一小盞半入生蘆根一握粳米一撮煎至一盞去滓服盡更作瘥止塗臍法治妊娠遭時疾令子不落取灶中黃土水和塗干復塗之一方酒和塗方五寸又泔清和塗之並佳蔥白豉湯治妊娠熱病蔥白二兩半豉半升上以水三升煎取一升分二服取汗蔥白一物湯治妊娠熱病主安胎若胎已死者服之須臾胎出蔥白一把水一升煮令熟服之取汗食令盡伏龍肝散用伏龍肝雞子許水調服之伏龍肝即灶下黃土是也葛根一物飲治熱煩悶葛根汁每服一小盞如人行五里進一服無生葛用乾葛㕮咀煎濃汁服梔子五物湯廣濟療妊娠傷寒頭痛壯熱梔子前胡知母各二兩黃芩一兩白石膏四兩上銼如麻豆大每服抄五錢匕用水一小盞半煎至一盞去滓服前胡七物湯治妊娠傷寒頭痛支節痛壯熱前胡知母梔子仁各二兩石膏四兩大青黃芩各一兩半上銼如麻豆大每服五錢匕水一盞半入蔥白三莖煎至一盞去滓溫服升麻六物湯急救療妊娠七月傷寒壯熱赤斑變黑溺血升麻梔子仁各二兩大青杏仁去皮尖黃芩各一兩半上銼如麻豆大每服五錢水一盞半入蔥白三莖煎至一盞去滓溫服産後藥方陽旦湯治婦人産後傷風十數日不解頭微痛惡寒時時有熱心下堅乾嘔汗出宜用陽旦湯方見第十卷中治痙法療婦人産後血虛多汗喜中風身體強直口噤背反強作痙治之法見第六卷第五十問中又方用荊芥末三錢溫酒調下不瘥再服神功丸治婦人産後亡津液大便多祕或譫言煩躁不可用湯液宜神功丸用青木湯吞下桂心牡蠣湯婦人産後頭疼身體發熱兼治腹內拘急疼痛桂心三兩牡蠣煅白芍藥乾地黃各五兩黃芩二兩上銼如麻豆大每服抄五錢匕以水一盞半煎至一盞去滓溫服蜀漆湯治婦人産後寒熱往來心胸煩滿骨節疼痛及頭疼壯熱日晡加甚又如瘧狀蜀漆葉一兩黃耆五兩桂心甘草炙黃芩各一兩知母芍藥各二兩生地黃一斤上銼如麻豆大每服抄五錢匕用水一盞半煎至一盞去滓溫服增損柴胡湯婦人産後虛羸發寒熱飲食少腹脹等疾柴胡三錢人參甘草炙半夏湯泡白芍藥陳橘皮川芎各三分上銼如麻豆大每服抄五錢匕以水一大盞生薑三片棗子一枚煎至七分去滓食後溫服日三服竹葉防風湯婦人産後傷風發熱面赤喘而頭疼者竹葉半把葛根一兩半防風桔梗桂枝去皮人參甘草炙各半兩上為粗末每服四錢水一盞半生薑三片棗子一枚煎至八分去滓溫服使汗出頸項強用附子炮去皮臍銼如豆大抄一大錢同煎嘔加半夏一錢三物黃芩湯治婦人草蓐中傷風四肢苦煩熱頭疼與小柴胡湯頭不疼但煩宜用此服之黃芩半兩苦參一兩乾地黃二兩上銼如麻豆大每服四錢水一盞半煎八分服之治婦人産後亡血汗多故令鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故但頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復所以便敗者嘔不能食也宜小柴胡湯主之乾薑柴胡湯治婦人傷寒經脈方來初斷寒熱如瘧狂言見鬼者柴胡四兩去蘆栝蔞根二兩桂枝一兩半牡蠣一兩熬乾薑一兩炮甘草炙一兩上銼如麻豆大每服五錢水一盞半煎至七分去滓溫服初服微煩再服汗出而愈海蛤散治婦人傷寒血結胸膈揉而痛不可撫近婦人血結胸法當刺期門仲景無藥方治法此方疑非仲景然其言頗有理姑存焉海蛤滑石甘草各一兩炙芒硝半兩上搗羅為散每服二錢雞子清調下小腸通利則胸膈血散膻中血聚則小腸壅小腸既壅膻中血不流行宜此方小便利血數行宜桂枝紅花湯發其汗則愈
