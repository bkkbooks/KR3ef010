body:
  text: 卷第十四梔子厚朴湯四十八治傷寒下後心煩腹滿臥起不安者屬太陽梔子大者七枚擘碎厚朴去皮薑汁炙二兩枳實二枚取去穰麩炒稱一分上銼如麻豆大分作二服以水二盞半煎至八分去滓溫服得吐止後服梔子乾薑湯四十九治傷寒醫以丸藥下之身熱不去微煩者屬太陽梔子七枚乾薑一兩上銼如麻豆大分二服以水二大盞煎至七分去滓溫服得吐止後服凡用梔子湯病人舊微溏者不可與之梔子柏皮湯五十治傷寒身黃髮熱屬太陽梔子八枚黃柏一兩甘草半兩炙上銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服茯苓桂枝甘草大棗湯五十一治發汗後其人臍下悸者欲作奔豚屬太陽桂枝二兩去皮甘草一兩炙茯苓去皮六兩或作四兩上銼如麻豆大每服五錢棗二個用甘爛水一盞半煎至八分去滓溫服作甘爛水法用水二斗置大盆中以勺揚之上有珠子五六千顆有珠相逐取用茯苓桂枝白朮甘草湯五十二治傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者屬太陽茯苓二兩桂枝一兩半甘草炙白朮各一兩上銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服茯苓甘草湯五十三傷寒汗出而渴者五苓散主之不渴者此主之屬太陽桂枝去皮茯苓各二兩甘草一兩炙上銼如麻豆大每服五錢匕水一盞半生薑五片煎至八分去滓溫服甘草湯五十四少陰病二三日咽痛者可與服不瘥者與桔梗湯甘草二兩上銼如麻豆大每服四錢匕水一盞煎至六分去滓溫服日二服甘草乾薑湯五十五傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝欲攻其表此誤也得之便厥咽中干煩躁吐逆者宜此藥屬太陽甘草四兩炙乾薑二兩炮上銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服炙甘草湯五十六治傷寒脈結代心動悸屬太陽甘草二兩炙人參一兩生地黃八兩桂枝一兩半去皮麻仁一兩一分麥門冬一兩一分去心上銼如麻豆大每服五錢匕入薑五片棗一枚水一盞半入酒半盞煎至八分去滓納阿膠一片膠煬盡溫服日三服芍藥甘草湯五十七傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝欲攻其表此誤也得之便厥咽乾煩躁逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更與此藥屬太陽甘草白芍藥各二兩上銼如麻豆大每服五錢匕水一盞半煮至八分去滓溫服厚朴生薑半夏人參湯五十八治發汗後腹脹滿者屬太陽厚朴四兩去皮半夏一兩一分甘草一兩人參半兩上銼如麻豆大每服五錢匕水一盞半生薑五片煮至八分去滓溫服大黃黃連瀉心湯五十九治心下痞按之濡其脈關上浮者若傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜服此藥屬太陽大黃二兩黃連一兩黃芩一兩上銼如麻豆大每服五錢匕以百沸湯二大盞熱漬之一時久絞去滓暖動分二服附子瀉心湯六十治心下痞而復惡寒汗出者屬太陽大黃二兩黃連黃芩各一兩附子一枚炮去皮破別煮取汁上三味銼如麻豆大每服五錢以百沸湯二大盞熱漬之一時久絞去滓納附子汁分溫再服半夏瀉心湯六十一傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜服此屬太陽黃連半兩黃芩乾薑炮人參甘草炙各一兩半半夏一兩一分湯洗七遍上銼如麻豆大每服五錢匕大棗二枚水一盞半煎至八分去滓溫服甘草瀉心湯六十二傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也宜服此甘草二兩炙乾薑炮黃芩各一兩半人參黃連各半兩大棗六枚半夏一兩一分洗上銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服生薑瀉心湯六十三治傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者屬太陽黃芩甘草炙人參各一兩半乾薑炮黃連各半兩半夏一兩一分泡上銼如麻豆大每服五錢匕水一盞半生薑七片棗子二枚煎至一盞去滓溫服白虎湯六十四治傷寒脈浮滑者表裡有熱又三陽合病腹滿身重難以轉側口中不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者傷寒脈滑而厥者里有熱並主之知母三兩甘草一兩炙石膏八兩碎綿裹粳米三合上銼如麻豆大每服五錢匕水一盞半煎至八分取米熟為度去滓溫服白虎加人參湯六十五服桂枝湯大汗出大煩渴不解脈洪大者傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡寒大渴舌上乾燥而煩欲飲水數升者傷寒無大熱口燥渴心煩背微惡寒者並主之人參二分知母一兩半甘草炙二兩或作半兩粳米一合半石膏四兩碎綿裹上銼如麻豆大每服五錢匕水一盞半煎至八分取米熟為度去滓溫服五苓散六十六太陽病發汗後大汗出胃中干煩燥不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者發汗已脈浮數煩渴者傷寒汗出而渴者不渴者與茯苓甘草湯中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐名曰水逆者本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也欲飲水少少與之但以法救之或渴者霍亂頭痛發熱身疼熱多飲水者並主之澤瀉一兩一分豬苓去黑皮稱茯苓去皮稱白朮各三分桂枝去皮半兩不見火上搗篩為散拌和每服抄三錢白湯調下此藥須各自事持稱見分兩然後合豬苓湯六十七陽明病脈浮發熱渴欲飲水小便不利者少陰病下利六七日咳而嘔渴心煩不得眠者並主之豬苓去皮茯苓阿膠炙過澤瀉滑石各一兩上銼如麻豆大每服五錢水一盞半煎至七分去滓溫服附子湯六十八少陰病得之一二日口中和背惡寒者當灸之少陰病身體痛手足寒骨節痛脈沉者並宜服之茯苓芍藥各一兩半人參一兩白朮二兩附子一枚炮去皮上銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服日三服桂枝附子湯六十九治傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者屬太陽桂枝二兩甘草一兩附子一枚半炮去皮上銼如麻豆大每服抄五錢匕水一盞半生薑四片棗子一枚煎至八分去滓溫服朮附湯七十傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便堅小便自利者此主之屬太陽白朮二兩甘草一兩炙附子一個半炮去皮上銼如麻豆大每服五錢匕生薑五片大棗一枚水一盞半煎至七分去滓溫服日三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪也即是附子與術並走皮中逐水氣未得除故使之耳法當加桂一兩其大便堅小便自利故不加桂也甘草附子湯七十一治風濕相搏骨節疼煩掣骨痛不得屈伸近則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者屬太陽甘草炙白朮各一兩附子一枚炮去皮桂枝三兩或作二兩身腫者加防風二兩悸氣小便不利者加茯苓一兩半上銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服汗出即解芍藥甘草附子湯七十二發汗病不解反惡寒者虛故也此主之芍藥三兩甘草三兩炙附子一枚炮去皮上銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服乾薑附子湯七十三下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者此主之屬太陽乾薑一兩炮附子一枚生用去皮上銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服未知再服理中丸七十四霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者此主之大病瘥後喜唾久不了了胸中有寒當以丸藥溫之宜服此屬陰陽瘥後勞復病脈證乾薑炮甘草炙人參腹痛者倍之白朮各一兩上搗篩煉蜜和丸如雞子黃許大以湯數合和一丸研碎溫服之日三夜二服腹中未熱益至三四丸熱粥飲之微自溫覆勿揭衣然不及湯又方人參乾薑炮甘草炙白朮各三兩腹痛者加人參一兩半寒者加乾薑一兩半渴欲得水者加白朮一兩半臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩或四肢拘急腹滿下利或轉筋者去白朮加附子一枚生用上銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服日三服四逆湯七十五傷寒醫下之續後下利清穀不止身疼痛急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯屬太陽自利不渴者以其臟有寒故也當溫之宜服屬太陰傷寒脈浮自汗出小便數心煩微惡寒腳攣急與桂枝湯得之便厥咽乾煩躁吐逆作甘草乾薑湯與之厥愈更作芍藥甘草湯與之其腳伸若胃氣不和與調胃承氣湯若重發汗加燒針者或脈浮而遲表熱裡寒下利清穀者此並主之少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之或脈沉者急溫之並宜服屬少陰大汗若大下利而厥冷者或大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者或下利腹滿身疼痛者先溫里乃攻表溫里宜四逆湯攻表宜桂枝湯或嘔而脈弱小便復利身有微熱見厥難治此並主之並屬厥陰吐利汗出發熱惡寒四肢拘急手足厥冷者吐利小便復利而大汗出下利清穀內寒外熱脈微欲絶者此主之屬霍亂甘草二兩炙附子一個生用乾薑一兩半炮上銼如麻豆大每服四錢水一盞半煎至七分去滓溫服強人加附子半個乾薑加一兩半四逆散七十六少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者此主之屬少陰甘草炙柴胡枳實去白穰炒黃芍藥以上各一兩上搗篩為細散米飲調下二錢日三服咳者加五味子乾薑各半兩下利悸者加桂半兩小便不利者加茯苓半兩腹中痛者加附子半枚炮裂泄利下重先濃煎薤白湯納藥末三錢匕再煮一二沸溫服四逆加人參湯七十七惡寒脈微而利利止者亡血也此主之屬霍亂甘草二兩炙人參一兩附子一枚生去皮乾薑一兩半炮上銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服日三服茯苓四逆湯七十八治發汗若下之病仍不解煩躁者茯苓二兩人參半兩甘草一兩炙乾薑七錢半附子半個生去皮上銼如麻豆大每服五錢水一盞半煎至八分去滓溫服當歸四逆湯七十九治手足厥寒脈細欲絶者屬厥陰當歸洗桂枝芍藥細辛各一兩半通草甘草各一兩炙上銼如麻豆大每服五錢匕水一盞半棗子一枚煎至八分去滓溫服當歸四逆加茱萸生薑湯八十有當歸四逆湯證若其人內有久寒者宜服屬厥陰當歸洗桂枝去皮芍藥細辛各一兩半甘草炙木通各一兩茱萸五兩上銼如麻豆大每服五錢匕生薑四片大棗一枚水一盞半煎至八分去滓溫服日進三服
