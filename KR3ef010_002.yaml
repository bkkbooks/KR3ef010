body:
  text: 卷第二此一卷論切脈治傷寒先須識脈若不識脈則表裡不分虛實不辨仲景猶誚當時之士按寸不及尺握手不及足必欲診衝陽按太溪而後慊況於寸關尺耶大抵問而知之以觀其外切而知之以察其內證之與脈不可偏廢且如傷寒脈緊傷風脈緩熱病脈盛中暑脈虛人迎緊盛傷於寒氣口緊盛傷於食率以脈別之非特此也病人心下緊滿按之石硬而痛者結胸也結胸證於法當下雖三尺之童皆知用大黃甘遂陷胸湯下之然仲景云結胸脈浮者不可下下之則死以此推之若只憑外證便用陷胸湯則誤矣況傷寒尤要辨表裡脈浮為在表脈沉為在裡陽動則有汗陰動則發熱得汗而脈靜者生汗已而脈躁者死陰病陽脈則不成陽病陰脈則不永生死吉凶如合龜鏡其微至於禍福休咎修短貴賤無不可考然古人乃以切脈為下者特以脈理精微其體難辨而傷寒得外證為多故也外證易見切脈難明弦緊之混淆遲緩之參差沉與伏相類濡與弱相似非得之於心超然領解孰能校疑似於錙銖者哉苟知浮芤滑實弦緊洪屬於表遲緩微澀沉伏濡弱屬於里表裡內外陰陽消息以經處之亦過半矣脈穴圖帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口右手關前一分氣口之位人迎在頸法象天地要會始終之門戶人迎屬太陰肺之經而黃帝乃云人迎亦胃脈何也左手關前一分者人迎之位挾喉嚨兩旁者人迎之穴人迎之位屬手太陰肺之經人迎之穴屬足陽明胃之經故素問云人迎亦胃脈也傷寒何以須診太溪脈耶答曰太溪穴是足少陰腎之經男子以右腎為命門女子以左腎為命門三十六難曰命門者神精所舍原氣所繫男子藏精女子以胞主生死之要病人有命門脈者活無者死仲景云少陰病手足逆冷發熱者不死脈不至者灸太溪七壯故傷寒必診太溪以察其腎之盛衰也太溪二穴在足內踝後跟骨上動脈陷中傷寒何以須診衝陽脈耶答曰衝陽穴是足陽明胃之經人受氣於谷谷入於胃乃傳與五臟六腑臟腑皆受氣於胃其清者為營濁者為衛營行脈中衛行脈外陰陽相貫如環無端胃為水穀之海主稟四時皆以胃氣為本是謂四時之變病死生之要會故傷寒必診衝陽以察其胃之有無也衝陽二穴一名會源在足跗上五寸骨間動脈上去陷骨三寸仲景云太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯正一愈謂服桂枝湯後其證尚自汗發熱惡寒脈尚寸浮尺弱而反煩為邪痹在陽維經故可先針風池風池二穴是足少陽陽維之會在項後髮際陷中是穴甲乙經云風池穴在擲顬後髮際陷者中是穴針入一寸一分風府風府一穴是督脈陽維之會在項後入髮際一寸大筋穴中不可灸針入四分留三呼此二穴陽維之會非太陽經也太陽經穴在挾項後髮際大筋外廉陷中名曰天柱不針此者桂枝已主太陽病故也期門穴在乳直下筋骨近腹處是也凡婦人病法當針期門不用行子午法恐纏臟膜引氣上但下針令病人吸五吸停針良久徐徐出針此是平瀉法也凡針期門必瀉勿補可肥人二寸瘦人寸半深臍下一寸五分名氣海二寸名丹田三寸名關元關元穴是小腸募足少陰任脈之會針入八分留三呼瀉五吸灸亦良然不及針氣海穴或作臍下一寸按針灸經云臍下一寸曰陰交穴陰交下五分曰氣海七問三部之位左右手去魚一寸名曰寸口去澤一尺名曰尺部兩境之間名為關位關位六分陽部出三分陰部入三分關前為陽關後為陰為陰陽之關津寸脈下不至關為陽絶尺脈上不至關為陰絶陽得寸內九分取陽奇之數陰得尺內一寸取陰耦之數是名寸關尺也寸上一分為魚際關下一分為神門左關為人迎右關為氣口三陽從地長故男子尺脈常沉三陰從天生故女子尺脈常浮男子陽多而陰少其脈在關上故寸盛而尺弱女子陰盛而陽微其脈在關下故寸沉而尺盛所以男子不可以久瀉女子不可以久吐男得女脈為不足女得男脈為太過所謂反也今人以男子尺脈常弱女子尺脈常盛謂之反非也男子陽有餘脈在上尺脈必弱女子陰有餘脈在下寸脈必微乃是正也非反也又以男子以右尺為命門女子以左尺為命門謂之反亦非也男子得陰以生先生右腎女子得陽以長先生左腎乃是正也非反也所謂反者只是男子尺脈當弱今反盛女子尺脈應盛今反弱謂之反耳聖人以察陰陽以決生死雖經絡流注如環無端豈能逃於三部者耶八問診候之法凡初下指先以中指揣按得關位乃齊下前後二指為三部脈前指寸口也後指尺部也若人臂長乃疏下指若臂短乃密下指先診寸口男先左手女先右手浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指內消息之醫家責肥人脈浮為肌肉厚實重取乃得若舉手而得則其浮也甚矣責瘦人脈沉為皮脈相附而易見若按之始應則其沉也亦甚矣凡診脈以氣息平定方下指以一呼一吸為一息其一息之間脈息四至或五至不大不小與所部分四時相應者為平和脈也過則為至不及則為損損至之脈難經言之詳矣所屬部分謂心位洪肺位浮腎位沉肝位弦脾位緩也四時謂春脈弦夏脈洪四季脈緩秋脈浮冬脈沉也假令心脈本位雖當見洪得冬脈須微帶沉下是四時相應余皆仿此九問脈息之證脈之字從肉從䗃又作𧖴蓋脈以肉為陽𧖴以血為陰華他云脈者氣血之先也氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈緩又長人脈長短人脈短性急則脈急性緩則脈緩反此者逆按內經云形盛脈細氣少不足以息者危形瘦脈大胸中氣多者死形氣相得者生參伍不調者病難經云數者腑也遲者臟也數則為熱遲則為寒諸陽為熱諸陰為寒王叔和云脈沉為在裡脈浮為在表遲則在臟數則在腑滑為實為下數為虛為熱張仲景云脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也陰病見陽脈者生陽病見陰脈者死大抵陽脈常浮而速陰脈常沉而遲七表屬腑病在於陽春夏見之易治八里屬臟病在於陰秋冬見之猶輕假令數在左寸浮之得者熱入小腸沉之得者熱入於心余皆仿此脈理精微非言可盡論其梗概不出於此矣王叔和云在心易了指下難明亦在乎人熟之而已矣十問七表七表陽也陽數奇浮按之不足舉之有餘寸口浮其人傷風發熱頭疼關上浮腹滿尺中浮小便難趺陽浮即為虛芤浮大而軟按之中央空兩邊實芤主失血寸口芤主吐血微芤者衄關上芤大便血尺中芤小便血滑往來前卻流利替替然與數相似脈滑為陽寸口滑為陽盛關上滑為嘔逆尺中滑小便赤婦人經脈不利然而尺脈滑者亦本形也趺陽脈滑者胃氣實實脈大而長按之隱指愊愊然浮沉皆得寸口實主上焦熱關上見之腹脹尺中有此主小腹痛並小便澀弦舉之無有按之如弓弦狀又曰浮緊乃為弦狀如弓弦按之不移陽弦則頭痛陰弦則腹痛大抵傷寒脈須弦蓋人迎緊盛傷於寒人迎者少陽之分少陽脈主弦故也寒邪中人其脈必弦弦則多兼洪數為其先有邪熱也洪數甚者正為陽證若沉細而弦疾乃正陰證也緊按之實數似切繩狀緊則為寒寸口緊頭痛關緊心中滿痛尺緊臍下痛陰陽俱緊當清邪中於上濁邪中於下洪極大在指下舉按滿指寸口洪主胸膈煩熱關洪主胃熱口乾尺中洪主大小便血三部洪三焦俱熱十一問八里八里陰也陰數耦微若有若無極細而軟微則為虛寸口微為陽不足陽微則惡寒陰微則下利沉舉之不足按之有餘沉為在裡尺寸俱沉者少陰受病也然沉而遲者乃陰證也宜溫之沉而數者有熱也宜下之緩去來亦遲小快於遲緩則為虛太陽病其脈緩者為傷風惟脾得之即是本形澀細而遲往來難時一止澀則少血寸口澀少氣上焦冷關上澀胃冷脾痛尺中澀小便數小腹冷三部俱澀腹中氣結王冰曰陽有餘則血少故脈澀也又曰澀者陽氣有餘陽氣有餘為身熱無汗遲呼吸三至去來極遲遲則為寒寸口遲則上焦冷關上遲胃冷不欲食吞酸吐水尺中遲小便多並白濁伏極重按之指著骨乃得伏主物聚寸口伏胸中逆氣關上伏有水氣溏泄尺中伏水穀不化大抵關前得之多為熱關後得之多為冷關中得之陰陽結或冷或熱不定當以餘證參之濡按之似無舉之全無力形與緩澀遲脈雖稍殊其為冷證皆一也弱極軟而沉細按之欲絶指下弱為虛寸口弱陽氣虛汗自出關弱無胃氣胃中有熱脈弱為虛熱病作不可大攻熱去寒起尺中弱氣少發熱也十二問脈按之來緩時一止復來又脈來動而中止不能自還因而復動有結脈有促脈有代脈結者陰也陰盛則結脈來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所成太陽病下之後脈促胸滿者桂枝去芍藥湯主之正方七若微寒桂枝去芍藥加附子湯主之正八太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之正二十八大抵結促之脈雖時一止為病脈非死脈也惟代脈者真死矣往來緩動而中止不能自還因而復動名曰代也代者死也仲景傷寒脈結代心動悸炙甘草湯主之正五十六
