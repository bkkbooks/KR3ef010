body:
  text: 卷第五此一卷論治法古人治傷寒有法非雜病之比五種不同六經各異陰陽傳受日數淺深藥劑溫涼用有先後差之毫釐輕者危殆況不識法者乎傷寒唯兩感不治其餘證候雖感異氣能消息之無不愈者其有差失仲景所謂醫殺之耳知其法者若網在綱如此而汗如此而吐如此而下桂枝承氣瓜蒂四逆用之無不瘥唯其應汗而下為痞為結胸為懊憹應下而汗為亡陽為譫語為下厥上竭又有當溫反吐療熱以溫變證百出無復紀律擾擾萬緒起矣大抵傷於寒為病熱孫真人云服承氣湯得利瘥慎不中補也熱氣得補覆成王叔和云虛熱不可大攻之熱去則寒起二人之論疑若相戾然熱氣有實有虛非深得仲景之意豈能至此耶三十一問冬謂之傷寒春謂之溫病夏謂之熱病素問云冬三月是謂閉藏水冰地坼無擾乎陽又云彼春之暖為夏之暑彼秋之忿為冬之怒是以嚴寒冬令為殺厲之氣君子善攝生當嚴寒之時行住坐臥護身周密故不犯寒毒彼奔馳荷重勞房之人皆辛苦之徒也當陽閉藏而反擾動之則鬱發腠理津液強漬為寒所薄膚腠緻密寒毒與營衛相渾當是之時壯者氣行則已怯者則著而成病矣其即時而病者頭痛身疼肌膚熱而惡寒名曰傷寒其不即時而病者寒毒藏於肌膚之間至春夏陽氣發生則寒毒與陽氣相搏於營衛之間其病與冬時即病無異但因春溫氣而變名曰溫病因夏熱氣而變名曰熱病溫熱二名直以熱之多少為義陽熱未盛為寒所制病名為溫陽熱已盛寒不能制病名為熱故大醫均謂之傷寒也三十二問三日以前當汗三日以後當下古人云未滿三日者可汗而已其滿三日者可泄而已此大略之言耳病人有虛有實邪氣傳受遲速不等豈可拘以日數仲景云日數雖多但有表證而脈浮者由宜發汗日數雖少若有里證而脈沉者即宜下之正應隨脈以汗下之傷寒固有始得病便變陽盛之證須便下之又有腠理寒一二日便成少陰病者須急溫之又況六氣之邪乘虛入經自背得之則入太陽或入少陰緣少陰有伏脈在背自面感之則入陽明之類不必皆始於太陽兼寒邪有首尾止在一經或間傳一二經不可以一理推但據脈與外證治之此活法也假令有人脈浮頭項強痛發熱而惡寒每日如此不以日數多少只是太陽經受之其餘經絡皆仿此大抵傷寒憑脈與外證以汗下之若過日多脈尚大浮數按之不足者尚責太陽也可發汗而愈若按之實者汗之必死須下之而愈也若始得病脈細沉數外證或腹滿咽乾或口燥舌乾而渴為正責屬裡可下之而愈若無此證但發熱脈沉者誤下必死須行麻黃附子甘草湯正二十二麻黃細辛附子湯正二十三小發汗此皆仲景之確論也三十三問陽虛陰盛汗之則愈下之則死陽盛陰虛汗之則死下之則愈素問云陽虛則外寒陰虛則內熱陽盛則內熱陰盛則外寒故治傷寒者陽虛陰盛汗之則愈下之則死陽盛陰虛汗之則死下之則愈也陰陽虛盛非謂分脈尺寸也表陽也里陰也外臺云表病里和汗之則愈表和里病下之則愈亦只是論表裡陰陽以汗下之難經云陰陽虛實者說脈也素問云陰陽虛盛者說表裡也仲景論傷寒汗下故引素問表裡之義與外臺所論合矣大抵營衛為表屬陽胃腑為里屬陰寒毒爭於營衛之中必發熱而惡寒尺寸俱浮大內必不躁設有微煩其人飲食欲溫而惡冷為陽虛陰盛也汗之則愈誤下則死若寒毒相搏於營衛之內而陽勝陰衰極陰變陽寒盛生熱而陽熱之氣盛而入里熱毒居胃水液乾涸燥糞結聚其人外不惡寒必蒸蒸發熱而躁甚則譫語其脈浮滑而數或洪實為陽盛陰虛也下之則愈誤汗則死謹按黃帝素問調經論云陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒蓋陽主外而陰主內又曰陽虛陰盛汗出而愈下之則死陽盛陰虛汗出而死下之則愈今三十三問誤寫作陽盛則內熱陰盛則外寒竊詳內外寒熱不同則汗下差誤便分死生又按將作監簿王宗正難經疏義有陰陽盛虛汗下圖與素問合以理考之此是三十三問誤寫合行刊正勿誤後人三十四問仲景有發汗者有和解之者傷寒表證須看營衛淺深故仲景有正發汗湯劑如麻黃湯正二十桂枝湯正一大青龍湯正三五是也有和解其表如小青龍湯正三六桂枝麻黃各半湯正二白虎湯正六四桂枝二越婢一湯正四柴胡桂枝湯正三十一小柴胡湯正二十九之類是也後人不能深究寒熱淺深藥性緊慢一概用藥因茲夭傷其間縱獲生全往往汗後虛乏遂致勞復或變生百病淹引歲月卒至不救此皆由汗下過度陰陽並竭血氣羸損以致此禍如遇病輕但當和解之所謂和其營衛以通津液令其自解也三十五問仲景有宜下之有微和其胃氣者傷寒里證須看熱氣淺深故仲景有宜下之如大承氣湯正四一小承氣湯正四二十棗湯正八九大柴胡湯正三十是也有微和其胃氣如調胃承氣湯正四三脾約丸雜六六少與小承氣正四二微和之之類是也金匱玉函云虛者十補勿一瀉強實者瀉之虛實等者瀉勿大泄之故王叔和序傷寒有承氣之戒又問轉藥孰緊答曰大承氣最緊小承氣次之調胃承氣湯又次之大柴胡又次之仲景治法盪滌熱積皆用湯液不得用丸子藥不可不知也大柴胡加大黃小柴胡加芒硝方為轉藥蓋為病輕者設也三十六問傷寒一日頭疼口乾煩滿而渴二日腹滿身熱不欲食譫語三日耳聾囊縮而厥水漿不入不知人此名兩感傷寒也兩感者表裡俱病也太陽與少陰為表裡陽明與太陰為表裡少陽與厥陰為表裡陰陽雙傳臟腑俱病此為難治六日而死矣故一日太陽與少陰俱病則頭痛口乾煩滿而渴二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥仲景無治法但云兩感病俱作治有先後發表攻裡本自不同尋至第三卷中言傷寒下之後復下利不止身疼痛者當急救里宜四逆湯正七五復身體疼痛清便自調者急當救表宜桂枝湯正一遂以意尋比仿效治兩感有先後宜先救里若陽氣內正即可醫也內才正急當救表蓋內尤為急才溫內則急救表亦不可緩也三十七問傷寒已經發汗吐下仍不解古人謂之壞病仲景云太陽病三日已發汗若吐若下若溫針仍不解者為壞病桂枝不中與也當知何逆隨證治之又云太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下其脈沉緊者可與小柴胡湯正二十九若已吐下發汗小柴胡證罷此為壞病知犯何逆以法治之蓋為病中又感異氣變為壞病以時令寒暑燥濕風氣不節脈息與少陽相異小柴胡證罷證候與傷寒不同麻黃桂枝不中與也明當消息其由以法治之若脈尺寸俱盛重感於寒變為溫瘧先熱後寒名曰溫瘧在第六卷四十四問陽脈浮滑陰脈濡弱更遇於風變為風溫四肢不收頭疼身熱常自汗出在第六卷四十五問陽脈浮數陰脈實大更遇溫熱變為溫毒為病最重春月肌肉發斑名曰溫毒在第六卷又五十問陽脈濡弱陰脈弦緊更遇溫氣變為溫疫一歲之中長幼疾狀多相似感四時不正之氣在第六卷四十六問脈證之變方治不同仲景謂溫病之脈行在諸經不知何經之動隨其經而取之也又有傷寒過經再受熱邪留蓄臟腑病候多變久而不瘥陰陽無復綱紀及傷寒解後虛羸少氣皆名壞傷寒也知母麻黃湯雜二十八鱉甲散雜二十九黑奴丸雜二十檢方與病證相參選用之若傷寒解後虛羸少氣氣逆吐者竹葉石膏湯主之正九五
