front:
  text: 序傷寒諸家方論不一獨伊尹仲景之書猶六經也其餘諸子百家時有一得要之不可為法又況邪說妄意世業名家規利雖厚因果歷然特以伊尹湯液仲景經絡常人難曉士大夫又以藝成而下恥而不讀往往倉卒之際束手待盡卒歸之於命而已世人知讀此書者亦鮮縱欲讀之又不曉其義況又有好用涼藥者如附子硫黃則笑而不喜用雖隆冬使人飲冷服三黃丸之類有好用熱藥者如大黃芒硝則畏而不敢使雖盛暑勸人炙煆服金液丹之類非不知罪福偏見曲說所趣者然也陽根於陰陰本於陽無陰則陽無以生無陽則陰無以化是故春時氣溫當將理以涼夏月盛熱當食以寒君子扶陰氣以養陽之時也世人以為陰氣在內反抑以熱藥而成瘧痢脫血者多矣秋時氣涼當將息以溫冬時嚴寒當食以熱君子扶陽氣以養陰之時也世人以陽氣在內乃抑以涼藥而成吐痢腹痛者多矣伐本逆根豈知天地之剛柔陰陽之逆順求其不夭橫也難矣偶有病家曾留意方書稍別陰陽知其熱證則召某人以某人善醫陽病知其冷證則召某人以某人善醫陰病往往隨手全活若病家素不曉者道聽泛請委而聽之近世士人如高若訥林億孫奇龐安常皆惓惓於此未必章句之徒不誚且駭也僕因閒居作為此書雖未能盡窺伊尹之萬一庶使天下之大人無夭伐老不哭幼士大夫易曉而喜讀漸浸積習人人尊生豈曰小補之哉仲尼曰吾少也賤故多能鄙事學者不以為鄙然後知余用意在此而不在彼大觀元年正月日前進士朱肱序僕乙未秋以罪去國明年就領宮祠以歸過方城見同年範內翰云活人書詳矣比百問十倍然證與方分為數卷倉卒難檢耳及至濉陽又見王先生活人書京師京都湖南福建兩浙凡五處印行惜其不曾校勘錯誤頗多遂取繕本重為參詳改一百餘處命工於杭州太隱坊鏤板作中字印行庶幾緩急易以檢閲然方術之士能以此本遊諸聚落悉為改證使人讀誦廣說流布不為俗醫妄投藥耳其為功德獲福無量政和八年季夏朔朝奉郎提點洞霄宮朱肱重校證序余頃在三茅見無求子傷寒百問披而讀之不知無求子何人也愛其書想其人非居幽而志廣形愁而思遠者不能作也惠民憂國不見施設遊戲藝文以閲歲月者之所作乎逃世匿跡抗心絶慮灌園荒丘賣藥都市者之所作乎顛倒五行推移八卦積功纍行以就丹灶者之所作乎不然則窮理博物觸類多能東方朔者耶浩歌散發採掇方技皇甫謐者耶周流人間衛生救物封君達者耶前非古人後無作者則所謂無求子者余不得而知也三茅三年挾冊抵掌未嘗停手所藉以全活者不知其幾人也惜其論證多而說脈少治男子詳而婦人略銖兩訛舛升掬不明標目混淆語言不通俗往往閭閻有不能曉者此余之所以夙夕歉然者也今秋遊武林邂逅致政朱奉議泛家入境相遇於西湖之叢林因論方士奉議公乃稱賈誼云古之人不在朝廷之上必居醫卜之中故嚴君平隱於卜韓伯休隱於醫然卜占吉凶醫有因果不精於醫寧隱於卜班固所謂有病不治得中醫蓋慎之也古人治傷寒有法治雜病有方葛稚川作肘後孫真人作千金陶隱居作集驗元晏先生作甲乙率著方書其論傷寒活法者長沙太守一人而已華陀指張長沙傷寒論為活人書昔人又以金匱玉函名之其重於世如此然其言雅奧非精於經絡不可曉會頃因投閒設為對問補苴綴緝僅成卷軸因出以相示然後知昔之所見百問乃奉議公所作也因乞其繕本校其詳略而傷寒百問十得五六前日之所謂歉然者悉完且備書作於己巳成於戊子增為二十卷釐為七冊計九萬一千三百六十八字得此書者雖在崎嶇僻陋之邦道途倉卒之際據病可以識證因證可以得方如執左契易如反掌遂使天下傷寒無橫夭之人其為饒益不可思議昔樞密使高若訥作傷寒纂類翰林學士沈括作別次傷寒直祕閣胡勉作傷寒類例殿中丞孫兆作傷寒脈訣蘄水道人龐安常作傷寒卒病論雖互相發明難於檢閲比之此書天地遼落張長沙南陽人也其言雖詳其法難知奉議公祖述其說神而明之以遺惠天下後世余因揭其名為南陽活人書云大觀五年正月日敘青詞竊以神農嘗藥伊尹論方證順陰陽雖克求於民瘼時無疫癘蓋有賴於神休瞻彼旻穹哀此黎庶伏念臣浪遊東土空閲流光蔑聞經國之謀端議濟人之術冥冥長夜憐橫死之無辜斷斷窮年矧餘生之多病自朝及夕考古驗今首尾幾二十一年前後僅九萬餘字焦心皓首編筆青編原其微功實自潛祐屬成書之將上爰奏牘以先天恭即蘭場四陳醮席冀九清之降鑑祈萬宇於康寧仰獲證明庶傳永久臣無任懇禱之至進表臣聞鐘山非矯幽人躡屩於深林衡嶽雖遙志士獻書於北闕蓋行藏之有數非狂狷所能知中謝伏念臣出自蔀屋之微嘗奉大廷之對昔為冗吏今作閒人乃因三餘著成百問上稽伊尹湯液之論下述長沙經絡之文詮次無差搜羅殆盡從微至著蓋不可加亙古及今實未曾有載在簡冊圖之丹青思欲膠口而不傳大懼利己而無益恐先朝露虛棄寸陰學古入官既無裨於國論博施濟衆庶或廣於仁風伏惟皇帝陛下經緯之文出自天縱紀綱之治成於日躋疆宇開拓於版圖絃歌洋溢乎天下棲神內景屬意生民收拾人材凡片善寸長皆有所用勤恤民隱雖沉痾垂老各安其居玉燭亙天以流離朱草填廷而委積湛恩滂沛溫韶下寧致茲丘園一介之愚亦效涓埃萬分之助蕆明大道敷奏彌文楊雄所懷以既章蔡澤沒齒而無憾重惟道途修阻巾笈護持未免客嘲焉令鬼泣顧因果之有在茲俯仰而不慚儻合宸衷自讋與議特羈縻于丹灶徙景仰乎公車謹遣男遺直齎臣所撰書一函八冊共二十卷躬詣檢院投進以聞委有觀採伏乞宣付國子監印造頒行如臣學植淺陋違戾於經即乞委官參詳然後布之天下以福群生臣無任干天冒聖激切屏營之至政和元年正月一日奉議郎致仕臣朱肱謹上謝啓命出於中恩歸有自藝成而下唯濟世可以無嫌祿在其中苟為貧有何不可如肱者瞿聃遮眼醫卜藏身十載投閒憐桑麻之已長一朝就列愧松菊以難存方將穿墨池以灌園安丹灶而息火掃除伎倆淘汰因緣不虞湯液之言偶合春秋之法道俗交慶魚鳥亦驚龍光祗荷於殊恩陶冶實資於大化此蓋伏遇太師相公無心造物有意為民以人物升沉為深憂以世諦俯仰為可愧苟有一得不問其他致茲流落之餘亦在使令之數敢不激昂晚節箠策下愚稽首傾心豈特平日之師仰斷臂抉目蓋將投老以依歸
