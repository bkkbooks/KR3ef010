body:
  text: 卷第十二此一卷說藥證並藥方加減法所謂藥證者藥方前有證也如某方治某病是也傷寒有證異而病同一經藥同而或治兩證類而分之參而伍之審知某證者某經之病某湯者某證之藥然後用之萬全矣又況百問中一證下有數種藥方主之者須是將病對藥將藥合病乃可服之假如下利而心下痞稱十棗湯大柴胡生薑瀉心湯甘草瀉心湯赤石脂禹餘糧湯桂枝人參湯之類雖均是治下利而心下痞其方有冷有熱仔細詳藥證以對治之則無不中矣所謂藥方並加減法者仲景傷寒方一百十三道病與方相應乃用正方科有差別即隨證加減昔人云學方三年無病可醫療病三年無方可治往往世傳為名論竟不知執方療病或中或否不知加減移咎於方古人用藥如斗運轉故攻病的而取效速一服知二服愈假如理中丸證腎氣動者去白朮小柴胡湯證小便不利者加茯苓蓋脾惡濕腎惡燥白朮治濕茯苓利水故腎氣動者去白朮小便不利者加茯苓以此推之然後知不可執方療病須是隨證加減今於逐方下說病證用藥加減庶幾修合之際便見治法兼古方凡稱㕮咀者直云銼如麻豆大云一升者只用一大白盞以古准今易曉而通用也尋常疾勢輕者只抄粗末五錢匕水一盞半入薑棗煮七八分去滓服之未知再作病勢重者當依古劑法古之三兩即今之一兩也二兩即今之六錢半也古之三升即今之一升也料例大者只合三分之一是也桂枝湯一太陽中風陽浮陰弱發熱汗出惡寒鼻鳴乾嘔者宜服之太陽病頭痛發熱汗出惡風者宜服之太陽病下之後其氣上衝者宜服之桂枝本為解肌若脈浮緊發熱汗不出者不可與之太陽病服桂枝湯煩不解先刺風池風府卻與桂枝湯服桂枝湯大汗出脈洪大者與桂枝湯若形似瘧一日再發者宜桂枝二麻黃一湯服桂枝湯大汗出大煩渴不解脈洪大者白虎加人參湯主之服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之傷寒脈浮自汗出小便數心煩微惡寒腳攣急與桂枝湯得之便厥咽乾煩躁吐逆作甘草乾薑湯與之厥愈更作芍藥甘草湯與之其腳伸若胃氣不和與調胃承氣湯若重發汗如燒針者四逆湯主之太陽病外證未解脈浮弱者當以汗解宜服太陽病外證未解不可下也下之為逆解外宜服太陽病先發汗不解復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜服病常自汗出者此為營氣和營氣和者外不諧也以衛氣不共營氣諧和故爾以營行脈中衛行脈外復發其汗營衛和則愈宜服病人臟無他病時發熱自汗出而不愈者衛氣不和也先其時發汗則愈宜服傷寒不大便六七日頭痛有熱與承氣湯小便清者知不在裡當發汗宜服傷寒發汗解半日許復熱煩浮數者可更發汗宜服傷寒醫下之清穀不止身疼痛急當救里後身疼痛清便自調急當救表救里宜四逆湯救表宜桂枝湯太陽病發熱汗出營弱衛強故使汗出欲救邪風宜服傷寒大下後復發汗心下痞惡寒者不可攻痞先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但小腹急結者乃可攻之宜桃核承氣湯其解外宜服以上屬太陽陽明病脈遲汗出多微惡寒表未解宜服病人煩熱汗出解如瘧狀日晡發熱脈實者宜大承氣湯脈浮虛者宜服以上屬陽明太陰病脈浮可發汗宜服屬太陰下利腹脹滿身疼痛者先溫里乃攻表溫里宜四逆湯攻表宜服屬厥陰吐利止身痛不休宜桂枝湯小和之屬霍亂桂枝芍藥各三錢甘草二兩炙上銼如麻豆大每服抄五錢匕水一盞半入生薑五片棗子二枚煎至一盞去滓溫服須臾啜熱稀粥一盞以助藥力溫覆令一時許遍身漐漐微似有汗者佳加減法桂枝湯自西北二方居人四時行之無不應驗江淮間唯冬及春可行之自春末及夏至以前桂枝證可加黃芩一分謂之陽旦湯夏至後有桂枝證可加知母半兩石膏一兩或加升麻一分若病人素虛寒者正用古方不在加減也戒曰桂枝最難用雖雲表不解脈浮可發汗宜桂枝湯須是病人常自汗出小便不數手足溫和或手足指稍作微冷少頃卻溫身雖微似煩而又增寒始可行之若病人身無汗小便數或手足冷不惡寒或飲酒家不喜甘者慎不可行桂枝也仍有桂枝證服湯已無桂枝證者尤不可再與桂枝麻黃各半湯二太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜服屬太陽桂枝芍藥甘草炙各八錢麻黃半兩湯泡焙稱杏仁一十二個湯浸去皮尖兩仁者上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服又見辨誤桂枝二麻黃一湯三服桂枝湯大汗出脈洪大者與桂枝湯如前法若形似瘧一日再發者汗出必解宜服屬太陽桂枝八錢半芍藥五錢半杏仁八個沸湯浸去皮尖甘草二分半炙麻黃三錢一字湯泡去黃汁焙乾稱上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分溫服以微汗為度又見辨誤桂枝二越婢一湯四太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜服之屬太陽桂枝芍藥甘草各半兩石膏六錢捶碎麻黃半兩湯泡去黃汁焙乾稱上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服又見辨誤桂枝加桂湯五燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上衝心者灸其核上各一壯與此藥屬太陽桂枝五兩芍藥三兩甘草炙二兩上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服桂枝湯加桂以桂能泄奔豚之氣也桂枝加附子湯六太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者宜服之屬太陽桂枝去皮芍藥各一兩半甘草一兩炙附子炮去皮用半個上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服桂枝去芍藥湯七太陽病下之後脈促胸滿者宜服之屬太陽桂枝一兩半去皮甘草一兩炙上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服芍藥味酸脈促胸滿恐成結胸故去芍藥佐則單用辛甘發散毒氣也桂枝去芍藥加附子湯八太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微寒者宜服之屬太陽桂枝一兩半去皮甘草一兩炙附子去皮尖半個炮上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服小便利即愈桂枝去桂加茯苓白朮湯九服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微疼小便不利者此主之屬太陽芍藥茯苓白朮各一兩半甘草一兩炙上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服小便利即愈桂枝去芍藥加蜀漆牡蠣龍骨救逆湯十傷寒脈浮醫火劫之亡陽必驚狂臥起不安者此主之桂枝蜀漆各一兩半甘草一兩炙牡蠣二兩半龍骨二兩上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服桂枝加芍藥生薑人參新加湯十一發汗後身疼痛脈沉遲者此主之屬太陽桂枝人參各一兩半芍藥二兩甘草一兩炙上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服桂枝加芍藥湯十二太陽病下之因腹滿痛屬太陰此主之桂枝三兩甘草二兩炙芍藥六兩下利者先煎芍藥三四沸上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服桂枝加大黃湯十三太陽病反下之因腹滿痛屬太陰桂枝加芍藥湯主之大實痛者此主之桂枝六分去皮芍藥三兩甘草一兩炙大黃二兩痛甚者加大黃大實痛者加一兩半羸者減之上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服又見辨誤桂枝甘草龍骨牡蠣湯十四火逆下之因燒針煩躁者此主之屬太陽桂枝半兩去皮甘草炙牡蠣熬龍骨各一兩上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服桂枝甘草湯十五發汗過多其人叉手自冒心心下悸欲得按者此主之屬太陽桂枝二兩去皮甘草一兩炙上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服桂枝人參湯十六太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者此主之桂枝一兩三錢甘草一兩三錢炙乾薑炮人參白朮各一兩上銼如麻豆大每服五錢匕水一盞半煮至八分去滓溫服日再夜一服桂附湯十七傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者此主之若其人大便硬小便自利者去桂加白朮湯主之屬太陽桂枝一兩三錢若大便硬小便自利者去桂加白朮一兩三錢附子一個炮去皮甘草三分炙上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服日三服桂枝加葛根湯十八太陽病項強𠘧𠘧反汗出惡風者此主之伊尹湯液論桂枝湯中加葛根今監本用麻黃誤矣桂枝甘草炙芍藥各六錢三字葛根一兩三錢麻黃一兩一錢上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓服覆取微汗桂枝加厚朴杏子湯十九太陽病下之微喘者表未解故也此主之屬太陽桂枝去皮芍藥各一兩甘草六錢三字炙杏仁去皮尖十七個厚朴去皮薑汁炙六錢三字上銼如麻豆大每服抄五錢匕生薑四片棗子一枚煮至八分去滓溫服覆取微汗麻黃湯二十太陽病頭痛發熱身疼惡風無汗而喘者宜服太陽陽明合病喘而胸滿不可下宜服太陽病十日以去脈浮細而嗜臥者外已解也設胸滿者與小柴胡湯脈但浮無餘證者與服之太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也此主之傷寒脈浮緊不發汗因衄此主之以上屬太陽陽明病脈浮無汗而喘發汗則愈宜服脈但浮無餘證者與服若不溺腹滿加噦者不治以上屬陽明甘草半兩炙桂枝一兩杏仁三十五個去皮尖麻黃一兩半去節百沸湯泡去黃汁焙乾稱上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服覆取微汗不須啜粥加減法傷寒熱病藥性須涼不可太溫夏至後麻黃湯須加知母半兩石膏一兩黃芩一分蓋麻黃湯性熱夏月服之有發黃斑出之失唯冬及春與病人素虛寒者乃用正方不在加減麻黃杏子甘草石膏湯二十一發汗後不可更行桂枝湯汗出而喘無大熱者可與此服之屬太陽甘草一兩炙石膏四兩碎綿裹杏仁二十五個去皮尖麻黃二兩去節湯泡去黃汁焙乾稱上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服麻黃附子甘草湯二十二少陰病得之二三日可與此藥微發汗以二三日無證故微發汗也屬少陰麻黃二兩去節湯泡去黃汁焙乾稱甘草二兩炙附子一枚炮去皮破八片上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服相次三兩服以身微汗為度麻黃細辛附子湯二十三少陰病始得之反發熱脈沉者此主之屬少陰麻黃二兩去節湯炮去黃汁焙乾稱細辛二兩附子一枚炮去皮破八片上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服麻黃連翹赤小豆湯二十四傷寒瘀熱在裡身必黃此主之屬陽明麻黃一兩去節湯泡去黃汁焙乾稱甘草一兩炙赤小豆半升杏仁二十枚去皮尖生梓白皮切二兩連翹一兩或作半兩連翹根是上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服麻黃升麻湯二十五傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治此主之屬厥陰麻黃二兩半去節湯泡去黃汁焙乾稱升麻當歸各一兩一分知母黃芩葳蕤各三分芍藥麥門冬去心桂枝去皮茯苓甘草炙乾薑炮石膏碎綿裹白朮各一分上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服相次一炊久進一服汗出愈葛根湯二十六太陽病項背強几几無汗惡風又太陽與陽明合病者必自利此並主之屬太陽葛根二兩桂枝去皮甘草炙芍藥各一兩麻黃一兩半去節湯泡去黃汁焙乾稱上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服覆取汗為度葛根加半夏湯二十七太陽與陽明合病不下利但嘔者此主之屬太陽葛根四兩或作一兩半夏六錢一字麻黃三分去節湯泡去黃汁焙乾稱甘草炙桂枝去皮芍藥各半兩上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服覆取微汗葛根黃芩黃連湯二十八太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者此主之葛根四兩黃芩一兩半黃連六兩或作二兩半甘草二兩炙上銼如麻豆大每服五錢水一盞半煮至八分去滓溫服日進二三服小柴胡湯二十九太陽病十日以去脈浮細而嗜臥者外已解設胸滿痛與服脈但浮者與麻黃湯傷寒五六日中風往來寒熱胸脅苦痛默默不欲食心煩喜嘔或胸煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者此主之血弱氣盡腠理開邪氣因入與正氣相搏結於脅下邪正分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也此主之服柴胡湯已渴者屬陽明以法治之傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者此主之傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者此主之太陽病過經十餘日發汗吐下之後四五日柴胡湯證仍在者先與小柴胡嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之即愈婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀此主之傷寒五六日頭汗出微惡寒手足冷心下滿不欲食大便硬脈細者為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在表也脈雖沉緊不得為少陰病所以然者陰不得有汗令頭汗出故知非少陰也可與服此設不了了者得屎而解傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而腹痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯以上屬太陽陽明病發潮熱大便溏小便自可胸脅滿不去者與服之陽明病脅下硬滿不大便而嘔舌上白苔者可與服之上焦得通津液得下胃氣因和身濈然汗出而解陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及目悉黃小便難有潮熱時時噦身前後腫刺之小瘥外不解病過十日脈續浮者與此藥主之以上屬陽明太陽病不解轉入少陽脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者此主之若已吐下發汗溫針譫語小柴胡湯證罷此為壞證知犯何逆以法治之以上屬少陽嘔而發熱者宜服傷寒瘥已後更發熱此主之脈浮者以汗解之脈沉實者以下解屬辨陰陽易瘥後勞復病脈證黃芩一兩半若腹中痛者去黃芩加芍藥一兩半芍藥或作三分若心下悸小便不利者去黃芩加茯苓二兩人參一兩半若不渴外有微熱者去人參加桂枝一兩半溫覆微汗愈若咳嗽者去人參並棗子加五味子一兩一分乾薑一兩棗子六枚若脅下痞硬去棗子加牡蠣二兩熬牡蠣或作一兩半夏一兩一分湯洗若胸中煩不嘔者去半夏人參加栝蔞實一枚用四分之一若渴者去半夏更加人參三分栝蔞根二兩柴胡四兩去蘆甘草一兩半炙上銼如麻豆大每服抄五錢匕生薑四片棗子三枚水一盞半煮至八分去滓溫服日三服
