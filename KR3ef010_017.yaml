body:
  text: 卷第十七五味子湯二十五治傷寒喘促脈伏而厥人參一分五味子半兩麥門冬去心一分杏仁去皮尖一分橘皮去白一分上銼如麻豆大入生薑十片棗子三枚以水三大白盞煎至一盞半去滓分二服豭鼠糞湯二十六療傷寒病後男子陰易方韭根一大把豭鼠糞十四枚鼠屎兩頭尖者是也上二味以水二升煎取半升去滓再煎三沸溫溫盡服必有黏汗出為效未汗再作服亦治諸般勞復竹皮湯二十七療傷寒後交接勞復卵腫腹中絞痛欲絶刮竹青皮一升上一味以水三升煮取一升半絞去滓分服立愈續添乾薑湯出百問方療婦人得溫病雖瘥平復未滿一百日不可與交合交合為陰易之病病必拘急手足拳皆死丈夫病以傷婦人名為陽易速當療之可瘥滿一百日不可療也宜令服此藥乾薑一分炮上銼如麻豆大水二盞煎六分溫服汗出得解止手足伸遂愈續添青竹茹湯出百問方婦人病未平復因有所動致熱氣上衝胸手足拘急搐搦如中風狀方栝蔞根無黃根者二兩青竹茹刮半升淡竹者上以水二升半煮取一升二合去滓溫溫作二三服吃立有效續添當歸白朮湯出百問方婦人未平復因有所動小腹急痛腰胯疼四肢不任舉身無熱發者白朮一分當歸一分桂枝一分去皮附子一枚破分八片去皮生薑半兩甘草一分炙芍藥一分人參一分黃耆一分蜜炙上銼如麻豆大以水三升煮取一升半去滓通口服一湯盞食頃再服一湯盞溫服微汗便瘥知母麻黃湯二十八傷寒瘥後或十數日或半月二十日終不惺惺常昏沉似失精神言語錯謬又無寒熱醫或作鬼祟或作風疾多般治不瘥或朝夕潮熱頰赤或有寒熱似瘧都是發汗不盡餘毒在心胞絡之間所致知母一兩半麻黃去節甘草炙芍藥黃芩各半兩桂枝去皮半兩盛暑可減作一分上銼如麻豆大每服抄五錢以水一盞半煎八分去滓溫服半日可相次二三服溫服令微汗若心煩不眠欲飲水當稍稍與之令胃中和即愈未汗須再服之以汗為度鱉甲散二十九傷寒八九日不瘥名曰壞傷寒不能治者宜此療之升麻前胡去蘆烏梅去核枳實麩炒去白犀角鎊黃芩各半兩生地黃切兩合甘草一分炙鱉甲去裙米醋炙赤黃杵碎用半兩上銼如麻豆大每服抄五錢匕水一盞半煎至八分去滓溫服人參順氣散三十治傷寒頭疼憎寒壯熱四肢疼痛麻黃去節稱一兩半乾葛一兩白朮一兩甘草一兩炙桔梗去蘆一兩人參一兩乾薑半兩炮香白芷一兩上搗羅為細末每服三錢水一大盞生薑三片蔥白二寸煎至八分通口服如要出汗連進二服蒼朮散三十一治傷寒一二日頭疼發熱憎寒身體疼痛麻黃一兩湯洗過焙乾稱蒼朮半兩米泔浸去皮切石膏一兩煆桔梗半兩甘草半兩炙山茵陳半兩去梗上為細末每服二錢水一盞煎至八分數服出汗麻黃葛根湯三十二治傷寒一日至二日頭項及腰脊拘急疼痛渾身煩熱惡寒麻黃用沸湯泡一二次焙乾稱芍藥各三兩乾葛四分蔥白七莖豉一合上銼如麻豆大每服四錢水一盞半煎一中盞去滓溫服服了以厚衣蓋覆如人行四五里間再服良久如未得汗出更煮蔥粥少許熱投之取汗敗毒散三十三治傷風溫疫風濕頭目昏眩四肢痛憎寒壯熱項強目睛疼尋常風眩拘倦風痰皆服神效羌活洗去土獨活去蘆前胡去蘆柴胡去苗芎藭枳殼麩炒去穰白茯苓去皮桔梗去蘆頭人參以上各一兩甘草半兩炙上件搗羅為末每服三錢入生薑二片水一盞煎七分或沸湯點亦可老人小兒亦宜日三二服以知為度瘴煙之地或溫疫時行或人多風痰或處卑濕腳弱此藥不可闕也獨活散三十四治傷風溫瘴等疾羌活去蘆頭獨活去蘆頭人參細辛去灰土華陰者佳白茯苓去皮枳殼去心麩炒通黃用防風去蘆黃芩細堅者麻黃沸湯泡三次焙乾稱甘草細銼炒赤蔓荊子甘菊花以上各一兩石膏水飛過二兩上十三味搗羅為末每服三錢水一盞生薑三片薄荷四五葉同煎至七分去滓微熱呷如年高者以川芎代黃芩桂枝石膏湯三十五治傷寒三日外與諸湯不瘥脈勢仍數邪氣猶在經絡未入臟腑者桂枝石膏湯此方可夏至後代桂枝證用若加麻黃去節半兩可代麻黃青龍湯用之也有汗脈緩為桂枝證無汗脈緊為麻黃青龍證桂枝半兩去皮石膏二兩碎黃芩半兩甘草半兩梔子四枚小者可用八枚白藥子升麻三分乾葛三分上銼如麻豆大每服抄五錢匕生薑四片水一盞半煎取八分去滓食頃再服若得汗即停後服梔子升麻湯三十六治晚發傷寒三月至夏為晚發梔子十枚切碎升麻一兩半生地黃半斤切碎用柴胡去蘆石膏各二兩半上銼如麻豆大每服抄五錢匕水一盞半煎至八分去滓頻服病不解更作若頭面赤去石膏用乾葛二兩無地黃用豉代之橘皮湯三十七治傷暑痰逆惡寒甘草半兩人參一分陳橘皮去白二兩上為粗末每服五錢用青新季竹輕輕刮上面青茹一團姜四片棗一枚水一盞半煎至八分去滓熱服如不惡寒即宜竹葉湯解肌湯三十八治傷寒溫病天行頭痛壯熱葛根一兩黃芩半兩芍藥半兩甘草一分炙桂心一分麻黃三分去節湯泡一二沸焙乾用上六味銼如麻豆大每服抄五錢匕水一盞半棗子一枚煮取八分去滓日三服三四日不解脈浮者宜重服發汗脈沉實者宜下之小柴胡加桂湯三十九治瘧疾先寒後熱兼治支結柴胡八兩人參甘草炙半夏湯浸七次切黃芩桂去皮以上各三兩上銼如麻豆大每服抄五錢匕水一盞半生薑七片棗二枚煎至八分去滓取六分清汁溫服日三夜二若渴者去半夏加人參栝蔞根同煎服之白虎加桂湯四十治瘧疾但熱不寒者知母六兩甘草炙二兩石膏一斤粳米二合桂去皮稱三兩上銼如麻豆大每服五錢水一盞半煎八分去滓服柴胡桂薑湯四十一治寒多微有熱或但寒不熱亦治勞瘧之證柴胡四兩黃芩一兩半桂枝一兩半去皮栝蔞根二兩牡蠣杵碎炒甘草炙乾薑各二兩上七味銼如麻豆大每服抄五錢水一盞半煎至一盞去滓溫服初服微煩汗出愈瘧母煎四十二治久瘧不愈結為癥瘕寒熱鱉甲十二分炙黃芩三分烏扇三分燒存性用柴胡三分鼠婦三分炒乾薑炮三分大黃三分芍藥五分肉桂三分去皮葶藶二分炒石葦二分去毛紫葳三分人參一分厚朴三分炙牡丹皮五分瞿麥二分虻蟲五分炒阿膠炒蜂窠各四分炒朴硝十二分蜣螂六分炙半夏湯洗一分桃仁二分去皮尖上搗羅為末鍛灶下灰一斗清酒一斗五升浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁納諸藥煎為丸如梧桐子大空心服七丸日三服有一方無鼠婦朴硝加海藻三分大戟一分祛邪丸四十三治瘧疾脈浮大寒熱往來用此吐之衛州書云瘧寒多熱少者痰多也然寒多熱少而脈浮則痰無疑矣可吐之也若脈遲微者惡寒瘧耳宜用柴胡桂薑湯恆山甘草炙大黃知母各二兩麻黃四兩去節湯泡一二沸焙乾稱用上搗羅為末煉蜜為丸如梧桐子大每服十五丸面向東清淨水吞下豬膽雞子湯四十四治傷寒五六日斑出者豬膽汁三合雞子一枚苦酒三合上三味和合煎三沸強人盡服羸人煎六七沸服汗出即瘥葳蕤湯四十五治風濕兼療冬溫及春月中風傷寒發熱頭眩痛喉咽干舌強胸內疼痞滿腰背強葳蕤三分石膏一兩杵碎白薇半兩麻黃半兩湯泡焙乾稱川芎半兩葛根半兩生者可用二兩尤佳大羌活去蘆半兩甘草炙半兩杏仁去皮尖雙仁者捶碎半兩青木香一分冬一兩始春用半兩炒上銼如麻豆大每服五錢水一盞半煎一盞日三四服知母乾葛湯四十六治風濕身體灼熱甚者知母三錢乾葛八錢石膏六錢甘草二錢炙黃芩二錢木香二錢升麻二錢葳蕤五錢天南星二錢生人參二錢防風二錢麻黃去節四錢湯泡焙稱杏仁二錢炒川芎二錢羌活二錢上銼如麻豆大每服五錢水一盞半煎至一盞去滓服未知再服之栝蔞根湯四十七治風溫加渴甚者栝蔞根三分石膏二兩人參半兩防風半兩甘草半兩炙葛根一兩半生用乾者只三錢上銼如麻豆大每服抄五錢匕用水一盞半煎至一中盞去滓溫服漢防己湯四十八治風溫脈浮身重汗出者漢防己四兩甘草二兩炙黃耆二兩蜜炙用白朮三兩上銼如麻豆大每服五錢匕生薑四片大棗一枚水一盞半煎取一中盞去滓飲訖仍坐被中汗出如蟲行或被臥取其汗老君神明散四十九闢疫癘白朮二兩桔梗一兩附子二兩炮去黑皮用烏頭四兩炮去皮臍真華陰細辛一兩上五味搗粗篩縫絹囊盛帶之居閭里皆無病若有疫癘者溫酒服方寸匕覆取汗得吐即瘥若經三四日抄三寸匕以水二碗煮令大沸分三服務成子螢火丸五十主闢疾疫惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害皆闢之螢火鬼箭削取皮羽蒺藜各一兩雄黃雌黃礬石各二兩燒汁盡羚羊角鍛灶灰鐵錘柄入鐵處燒焦各一兩半上九味搗篩為散以雞子黃並丹雄雞冠一具和之如杏仁大作三角絹囊盛五丸帶左臂仍更掛戶上續添聖散子方此藥性溫若陽證有熱不可輕服之聖散子蘇內翰云昔嘗覽千金三建散方於病無所不治而孫思邈特為著論以謂此方用藥節度不近人情至於救急其驗特異乃知神物效靈不拘常制至理開感智不能知今豫所謂聖散子者殆此類也自古論病惟傷寒為至危急表裡虛實日數證候應汗下之類差之毫釐輒至不救若時毒流行用聖散子者一切不問陰陽之感連服取瘥不可與傷寒比也若疾疫之行平旦輒煮一釜不問老幼良賤各一大盞即時氣不入其門平居無病能空腹一服則飲食倍常百疾不生真濟世之寶也其方不知其所從出而故人巢君世寶之以治溫疫百不失一豫既得之謫居黃州連年大疫所全活者不可勝數巢君初甚惜此方指江水為盟約不傳人餘切隘之以傳蘄水道人龐安常龐以醫聞於世又善著書故以授之且使巢君之名與此方同不朽東坡居士序草豆蔻十枚去皮面裹炮木豬苓去皮石菖蒲茯苓高良薑獨活去蘆頭附子炮去皮臍麻黃去根節厚朴去皮薑汁炙藁本去沙土芍藥枳殼去根麩炒柴胡去蘆頭澤瀉細辛華陰者防風去蘆頭白朮藿香半夏薑製各半兩甘草一兩炙上銼如麻豆大每服五錢水一盞半煮取八分去滓熱服余滓兩服合為一服重煎空心服之調中湯五十一治夏月秋初忽有暴寒折於盛熱熱結於四肢則壯熱頭痛寒傷於胃則下利或血或水或赤壯熱迷悶脈數宜下之大黃去皮三分葛根黃芩芍藥桔梗去蘆藁本真者無則以芎代之茯苓去皮白朮甘草炙以上各半兩上等分銼如麻豆大每服五錢水一盞半煮取一中盞移時再服之得快利壯熱便歇小兒輩減與服之凡秋夏暑熱積日或有暴寒折之熱無可散喜摶著肌中作壯熱氣也胃為六腑之表最易為暴寒傷之而下也虛冷人亦不壯熱但下利或霍亂也不宜服此少實人可服五石人喜壯熱適與藥斷下則加熱喜悶而死矣亦不止便作痹熱毒壯熱甚不歇則劇是以宜調中湯下和其胃氣也調中湯去大黃即治風溫證兼治陽病因下遂協熱利不止及傷寒不因下自利表不解而脈浮數者皆可去大黃煎之殊驗也射干湯五十二治初秋夏月暴雨冷及天行暴寒其熱喜伏於內咳嗽曲折不可得氣息喉啞失聲干嗽無唾喉中如哽射干二兩半夏五兩洗杏仁三兩去皮尖雙仁炒生薑四兩炮甘草二兩炙紫菀二兩肉桂二兩枳實二兩炙當歸二兩橘皮二兩獨活二兩麻黃二兩去節湯泡焙稱上銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服半夏桂枝甘草湯五十三治伏氣之病謂非時有暴寒中人伏氣於少陰經始不覺病旬月乃發脈便微弱法先咽痛似傷寒非喉痹之病次必下利始用半夏桂枝甘草湯主之次四逆散主之此病只二日便瘥古方謂之腎傷寒也甘草炙半夏湯洗桂心各等分上銼如麻豆大每服四錢匕水一盞半煎至七分放冷少少含細咽之入生薑四片煎服麻黃杏子薏苡甘草湯五十四病人一身盡疼發熱日晡所劇者名風濕此病因傷於汗出當風或久傷取冷所致之也麻黃去節稱湯泡二分甘草一分炙薏苡仁半兩杏仁十枚去皮尖炒上銼如麻豆大每服四錢匕水一盞半煎至八分去滓分溫二服有微汗避風防己黃耆湯五十五治風濕脈浮身重汗出惡風防己一兩甘草半兩炙白朮三分黃耆一兩一分去蘆上銼如麻豆大每服抄五錢匕生薑四片大棗一枚水一盞半煎至八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰以下溫令微汗瘥杏仁湯五十六療風濕身體疼痛惡風微腫桂心二兩麻黃一兩去節湯泡焙稱用芍藥一兩天門冬一兩去心杏仁二十五枚去皮尖雙仁炒上銼如麻豆大每服五錢匕生薑四片水一盞半煎至八分去滓溫服小續命湯五十七治中風及腳氣痹弱不能轉側者又兼治小兒慢驚風附子生削去皮臍五錢防風一兩半芍藥白朮人參川芎麻黃去節湯泡三次焙乾防己黃芩桂枝甘草各一兩上銼如麻豆大每服五錢匕水一盞半煎至一盞去滓取八分清汁入生薑汁再煎一二沸溫服日三夜二若柔痓自汗者去麻黃夏間及病有熱者減桂枝一半冬及始春去黃芩附術散五十八傷寒手足逆冷筋脈拘急汗出不止項強直搖頭口噤附子一兩炮白朮一兩川芎三錢獨活半兩桂心二錢上搗羅為末每服三錢水一中盞棗子二枚同煎至五分溫服桂心白朮湯五十九治傷寒陰痙手足厥冷筋脈拘急汗出不止者白朮桂心附子炮去皮臍防風去蘆頭芎藭甘草炙微赤各一兩五錢上銼如麻豆大以水二盞藥五錢生薑四片棗三枚同煎至八分去滓溫服附子防風散六十治傷寒陰痙閉目合面手足厥逆筋脈拘急汗出不止者白朮一兩白茯苓三分柴胡一兩半去苗五味子一兩乾薑三分炮裂切甘草三分炙微赤切附子三分炮裂去皮臍桂心半兩防風三分去蘆頭上件藥搗篩粗散每服四錢以水一盞入生薑四片煎至六分去滓不計時候溫服八物白朮散六十一治傷寒陰痙三日不瘥手足厥冷筋脈拘急汗不出恐陰氣內傷白朮半兩白茯苓半兩麻黃半兩去節泡三沸焙五味子半兩桂心三分高良薑一分羌活半兩附子三分炮裂去皮臍上件藥搗篩粗散每服四錢以水一大盞入生薑四片煎至五分去滓不計時候溫服柴胡半夏湯六十二治痰熱頭疼利膈除煩悶手足煩熱營衛不調肢節拘倦身體疼痛嗜臥少力飲食無味兼治五飲消痰癖柴胡八兩人參三兩半夏二兩半洗甘草三兩炙黃芩三兩白朮二兩麥門冬三兩去心上銼如麻豆大每服抄五錢匕水一盞半生薑五片棗子一枚煎至八分去滓溫服金沸草散六十三治傷寒中脘有痰令人壯熱頭痛項筋緊急時發寒熱皆類傷風但不頭痛為異耳前胡三兩荊芥四兩半夏一兩淨洗薑汁浸赤芍藥二兩細辛一兩甘草一兩炙旋覆花三兩上件搗羅為末每服二錢水一盞生薑五片棗子一枚同煎至六分去滓熱服未知再服
