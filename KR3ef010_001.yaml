body:
  text: 卷第一此一卷論經絡治傷寒先須識經絡不識經絡觸途冥行不知邪氣之所在往往病在太陽反攻少陰證是厥陰乃和少陽寒邪未除真氣受斃又況傷寒看外證為多未診先問最為有準孫真人云問而知之別病淺深名為巧醫病家云發熱惡寒頭項痛腰脊強則知病在太陽經也身熱目疼鼻乾不得臥則知病在陽明經也胸脅痛耳聾口苦舌乾往來寒熱而嘔則知病在少陽經也腹滿咽乾手足自溫或自利不渴或腹滿時痛則知病在太陰經也引飲惡寒或口燥舌乾則知病在少陰經也煩滿囊縮則知病在厥陰經也然後切脈以辨其在表在裡若虛若實以汗下之古人所以云問而知之為中工切而知之為下工若經隧支絡懵然不分按寸握尺妄意疾證豈知坐授明堂藏室金蘭者耶經絡圖風府穴兩旁各一從此分為四道膀胱重九兩二銖縱廣九寸盛溺九升九合膕膕謂膝後曲腳之中委中穴也足太陽膀胱之經腎與膀胱為合故足少陰與足太陽為表裡從目內眥上頭連於風府分為四道下項並正別脈上下六道以行於背與身為經太陽之經為諸陽主氣或中寒邪必發熱而惡寒緣頭項腰脊是太陽經所過處今頭項痛身體疼腰脊強其脈尺寸俱浮者故知太陽經受病也靈樞經云足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右別下貫胛挾脊內過髀樞循髀從廉下合膕中以下貫踹內出外踝之後循京骨至小趾外側大迎穴在曲頷前一寸一分骨陷中動脈又以口下當兩肩者得之是承漿穴在唇下陷者中是人迎穴在結喉旁一寸五分動脈應手者是缺盆穴一名天蓋在肩下橫骨陷者中是胃重二斤十四兩盛谷二斗水一斗五升為水穀之海脾絡脾伏兔穴在膝上六寸起內是一云是膝蓋上七寸是髀關穴在膝上伏兔後交分中是氣衝穴在歸來下鼠鼷上一寸動脈又云在陰毛兩旁下膝三寸者正白三里穴而下也三里穴在膝下三寸是足陽明胃之經脾與胃為合故足太陰與足陽明為表裡從鼻起挾於鼻絡於目下咽分為四道並正別脈六道上下行腹綱維於身蓋諸陽在表陽明主肌肉絡於鼻故病人身熱目疼鼻乾不得臥其脈尺寸俱長者知陽明經受病也靈樞經云足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣衝中其支者起胃口下循腹裡下至氣衝中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中趾內間其支者下廉三寸而別以下入中趾外間其支者別跗上入大趾間出其端氣衝穴在陰毛兩旁動脈應手膽在肝之短葉間重三兩三銖盛精汁三合足少陽膽之經肝與膽為合故足厥陰與足少陽為表裡起目外眥絡於耳遂分為四道下缺盆循於脅並正別脈六道上下主經營百節流氣三部故病人胸脅痛而耳聾黃帝針經曰邪在肝則兩脅痛又曰膽脹者脅下痛口中苦善太息或口苦咽乾或往來寒熱而嘔其脈尺寸俱弦者知少陽經受病也靈樞經云足經少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳下入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣沖繞毛際入髀厭中其直者從缺盆下腋循胸中過季脅下合髀厭中以下循髀陽出膝之廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上出小趾次趾之端其支別者從跗上入大趾循岐骨內出其端舌本舌本者舌根也咽門重十兩為胃之系胃絡胃脾重二斤三兩象馬蹄內色胃脘象土形也經絡之氣交歸於中以營運真靈之氣意之舍也上循膝股內前廉足太陰脾之經為三陰之首其脈布於脾胃絡於嗌喉故病人腹滿而嗌乾尺寸俱沉細者知太陰經受病也靈樞經云足太陰之脈起於大趾之端循趾內側白肉際過核骨後上內踝前廉上腨示兗切內循脛骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中腎臟有二形如紅豆相併而曲附於膂筋外有脂裹里白表黑主藏精足少陰腎之經其脈起於小趾之下斜趣足心別行者入跟中上至股內後廉貫腎絡膀胱直行者從腎上貫肝膈入肺中系舌本傷寒熱氣入於臟流於少陰之經少陰主腎腎惡燥故渴而引飲又經發汗吐下以後臟腑空虛津液枯竭腎有餘熱亦渴故病人口燥舌乾而渴其脈尺寸俱沉者知少陰經受病也靈樞經云足少陰之脈起於小趾之下斜趣足心出於然骨之下循內踝之後別入跟中以上踹時兗切內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中上膕內廉循足跗上廉巔頂上曰巔頏顙者懸雍兩旁肉也又靈樞經曰頏顙者分氣之泄肝重四斤四兩有七布葉一葉小如木甲拆之象也各有支絡脈進中以宦發陽和之氣魏之宮也足厥陰肝之經厥者盡也靈樞曰亥為左足之厥陰戌為右足之厥陰兩陰俱盡故曰厥陰夫陰盡為晦陰出為朔厥陰者以陰盡為義也其脈循陰器而脈絡於舌本也脈弗營則筋急筋急則引舌與卵故唇青舌卷而卵縮凡病人煩滿而囊縮其尺寸俱微緩者知厥陰經受病也靈樞經云足厥陰之脈起於大趾叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺中一問傷寒一二日發熱惡寒頭項痛腰脊強尺寸脈俱浮此足太陽膀胱經受病也仲景云太陽病欲解時從巳至未上太陽病頭疼發熱汗出惡風宜桂枝湯正一輕者只與柴胡桂枝湯正方三十一太陽病頭痛發熱無汗惡寒宜麻黃湯正二十輕者只與桂枝麻黃各半湯正二麻黃湯桂枝湯二者均為解散正分陰陽不可不慎也仲景所謂無汗不得服桂枝有汗不得服麻黃常須識此勿令誤也今人才見身熱頭痛便發汗不知汗孔閉而用麻黃汗孔疏而用桂枝傷寒傷風其治不同古人有汗者當解肌無汗者可發汗二問傷寒二三日身熱目疼鼻乾不得臥尺寸脈俱長此足陽明胃經受病也仲景云陽明病欲解時從申至戌上傷寒二日陽明經受病可發其汗非正陽明也正陽明者身熱汗出不惡寒反惡熱故可下也今言一二日傳陽明經身熱目疼鼻乾不得臥其脈俱長者是太陽陽明可表而已若無汗尚惡寒宜升麻湯雜方有汗微惡寒者表未解也宜桂枝湯正方一無汗脈浮其人喘者與麻黃湯正二十又問十二經皆一而陽明有三何也有太陽陽明有少陽陽明有正陽陽明也太陽陽明者本太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明也太陽陽明脾約是也大便堅小便利其脾為約少陽陽明者本傳到少陽因發汗利小便已胃中燥實大便難也正陽陽明者病人本風盛氣實也三陽明俱宜下唯惡寒乃中寒為病在經與太陽合病屬表可發其汗蓋太陽與陽明合病脈必浮大而長外證必頭疼腰痛肌熱目痛鼻乾也脈浮大者太陽也長者陽明也頭疼腰痛者太陽也肌熱目痛鼻乾者陽明也尚惡寒者可升麻湯雜方一汗之若不惡寒反惡熱大便不祕者可白虎湯正方六十四解利之不惡寒反惡熱大便祕或譫語者屬胃家實也可調胃承氣湯下之正四十三又問三陽有合病有並病何也脈浮大而長頭疼腰痛肌熱目疼鼻乾者合病也太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒者並病也三陽皆有合病唯三陰無合病不可不知也太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之愈宜大承氣湯正四十一若太陽證不罷不可下宜用桂枝麻黃各半湯正方二小發汗設面赤色者陽氣怫鬱在表當解之熏之若發汗不大徹則陽氣怫鬱不得越散當汗不汗煩躁不知痛處其人短氣但坐蓋以汗出不徹故也更以麻黃湯發其汗則愈何以知汗出不徹以脈澀故知之三問傷寒三四日胸脅痛而耳聾或口苦舌乾或往來寒熱而嘔其尺寸脈俱弦此足少陽膽經受病也仲景云少陽病欲解時從寅至辰上太陽病不解轉入少陽脅下硬滿乾嘔不能食往來寒熱尚未可吐下診其脈弦緊者小柴胡湯主之正方二十九蓋脈弦細頭疼發熱屬少陽少陽受病口苦咽乾目眩宜小柴胡湯以解表不可發汗仲景少陽證唯小柴胡為解表藥耳發汗則譫語譫語屬胃胃和則愈不和則煩而燥宜調胃承氣湯正四三此屬少陽陽明也四問傷寒四五日腹滿咽乾手足自溫或自利不渴或腹滿時痛尺寸俱沉細此足太陰脾經受病也仲景云太陰病欲解時從亥至醜上傷寒手足必微冷若手足自溫者系太陰也自利不渴屬太陰也腹滿時痛屬太陰也自利不渴者臟寒也當溫之宜四逆湯正方七十五理中湯也正方七十四腹滿脈浮者可桂枝正方一微發汗腹痛者桂枝加芍藥湯正十二痛甚者桂枝加大黃湯正十三古人以四日太陰證病在胸膈可吐而愈何也答曰不然有太陰證脈大胸滿多痰者可吐之脈大而無吐證者可汗而已大抵在表者汗之在裡者下之在上者湧之在下者泄之瓜蒂正百十一梔豉雜十九隨證施用不可拘以日數也五問傷寒五六日尺寸脈俱沉或口燥舌乾而渴或口中和而惡寒此足少陰腎經受病也仲景云少陰病欲解時從子至寅上少陰病口燥舌乾者急下之宜大承氣湯正四十一若不渴不口燥舌乾而脈沉者急溫之宜四逆湯正方七十五太陰厥陰皆不惡寒只有少陰有惡寒之證不可不知也少陰病得之一二日口中和其背惡寒者宜著灸並附子湯也大抵傷寒陽明證宜下少陰證宜溫然仲景於少陰證口燥咽乾即云急下之蓋少陰主腎系舌本傷寒熱氣入於臟流於少陰之經腎汁干咽路焦故口燥咽乾而渴須宜急下之非若陽明證宜下而可緩也雖然陽明亦有一證發熱汗出多急下之陽明屬胃汗多則胃汁干亦須急下也六問傷寒六七日煩滿囊縮其脈尺寸俱微緩此足厥陰肝經受病也仲景云厥陰病欲解時從醜至卯上厥陰病其脈微浮為欲愈不浮為未愈宜小建中湯正三十七脈浮緩者必囊不縮外證必發熱惡寒似瘧為欲愈宜桂枝麻黃各半湯正方二若尺寸脈俱沉短者必是囊縮毒氣入臟宜承氣湯下之正方四十二大抵傷寒病臟腑傳變陽經先受病故次第傳入陰經以陽主生故太陽水傳足陽明土土傳足少陽木為微邪也陰主殺故木傳足太陰土土傳足少陰水水傳足厥陰木至六七日當傳厥陰肝木必移氣克於脾土脾再受賊邪則五臟六腑皆困而危殆營衛不通耳聾囊縮不知人而死矣速用承氣湯下之可保五死一生古人云脾熱病則五臟危又云土敗木賊則死若第六七日傳厥陰脈得微緩微浮為脾胃脈也故知脾氣全不再受克邪無所容痞極泰來營衛將復水升火降則寒熱作而大汗解矣
