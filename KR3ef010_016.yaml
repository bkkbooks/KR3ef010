body:
  text: 卷第十六此一卷載雜方大率仲景證多而藥少使皆如仲景調理既正變異不生則麻黃桂枝青龍用之而有餘以後世望聖人難矣仲景藥方缺者甚多至如陰毒傷寒時行溫疫溫毒發斑之類全無方書今採外臺千金聖惠金匱玉函補而完之凡百有餘道以證合方以方合病雖非仲景筆削然皆古名方也譬猶周易參同華嚴合論步驟馳騁不外乎聖人之意又況俗學久矣一旦革之悉用古法即陽春白雪復生謗毀適足以杜絶治法今撥歸經絡裁減湯劑參以雜方庶幾庸人易曉日就月將辛甘發散酸苦湧泄之術行即俗方不革而自寢矣此余所以載雜方之意也又況五積散敗毒散升麻湯葳蕤湯之類縱治不對病用之或瘥亦無所害載之卷末以俟採擇升麻湯一治傷寒中風頭痛憎寒壯熱支體痛發熱畏寒鼻乾不得睡兼治小兒大人瘡疹已發未發皆可服兼治寒暄不時人多疾疫乍暖脫著及暴熱之次忽變陰寒身體疼痛頭重如石者升麻白芍藥甘草炙乾葛各等分上銼如麻豆大每服五錢以水一盞半煎至八分去滓溫服若大段寒即熱服若熱即溫服瘡疹亦准此服藥已身涼止藥小兒量度多少服如老兒吃去芍藥加柴胡一兩人參半兩雪白芍藥一分防風白朮牡蠣湯二治發汗多頭眩汗出筋惕肉瞤防風獨莖者去蘆頭牡蠣粉炒黃白朮各等分上搗羅為細末每服二錢以酒調下米飲亦得日進二三服汗止便服小建中湯李根湯三治氣上衝正在心端半夏湯洗半兩當歸一分芍藥一分茯苓一分桂枝一兩黃芩一分甘草炙一分甘李根白皮二合上銼如麻豆大每服抄五錢匕生薑四片水一盞半煎至八分去滓溫服大橘皮湯四動氣在下不可發汗發汗則無汗心中大煩骨節疼痛目暈惡寒食則反吐谷不得入先服大橘皮湯吐止後服小建中湯橘皮一兩半去白甘草炙半兩人參一分竹茹半升上銼如麻豆大每服五錢生薑四片棗子一枚以水二鍾煎取一盞去滓分二服橘皮竹茹湯五治噦逆橘皮二兩竹茹一升甘草二兩炙人參半兩半夏一兩湯洗上銼如麻豆大每服五錢生薑六片棗子一枚以水二大盞煎至一盞去滓溫服日進三服生薑橘皮湯四治乾嘔噦若手足厥冷者橘皮四兩生薑半斤上銼如麻豆大水七盞煎至三盞去滓溫服一盞陰旦湯六治傷寒肢節疼痛內寒外熱虛煩芍藥二兩甘草二兩炙乾薑三兩炮黃芩三兩桂四兩上銼如麻豆大每服抄五錢棗二枚水一盞半煎至八分去滓溫服日三夜二陰毒甘草湯七治傷寒初得病一二日便結成陰毒或服藥六七日以上至十日變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細而疾仲景云此陰毒之候身如被杖喉咽痛五六日可治至七日不可治甘草炙升麻當歸各二分雄黃一分桂枝去皮二分鱉甲一兩半醋炙稱蜀椒一分出汗閉口者及子去之上銼如麻豆大每服抄五錢匕水一盞半煎至八分去滓服如人行五里頃更進一服溫覆取汗毒當從汗出汗出即愈若未汗再作白朮散八治陰毒傷寒心間煩躁四肢逆冷白朮一兩細辛一兩附子一兩炮去皮臍用桔梗一兩去蘆頭乾薑半兩炮裂銼川烏頭一兩炮裂去皮臍上件藥搗為細末每服二錢以水一中盞煎至六分不計時候稍熱和滓頓服附子散九治陰毒傷寒唇青面黑身背強四肢冷附子三分炮裂去皮桂心半兩當歸半兩銼微炒乾薑一分炮裂銼半夏一分湯洗七次去滑白朮半兩上件搗篩為細散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候熱服衣覆取汗如人行十里未汗再服正陽散十治陰毒傷寒面青張口出氣心下硬身不熱只額上有汗煩渴不止舌黑多睡四肢俱冷甘草一分炙微赤銼附子一兩炮裂去皮臍麝香一錢研細入乾薑一分炮裂銼皂莢一挺去皮塗酥炙令黃色去子上件搗羅為細末每服二錢以水一中盞煎至五分不計時候和滓熱服肉桂散十一治傷寒服冷藥過度心腹脹滿四肢逆冷昏沉不識人變為陰毒肉桂三分去皴皮赤芍藥一兩陳橘皮一兩前胡一兩去蘆頭附子一兩炮裂去皮臍當歸一兩白朮三分高良薑三分銼人參一兩去蘆頭吳茱萸半兩湯浸厚朴三分去皮薑汁炙令香熱木香三分上件搗為粗末每服四錢以水一中盞入棗子三枚煎至六分去滓不計時候稍熱頻服回陽丹十二治陰毒傷寒面青手足逆冷心腹氣脹脈候沉細宜此治之硫黃半兩細研入木香半兩蓽澄茄半兩附子半兩炮裂去皮臍乾薑一分炮裂銼乾蠍半兩吳茱萸半兩浸七遍焙乾微炒上件藥搗羅為細末酒煮麵糊為丸如梧桐子大每服不計時候以生薑湯下三十丸頻服二服復以熱酒一盞投之以厚衣蓋取汗返陰丹十三治陰毒傷寒心神煩躁頭痛四肢逆冷硫黃五兩太陰玄精石二兩另研硝石二兩另研用附子炮裂去皮臍乾薑炮裂銼桂心以上各半兩上件藥用生鐵銚先鋪玄精末一半次鋪硝石末一半中間下硫黃末又著硝石蓋硫黃都以玄精蓋上訖用小盞合著以三斤炭火燒令得所勿令煙出多急取瓦盆合著地面四向著灰蓋勿令煙出直候冷取出細研如面後三味搗羅為末與前藥同研令勻用軟飯和丸如梧桐子大每服十五丸至二十丸煎艾湯下頻服汗出為度病重則三十丸此方甚驗喘促與吐逆者入口便住又服此方藥三五服服之不退便於臍下一寸灸之須是大段日夜不住手灸不限多少壯數灸之仍艾炷勿令小小則不得力若其人手足冷小腹硬即須更於臍下兩邊各一寸各安一道三處臍下灸仍與當歸四逆湯並返陰丹亦須頻服內外通透方得解退若遲慢即便死矣又若是陰症加以小便不通及陰囊縮入小腹絞痛欲死者更於臍下二寸石門穴大段急灸之仍須與返陰丹當歸四逆加吳茱萸生薑湯慎勿與尋常利小便藥也尋常利小便多是冷滑藥此是陰毒氣在小腹所致也世有醫者見小便不通便用炒鹽及裹熱藥於臍下便尉欲望小便通緣陰氣在小腹之間致被熱物尉著無處出得即便奔上衝心往往有死者天雄散十四治陰毒傷寒身重背強腹中㽲痛咽喉不利毒氣攻心心下堅強短氣嘔逆唇青面黑四肢厥冷其脈沉細而疾天雄一兩炮裂去皮臍麻黃半兩去根節當歸半兩切微炒白朮半兩肉桂一兩去粗皮半夏半兩湯泡洗七次去滑陳橘皮三分湯浸去白瓤炒乾薑三分炮川椒一分去目及閉口者微炒去汁厚朴一兩去粗皮塗生薑汁炙令香熟上件藥搗為粗末每服五錢以水一大盞入生薑半分棗子三枚煎至五分去滓不計時候稍熱服如人行十里未汗再服續添正元散退陰散出百問方正元散治傷寒如覺風寒吹著四肢頭目百骨節疼痛急煎此藥服如人行五里再服或連進三服出汗立瘥若患陰毒傷寒入退陰散半錢同煎或傷冷傷食頭昏氣滿及心腹諸疾服之無有不取效者麻黃去節稱陳皮大黃生用甘草炙乾薑炮用肉桂去皮芍藥附子炮去皮用茱萸湯洗焙炒半夏洗各等分上麻黃加一半茱萸減一半同為末每服一大錢水一盞生薑三片棗一枚煎至七分熱服如出汗以衣被蓋覆切須候汗乾去衣被如是陰毒不可用麻黃免更出汗退陰散治陰毒傷寒手足逆冷脈沉細頭痛腰重連進三服小小傷冷每服一字入正元散內同煎入鹽一捻陰毒傷寒咳逆煎一服細細熱呷便止川烏乾薑各等分上為粗末炒令轉色放冷再搗為細末每服一錢水一盞鹽一捻煎半盞去滓溫服蔥尉法十五治氣虛陽脫體冷無脈氣息欲絶不省人及傷寒陰厥百藥不效蔥以索纏如繩許大切去根及葉唯存白長二寸許如大餅餤先以火㶸一面令通熱又匆令灼人乃以熱處搭病人臍連臍下其上以尉斗滿貯火尉之令蔥餅中熱氣鬱郁入肌肉中須預作三四餅一餅壞不可尉又易一餅良久病人當漸醒手足溫有汗即瘥更服四逆湯輩溫其內昔曾有患傷寒冥冥不知人四體堅冷如石藥不可入用此遂瘥葶藶苦酒湯十六治傷寒七八日內熱不解苦酒米醋是也一升半生艾汁半升無生艾煮熱艾汁或用艾根搗取汁用葶藶熬杵膏一合上煎取七合作三服陽毒升麻湯十七治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言或走或見鬼或下利脈浮大數面赤斑斑如錦紋喉咽痛下膿血五日可治七日不可治也升麻二分犀角屑一分射干一分黃芩一分人參一分甘草一分上銼如麻豆大以水三升煎取一升半去滓飲一湯盞食頃再服溫覆手足出汗汗出則解不解重作大黃散十八治陽毒傷寒未解熱結在內恍惚如狂者川大黃一兩半切桂心三分甘草一兩炙微赤川芒硝二兩木通一兩切大腹皮一兩切桃仁二十一枚湯浸去皮尖雙仁麩炒令微黃上件搗為粗末每服四錢以水一中盞煎至六分去滓不計時候溫服以通利為度梔子仁湯十九治陽毒傷寒壯熱百節疼痛梔子仁一兩柴胡一兩半去苗川升麻二兩黃芩二兩赤芍藥一兩大青一兩石膏二兩知母一兩甘草半兩炙赤銼杏仁二兩湯浸去皮尖雙仁者麩炒微黃上件搗為粗末每服抄四錢以水一中盞入生薑半分豉一百粒煎至六分去滓不計時候溫服黑奴丸二十時行熱病六七日未得汗脈洪大或數面赤目瞪身體大熱煩躁狂言欲走大渴甚又五六日以上不解熱在胸中口噤不能言為壞傷寒醫所不治為死或人精魂已竭心下才暖發開其口灌藥下咽即活兼治陽春及發斑大黃二兩釜底煤研入黃芩芒硝灶突墨研入梁上塵小麥奴各一兩麻黃去節泡一二沸焙乾稱三兩上件搗羅為細末煉蜜為九如彈子大以新汲水研下一丸渴者但與冷水盡足飲之須臾當寒寒竟汗出便瘥若日移五尺不汗依前法服一丸瘥即止須微利小麥奴乃小麥未熟時叢中不成麥捻之成黑勃是也無此亦得此藥須是病人大渴倍常燥盛渴者乃可與之不渴若與之反為禍耳五積散二十一治陰經傷冷脾胃不和及感寒邪枳殼五兩麩炒令色黃熟官桂去皮二兩厚朴三兩去皮淨人參二兩吳白芷四兩洗淨焙乾白茯苓三兩芍藥三兩洗淨當歸三兩洗麻黃去節三兩半夏三兩湯洗七遍川芎二兩陳橘皮八兩洗不去穰甘草二兩半乾薑三兩蒼朮二十四兩新者淨洗焙乾桔梗十二兩緊實白者洗淨焙乾上件除枳殼肉桂外其餘並一處生搗為粗末分作六分於大鑊內用文武火炒令黃熟不得焦用紙攤於板床候冷入前件枳殼官桂末一處和勻入瓷合盛每服二錢水一盞生薑三片同煎至七分去滓服傷寒入蔥白一莖豆豉七粒同煎連服出汗或脾胃不和內傷冷食渾身疼痛頭昏無力胸膈不利吃食不下氣脈不和四肢覺冷至晚心躁困倦即入鹽少許同煎或是陰經傷寒手足逆冷或睡裡虛驚及虛汗不止脈細疾面青嘔逆更宜入附子同煎加減多少並在臨時霹靂散二十二治陰盛隔陽煩躁不飲水附子一枚及半兩者炮熟取出用冷灰焙之去皮臍為粗末真臘茶一大錢細研同和分作二服每服用水一盞煎六分臨熟入蜜半匙放溫冷服之須臾躁止得睡汗出即瘥火焰散二十三治傷寒惡候舶上硫黃黑附子去皮生用新臘茶以上各一兩為細末上先用好酒一升調藥分大新碗五口中於火上攤蕩令乾合於瓦上每一碗下燒熟艾一拳大以瓦搘起無令火著直至煙盡冷即刮取卻細研入瓷合盛每服二錢酒一盞共煎七分有火焰起勿訝傷寒陰毒者四肢冷脈沉細或吐或瀉五心躁煩胸中結硬或轉早伏陽在內湯水不得下或無脈先吃一服如吐卻更進一服後心中熱其病已瘥下至臟腑中表未解者渾身壯熱脈氣洪大便宜用發表藥或表解者更不發熱便得眠睡渾身有汗方可用調氣湯散如服此藥二服不應不可治也丹砂丸二十四治傷寒陰陽二毒相伏危惡形證舶上硫黃水銀太陰石太陽石玄精石以上各一兩研硝石半兩上件藥為末先用無油銚子以文武火炒下諸藥末令勻如灰色研如粉面生薑自然汁浸蒸餅為丸如緑豆大每服五丸龍腦牛黃生薑蜜水下壓躁也若陽毒棗湯下陰毒荏湯下不得於屋底炒
